name: Restore Mirror Cache
description: |
  Restores the pre-warmed mirror cache volumes created by warm-mirror-cache.
  Use this in system test jobs to benefit from the warmed cache.

  The cache key is computed by extracting the same image list and hashing it,
  ensuring restore jobs can find the cache created by warm-mirror-cache.

inputs:
  cache-version:
    description: |
      Version salt for cache key. Must match warm-mirror-cache.
    required: false
    default: "v1"

outputs:
  cache-hit:
    description: Whether the cache was found and restored
    value: ${{ steps.restore-cache.outputs.cache-hit || 'false' }}

runs:
  using: composite
  steps:
    - name: 📋 Extract images for cache key computation
      id: extract-images
      shell: bash
      run: |
        echo "📋 Extracting images to compute cache key..."

        # Same configurations as warm-mirror-cache to get identical hash
        CONFIGS=(
          "--distribution Vanilla --cni Cilium"
          "--distribution Vanilla --cni Cilium --csi Enabled --load-balancer Enabled --metrics-server Enabled --policy-engine Kyverno --cert-manager Enabled --gitops-engine Flux"
          "--distribution Vanilla --cni Calico --policy-engine Gatekeeper --gitops-engine ArgoCD"
          "--distribution K3s --cni Cilium --gitops-engine Flux"
          "--distribution K3s --cni Cilium --gitops-engine ArgoCD"
          "--distribution Talos --cni Cilium --gitops-engine Flux"
          "--distribution Talos --cni Cilium --gitops-engine ArgoCD"
          "--distribution Talos --cni Cilium --load-balancer Enabled --gitops-engine Flux"
          "--distribution VCluster --cni Cilium --gitops-engine Flux"
          "--distribution VCluster --cni Cilium --gitops-engine ArgoCD"
        )

        IMAGES_FILE="/tmp/all-images.txt"
        > "$IMAGES_FILE"

        for config in "${CONFIGS[@]}"; do
          # shellcheck disable=SC2086
          ksail workload images $config >> "$IMAGES_FILE" 2>/dev/null || true
        done

        # Append VCluster provisioner-level images (must match warm-mirror-cache exactly)
        # Source of truth: pkg/fsutil/configmanager/vcluster/Dockerfile
        grep '^FROM ' pkg/fsutil/configmanager/vcluster/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append Flux distribution controller images (must match warm-mirror-cache exactly)
        # Source of truth: pkg/svc/installer/flux/Dockerfile.distribution
        grep '^FROM ' pkg/svc/installer/flux/Dockerfile.distribution | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append KWOK control plane images (must match warm-mirror-cache exactly).
        # Source of truth: pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane
        grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append distribution node images (must match warm-mirror-cache exactly).
        # Source of truth: pkg/fsutil/configmanager/*/Dockerfile
        grep '^FROM ' pkg/fsutil/configmanager/k3d/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"
        grep '^FROM ' pkg/fsutil/configmanager/kind/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"
        grep '^FROM ' pkg/fsutil/configmanager/talos/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append CI test workload images (must match warm-mirror-cache exactly).
        # This also includes the workload-mirror tap and API connectivity pre-flight
        # pod images so mirror restores cover those pull paths too. See issue #3822
        # for related context.
        echo "docker.io/traefik/whoami:v1.10" >> "$IMAGES_FILE"
        echo "docker.io/library/busybox:1.36.1" >> "$IMAGES_FILE"
        echo "docker.io/nicolaka/netshoot:v0.16" >> "$IMAGES_FILE"

        # Deduplicate and sort (must match warm-mirror-cache exactly)
        sort -u "$IMAGES_FILE" > /tmp/unique-images.txt
        mv /tmp/unique-images.txt "$IMAGES_FILE"

        # Compute hash of the image list
        IMAGES_HASH=$(sha256sum "$IMAGES_FILE" | cut -c1-12)
        echo "images-hash=$IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 Images hash: $IMAGES_HASH"

        # Compute the KWOK control plane image hash (must match warm-mirror-cache
        # exactly). The KWOK pre-load tar lives in its own cache entry so it can be
        # regenerated independently of the four mirror volumes.
        KWOK_IMAGES_HASH=$(grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //' | sort -u | sha256sum | cut -c1-12)
        echo "kwok-images-hash=$KWOK_IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 KWOK images hash: $KWOK_IMAGES_HASH"

        # Compute the distribution node image hash (must match warm-mirror-cache
        # exactly). The dist-node pre-load tars live in their own cache entry so they
        # can be regenerated independently of the four mirror volumes.
        DIST_NODE_IMAGES_HASH=$(grep -h '^FROM ' \
          pkg/fsutil/configmanager/k3d/Dockerfile \
          pkg/fsutil/configmanager/kind/Dockerfile \
          pkg/fsutil/configmanager/talos/Dockerfile \
          | sed 's/^FROM //' | sort -u | sha256sum | cut -c1-12)
        echo "dist-node-images-hash=$DIST_NODE_IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 Distribution node images hash: $DIST_NODE_IMAGES_HASH"

    - name: 🔑 Generate cache key
      id: generate-key
      shell: bash
      env:
        CACHE_VERSION: ${{ inputs.cache-version }}
        RUNNER_OS: ${{ runner.os }}
        RUNNER_ARCH: ${{ runner.arch }}
        IMAGES_HASH: ${{ steps.extract-images.outputs.images-hash }}
        KWOK_IMAGES_HASH: ${{ steps.extract-images.outputs.kwok-images-hash }}
        DIST_NODE_IMAGES_HASH: ${{ steps.extract-images.outputs.dist-node-images-hash }}
      run: |
        CACHE_KEY="mirror-cache-${CACHE_VERSION}-${IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "cache-key=$CACHE_KEY" >> "$GITHUB_OUTPUT"

        # Must match warm-mirror-cache's KWOK cache key exactly.
        KWOK_CACHE_KEY="kwok-controlplane-${CACHE_VERSION}-${KWOK_IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "kwok-cache-key=$KWOK_CACHE_KEY" >> "$GITHUB_OUTPUT"

        # Must match warm-mirror-cache's dist-node cache key exactly.
        DIST_NODE_CACHE_KEY="dist-node-${CACHE_VERSION}-${DIST_NODE_IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "dist-node-cache-key=$DIST_NODE_CACHE_KEY" >> "$GITHUB_OUTPUT"

    - name: 📥 Restore mirror cache
      id: restore-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/mirror-cache
        key: ${{ steps.generate-key.outputs.cache-key }}
        restore-keys: |
          mirror-cache-${{ inputs.cache-version }}-

    - name: 📥 Restore KWOK control plane cache
      id: restore-kwok-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/kwok-cache
        # Exact match only (no restore-keys): a tar from a different tag set would
        # miss kwokctl's "docker inspect" anyway, so a miss simply falls back to a
        # live pull (with the provisioner's create retry) rather than a stale load.
        key: ${{ steps.generate-key.outputs.kwok-cache-key }}

    - name: 📥 Restore distribution node cache
      id: restore-dist-node-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/dist-node-cache
        # Exact match only (no restore-keys): a dist-node tar from a different tag
        # set would miss the provisioner's pinned digest and trigger a live pull
        # anyway, so a miss simply falls back to that live pull rather than loading
        # a stale tar.
        key: ${{ steps.generate-key.outputs.dist-node-cache-key }}

    - name: 📦 Import mirror volumes
      if: steps.restore-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "📦 Importing mirror registry volumes..."

        # Pull the tar-utility busybox via mirror.gcr.io (Google's anonymous
        # pull-through cache), not Docker Hub: the runner is logged in to Docker
        # Hub, so a direct pull counts against the authenticated rate limit and
        # leaks the session's dckr_jti token into error logs when throttled.
        # mirror.gcr.io is anonymous and not rate-limited. It re-serializes
        # manifests, so the upstream digest can't be pinned through it — we pin
        # by tag, exactly like registry:3 in pull-registry-image.sh.

        # Import docker.io mirror volume
        if [ -f "/tmp/mirror-cache/docker.io.tar" ]; then
          docker volume create docker.io 2>/dev/null || true
          docker run --rm \
            -v docker.io:/volume \
            -v /tmp/mirror-cache:/backup:ro \
            mirror.gcr.io/library/busybox:1.37 \
            sh -c "cd /volume && tar -xf /backup/docker.io.tar" || echo "⚠️ Failed to import docker.io mirror"
          echo "✅ Restored docker.io mirror cache"
        fi

        # Import ghcr.io mirror volume
        if [ -f "/tmp/mirror-cache/ghcr.io.tar" ]; then
          docker volume create ghcr.io 2>/dev/null || true
          docker run --rm \
            -v ghcr.io:/volume \
            -v /tmp/mirror-cache:/backup:ro \
            mirror.gcr.io/library/busybox:1.37 \
            sh -c "cd /volume && tar -xf /backup/ghcr.io.tar" || echo "⚠️ Failed to import ghcr.io mirror"
          echo "✅ Restored ghcr.io mirror cache"
        fi

        # Import quay.io mirror volume
        if [ -f "/tmp/mirror-cache/quay.io.tar" ]; then
          docker volume create quay.io 2>/dev/null || true
          docker run --rm \
            -v quay.io:/volume \
            -v /tmp/mirror-cache:/backup:ro \
            mirror.gcr.io/library/busybox:1.37 \
            sh -c "cd /volume && tar -xf /backup/quay.io.tar" || echo "⚠️ Failed to import quay.io mirror"
          echo "✅ Restored quay.io mirror cache"
        fi

        # Import registry.k8s.io mirror volume
        if [ -f "/tmp/mirror-cache/registry.k8s.io.tar" ]; then
          docker volume create registry.k8s.io 2>/dev/null || true
          docker run --rm \
            -v registry.k8s.io:/volume \
            -v /tmp/mirror-cache:/backup:ro \
            mirror.gcr.io/library/busybox:1.37 \
            sh -c "cd /volume && tar -xf /backup/registry.k8s.io.tar" || echo "⚠️ Failed to import registry.k8s.io mirror"
          echo "✅ Restored registry.k8s.io mirror cache"
        fi

    - name: 🐳 Load KWOK control plane images
      if: steps.restore-kwok-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        # Pre-load KWOK control plane images into Docker's local cache.
        # kwokctl's EnsureImage() calls "docker inspect <image>" before pulling;
        # if the image already exists locally, the pull is skipped entirely.
        # This avoids Google Artifact Registry rate limits when many KWOK test
        # jobs run in parallel. See issue #4058 for context. The tar is cached
        # under its own key (see warm-mirror-cache) so it is decoupled from the
        # four mirror volumes.
        if [ -f "/tmp/kwok-cache/kwok-control-plane.tar" ]; then
          docker load -i /tmp/kwok-cache/kwok-control-plane.tar
          echo "✅ KWOK control plane images pre-loaded (kwokctl will skip registry.k8s.io pulls)"
        else
          echo "⚠️ KWOK control plane tar not found in cache. KWOK tests will pull from registry.k8s.io."
          echo "   This may hit rate limits if many KWOK tests run in parallel."
        fi

    - name: 🐳 Load distribution node images
      if: steps.restore-dist-node-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        # Pre-load distribution node images (K3s, Kind, Talos) into Docker's
        # local cache. These images are pulled by the host Docker daemon during
        # cluster creation — not through containerd mirrors. If the image
        # already exists locally, the provisioner skips the upstream pull,
        # avoiding Docker Hub / GHCR rate limits during high-concurrency CI.
        # See issue #4301 for context.
        #
        # docker load restores tag-based lookups but NOT repo digest mappings.
        # The provisioners/config managers use digest-pinned references from
        # pkg/fsutil/configmanager/{k3d,kind,talos}/Dockerfile. After loading,
        # we verify each exact digest reference and re-pull if needed so Docker
        # records the repo digest mapping. Since layers are already present
        # from docker load, the re-pull is a lightweight manifest fetch only.
        for name in k3s-node kind-node talos-node; do
          if [ -f "/tmp/dist-node-cache/${name}.tar" ]; then
            if docker load -i "/tmp/dist-node-cache/${name}.tar"; then
              echo "✅ ${name} image pre-loaded"
            else
              echo "⚠️ Failed to load ${name}.tar — provisioner will pull from upstream registry"
            fi
          else
            echo "⚠️ ${name}.tar not found — provisioner will pull from upstream registry"
          fi
        done

        # Verify exact digest-pinned references resolve after docker load.
        # If they don't (expected — docker load only restores tags), re-pull
        # the exact reference. Layers are already present locally so this is
        # just a manifest download to register the digest mapping.
        DOCKERFILES=(
          "pkg/fsutil/configmanager/k3d/Dockerfile"
          "pkg/fsutil/configmanager/kind/Dockerfile"
          "pkg/fsutil/configmanager/talos/Dockerfile"
        )

        for dockerfile in "${DOCKERFILES[@]}"; do
          if [ ! -f "$dockerfile" ]; then
            echo "⚠️ Expected Dockerfile not found: $dockerfile"
            continue
          fi

          # Extract image reference (skip --platform flags, handle AS stage)
          from_line=$(grep '^FROM ' "$dockerfile" | head -1)
          # shellcheck disable=SC2086
          set -- $from_line
          shift  # remove FROM
          while [ $# -gt 0 ] && [[ "$1" == --* ]]; do shift; done
          image_ref="$1"

          if [ -z "$image_ref" ]; then
            echo "⚠️ No image reference found in $dockerfile"
            continue
          fi

          # Only verify digest-pinned references (tag-only refs work fine after load)
          if [[ "$image_ref" != *"@"* ]]; then
            echo "✅ Tag-only reference, no digest verification needed: $image_ref"
            continue
          fi

          if docker image inspect "$image_ref" >/dev/null 2>&1; then
            echo "✅ Exact digest reference available: $image_ref"
            continue
          fi

          echo "ℹ️ Digest reference missing after docker load: $image_ref"
          echo "   Re-pulling to register digest mapping (layers already present)..."
          if docker pull "$image_ref" --quiet; then
            if docker image inspect "$image_ref" >/dev/null 2>&1; then
              echo "✅ Digest reference registered: $image_ref"
            else
              echo "⚠️ Pull succeeded but digest still not resolvable: $image_ref"
              echo "   Provisioner will attempt its own pull at cluster creation time."
            fi
          else
            echo "⚠️ Failed to re-pull digest reference: $image_ref"
            echo "   Provisioner will attempt its own pull at cluster creation time."
          fi
        done

    - name: ℹ️ Cache miss notice
      if: steps.restore-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "⚠️ Mirror cache not found. Images will be pulled directly."
        echo "   This may increase test duration and risk rate limits."
        echo "   The warm-mirror-cache job should run before system tests."

name: Benchmark Regression

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  GOPROXY: "https://proxy.golang.org|direct"

concurrency:
  group: "benchmark-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Wait for sufficient GitHub API rate limit before proceeding
  rate-limit-gate:
    name: ⏳ Rate Limit Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/rate-limit-gate

  changes:
    name: 🔍 Detect Changes
    needs: [rate-limit-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  benchmark:
    name: 📊 Benchmark
    needs: [changes]
    if: >-
      (github.event_name == 'push' || github.event_name == 'pull_request')
      && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      pull-requests: write
    outputs:
      skip: ${{ steps.discover.outputs.skip }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🔍 Discover benchmark packages
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(grep -rl '^func Benchmark' --include='*_test.go' . \
            | xargs -I{} dirname {} \
            | sort -u || true)
          if [ -z "$pkgs" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "skip=false"
              echo "packages<<EOF"
              echo "$pkgs"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: 🏃 Run benchmarks
        if: steps.discover.outputs.skip == 'false'
        shell: bash
        env:
          PACKAGES: ${{ steps.discover.outputs.packages }}
        run: |
          set -euo pipefail
          echo "$PACKAGES" \
            | xargs go test -bench=. -benchmem -run='^$' -timeout=30m \
            | tee "$RUNNER_TEMP/bench.txt"

      - name: 🔍 Filter sub-microsecond benchmarks
        if: steps.discover.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # Create a filtered copy excluding benchmark lines with ns/op < 100
          # to avoid false positives from CPU clock jitter on shared CI runners
          # (see #3698). The original bench.txt is preserved for artifact upload
          # and historical storage.
          awk '/^Benchmark/ && /ns\/op/ {
            for (i = 1; i <= NF; i++) {
              if ($(i+1) == "ns/op" && $i + 0 < 100) next
            }
          } {print}' "$RUNNER_TEMP/bench.txt" > "$RUNNER_TEMP/bench-filtered.txt"

      - name: 📊 Compare benchmark results
        if: steps.discover.outputs.skip == 'false'
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          tool: go
          output-file-path: ${{ runner.temp }}/bench-filtered.txt
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: "150%"
          fail-threshold: "200%"
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          comment-on-alert: ${{ github.event_name == 'pull_request' }}
          summary-always: true

      - name: 📤 Upload benchmark results
        if: steps.discover.outputs.skip == 'false' && github.event_name == 'push'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bench-results
          path: ${{ runner.temp }}/bench.txt
          retention-days: 1

  benchmark-store:
    name: 📤 Store Benchmark Data
    needs: [changes, benchmark]
    if: >-
      github.event_name == 'push'
      && needs.changes.outputs.code == 'true'
      && needs.benchmark.outputs.skip == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📥 Download benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-results
          path: ${{ runner.temp }}

      - name: 📊 Store benchmark data
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          tool: go
          output-file-path: ${{ runner.temp }}/bench.txt
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          fail-on-alert: false
          comment-on-alert: false
          summary-always: false

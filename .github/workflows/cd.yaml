---
name: CD
on:
  push:
    tags:
      - "v*"

env:
  # Use pipe (|) instead of comma (,) so Go falls through to direct on ANY proxy
  # error (including 403), not just 404/410. Hardens CI against transient
  # proxy.golang.org outages. go.sum still verifies module integrity.
  GOPROXY: "https://proxy.golang.org|direct"
  # Soft memory limit for Go build toolchain. GoReleaser links multiple
  # platform binaries and the linker can exceed runner memory.
  GOMEMLIMIT: "6GiB"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🧹 Cleanup node
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Disable module cache restoration in release workflows to avoid
          # cache-poisoning risk for runtime artifacts (see https://docs.zizmor.sh/audits/#cache-poisoning)
          cache: false

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  vscode-extension:
    name: 🧩 Release VSCode Extension
    runs-on: ubuntu-latest
    needs: [goreleaser]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: vsce
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Compile
        run: npm run compile

      - name: 📦 Package extension
        run: npm run package

      - name: 📤 Publish to VS Code Marketplace
        run: npx @vscode/vsce publish "$VERSION"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VERSION: ${{ steps.get_version.outputs.version }}
        continue-on-error: true

      # - name: 📤 Publish to Open VSX Registry
      #   run: npx ovsx publish --pat ${{ secrets.OVSX_PAT }}
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   continue-on-error: true

      - name: 📦 Create VSIX package
        run: npx @vscode/vsce package "$VERSION" --out ksail_"$VERSION".vsix
        env:
          VERSION: ${{ steps.get_version.outputs.version }}

      - name: 📤 Upload VSIX to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" ksail_*.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mcp-publish:
    name: 📤 Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [goreleaser]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: 📝 Update server.json version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          IMAGE_TAG: ${{ steps.get_version.outputs.image_tag }}
        run: |
          jq --arg v "$VERSION" \
             --arg tag "$IMAGE_TAG" \
             '.version = $v | .packages[0].identifier = "ghcr.io/devantler-tech/ksail:" + $tag' \
             server.json > server.json.tmp && mv server.json.tmp server.json

      - name: 📥 Install mcp-publisher
        run: |
          curl -sLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz"
          curl -sLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/registry_1.5.0_checksums.txt"
          grep "mcp-publisher_linux_amd64.tar.gz$" registry_1.5.0_checksums.txt | sha256sum --check
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          rm mcp-publisher_linux_amd64.tar.gz registry_1.5.0_checksums.txt

      - name: 🔐 Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: 📤 Publish to MCP Registry
        run: ./mcp-publisher publish

  pages-build:
    name: 📄 Build Pages
    runs-on: ubuntu-latest
    needs: [goreleaser]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: ⚙️ Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: 📦 Install dependencies
        working-directory: docs
        run: npm ci

      - name: 📥 Download benchmark data
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/public
          if gh api "repos/{owner}/{repo}/contents/dev/bench/data.js?ref=benchmark-data" \
            -H "Accept: application/vnd.github.raw+json" > /tmp/data.js 2>/tmp/api_error.txt; then
            node -e "
              const s = require('fs').readFileSync('/tmp/data.js', 'utf8');
              const match = s.match(/^window\.BENCHMARK_DATA\s*=\s*([\s\S]+?);\s*\$/);
              if (!match) { process.stderr.write('Unexpected data.js format\n'); process.exit(1); }
              JSON.parse(match[1]);
              require('fs').writeFileSync('docs/public/benchmark-data.json', match[1]);
            "
            echo "Downloaded benchmark data from benchmark-data branch"
          else
            cat /tmp/api_error.txt >&2 || true
            echo "No benchmark data available yet"
          fi

      - name: 🏗️ Build with Astro
        working-directory: docs
        run: npm run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/dist

  pages-deploy:
    name: 🚀 Deploy Pages
    runs-on: ubuntu-latest
    needs: [pages-build]
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish-release:
    name: 📢 Publish Release
    runs-on: ubuntu-latest
    needs: [goreleaser, vscode-extension, mcp-publish, pages-deploy]
    permissions:
      contents: write
    steps:
      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 📢 Publish draft release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;

            // List releases and find the one matching the tag
            // Note: getReleaseByTag does not return draft releases, so we use listReleases instead
            let release;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              release = releases.find(r => r.tag_name === tag);
            } catch (error) {
              core.setFailed(`Failed to list releases: ${error.message}`);
              throw error;
            }

            if (!release) {
              core.setFailed(`Release not found for tag ${tag}`);
              return;
            }

            if (!release.draft) {
              console.log(`Release ${tag} is already published`);
              return;
            }

            // Publish the release
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });

            console.log(`Successfully published release ${tag}`);

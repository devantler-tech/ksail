{{- if and .Values.ui.enabled .Values.ui.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ksail-operator.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksail-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  {{- with .Values.ui.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ui.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ui.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ui.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if $.Values.api.bindPort }}
          # Route /api to the operator REST API Service so the same-origin SPA (and the OIDC
          # login/callback handled by the API) can reach it.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "ksail-operator.fullname" $ }}
                port:
                  number: {{ $.Values.api.bindPort }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ksail-operator.fullname" $ }}-ui
                port:
                  number: {{ $.Values.ui.service.port }}
          {{- end }}
    {{- end }}
{{- end }}

name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: devantler-tech/actions/sync-github-labels@172feec0374dfdb5d9777a12a7d4cd2291c03e08 # v7.1.1

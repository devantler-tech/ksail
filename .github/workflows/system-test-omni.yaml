name: "System Test - Omni"

on:
  workflow_dispatch:
    inputs:
      init:
        description: "Run ksail project init before create"
        required: false
        type: boolean
        default: true
      cni:
        description: "Container Network Interface"
        required: false
        type: choice
        options: [Default, Cilium, Calico]
        default: Default
      csi:
        description: "Container Storage Interface"
        required: false
        type: choice
        options: [Default, Enabled, Disabled]
        default: Default
      load_balancer:
        description: "LoadBalancer support"
        required: false
        type: choice
        options: [Default, Enabled, Disabled]
        default: Default
      metrics_server:
        description: "Metrics Server"
        required: false
        type: choice
        options: [Default, Enabled, Disabled]
        default: Default
      policy_engine:
        description: "Policy engine"
        required: false
        type: choice
        options: [None, Kyverno, Gatekeeper]
        default: None
      cert_manager:
        description: "Cert-Manager"
        required: false
        type: choice
        options: [Disabled, Enabled]
        default: Disabled
      gitops_engine:
        description: "GitOps engine"
        required: false
        type: choice
        options: [None, Flux, ArgoCD]
        default: None
      control_planes:
        description: "Number of control-plane nodes"
        required: false
        type: number
        default: 1
      workers:
        description: "Number of worker nodes"
        required: false
        type: number
        default: 0
  # schedule trigger paused (#4973): zero machines have been registered in the Omni instance
  # since ~2026-04-26, so every scheduled run failed at machine auto-discovery for 6+
  # consecutive weeks before any provisioning happened — pure noise, not signal. Re-enable
  # the weekly cron once a machine is registered; workflow_dispatch stays available for
  # on-demand runs meanwhile.

env:
  GOPROXY: "https://proxy.golang.org|direct"
  GOMEMLIMIT: "6GiB"

concurrency:
  group: system-test-omni
  cancel-in-progress: false

permissions: {}

jobs:
  build-artifact:
    name: 🏗️ Build KSail Binary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail

  warm-helm-cache:
    name: 🔥 Warm Helm Cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-artifact]
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🔥 Warm Helm chart cache
        uses: ./.github/actions/warm-helm-cache

  warm-mirror-cache:
    name: 🔥 Warm Mirror Cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-artifact]
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🔥 Warm mirror cache
        uses: ./.github/actions/warm-mirror-cache

  system-test:
    name: "🧪 System Test (Omni)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [build-artifact, warm-helm-cache, warm-mirror-cache]
    environment: ci
    permissions:
      actions: read
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        # On schedule: run all important configurations sequentially for broad E2E coverage.
        # On workflow_dispatch: run a single user-selected configuration.
        include: ${{ github.event_name == 'schedule' && fromJSON('[{"init":true,"suffix":"default-init","args":""},{"init":false,"suffix":"default-noinit","args":""},{"init":true,"suffix":"fullstack","args":"--cni Cilium --csi Enabled --load-balancer Enabled --metrics-server Enabled --policy-engine Kyverno --cert-manager Enabled --gitops-engine Flux --local-registry ghcr.io/devantler-tech/ksail/system-test-manifests"},{"init":true,"suffix":"altstack","args":"--cni Calico --csi Disabled --load-balancer Disabled --metrics-server Disabled --policy-engine Gatekeeper --gitops-engine ArgoCD --local-registry ghcr.io/devantler-tech/ksail/system-test-manifests"}]') || fromJSON(format('[{"init":{0},"suffix":"dispatch","args":""}]', inputs.init)) }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⏳ Wait for cloud test queue
        id: turnstyle
        continue-on-error: true
        uses: softprops/turnstyle@fa86562458e34a9067f0dc1316a76b3975b1c413 # v3.3.1
        with:
          same-branch-only: false
          job-to-wait-for: "🧪 System Test (Omni)"
          poll-interval-seconds: 30
          abort-after-seconds: 5400

      - name: 🔐 Login to Docker Hub
        if: steps.turnstyle.outcome == 'success' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env] - third-party action input, no environment scoping available

      - name: ⚙️ Setup Go
        if: steps.turnstyle.outcome == 'success'
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 📥 Restore Helm Cache
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/restore-helm-cache

      - name: 📥 Restore Mirror Cache
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/restore-mirror-cache

      - name: 🔧 Build args string
        if: steps.turnstyle.outcome == 'success'
        id: args
        shell: bash
        run: |
          ARGS="--name st-omni-${{ matrix.suffix }}-${{ github.run_id }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Build from user-selected inputs
            [[ "${{ inputs.cni }}" != "Default" && -n "${{ inputs.cni }}" ]] && ARGS+=" --cni ${{ inputs.cni }}"
            [[ "${{ inputs.csi }}" != "Default" && -n "${{ inputs.csi }}" ]] && ARGS+=" --csi ${{ inputs.csi }}"
            [[ "${{ inputs.load_balancer }}" != "Default" && -n "${{ inputs.load_balancer }}" ]] && ARGS+=" --load-balancer ${{ inputs.load_balancer }}"
            [[ "${{ inputs.metrics_server }}" != "Default" && -n "${{ inputs.metrics_server }}" ]] && ARGS+=" --metrics-server ${{ inputs.metrics_server }}"
            [[ "${{ inputs.policy_engine }}" != "None" && -n "${{ inputs.policy_engine }}" ]] && ARGS+=" --policy-engine ${{ inputs.policy_engine }}"
            [[ "${{ inputs.cert_manager }}" != "Disabled" && -n "${{ inputs.cert_manager }}" ]] && ARGS+=" --cert-manager ${{ inputs.cert_manager }}"
            [[ "${{ inputs.gitops_engine }}" != "None" && -n "${{ inputs.gitops_engine }}" ]] && ARGS+=" --gitops-engine ${{ inputs.gitops_engine }}"
            [[ "${{ inputs.control_planes }}" != "1" && -n "${{ inputs.control_planes }}" ]] && ARGS+=" --control-planes ${{ inputs.control_planes }}"
            [[ "${{ inputs.workers }}" != "0" && -n "${{ inputs.workers }}" ]] && ARGS+=" --workers ${{ inputs.workers }}"
          else
            # Use pre-defined matrix args for scheduled runs
            ARGS+=" ${{ matrix.args }}"
          fi

          echo "value=${ARGS}" >> "$GITHUB_OUTPUT"
          echo "Args: ${ARGS}"

      - name: 🧪 Run KSail System Test
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/ksail-system-test
        env:
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}
          KSAIL_SPEC_CLUSTER_OMNI_MACHINECLASS: ksail
        with:
          distribution: Talos
          provider: Omni
          init: ${{ matrix.init }}
          args: ${{ steps.args.outputs.value }}
          apply-overlay-path: ".github/fixtures/podinfo-overlay"
          test-kubernetes-provider: ${{ matrix.suffix == 'default-init' && 'true' || 'false' }}

          ghcr-user: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ❌ Fail on turnstyle failure
        if: steps.turnstyle.outcome != 'success'
        run: |
          echo "::error::Turnstyle failed or timed out waiting for cloud test queue — no resources were created"
          exit 1

  cleanup:
    name: 🧹 Cleanup Omni Resources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [system-test]
    if: always()
    environment: ci
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🧹 Cleanup KSail test clusters from Omni
        uses: ./.github/actions/cleanup-omni
        with:
          cluster-names: "st-omni-default-init-${{ github.run_id }} st-omni-default-noinit-${{ github.run_id }} st-omni-fullstack-${{ github.run_id }} st-omni-altstack-${{ github.run_id }} st-omni-dispatch-${{ github.run_id }}"
        env:
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}

name: Update Agent Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-agent-skills:
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/actions/.github/workflows/update-agent-skills.yaml@5aa2657f976103d716f585266a0fa4e964594df2 # v9.0.0
    with:
      dir: .agents/skills
      # Open the PR with a GitHub App token so the caller's `on: pull_request`
      # CI runs (a PR opened with GITHUB_TOKEN does not trigger workflows, so
      # the required `CI - Required Checks` never reports and the PR stays
      # blocked — see #5223). Matches platform + plugins, the other consumers.
      use-app-token: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

name: Benchmark Regression

on:
  pull_request:
  merge_group:

env:
  GOPROXY: "https://proxy.golang.org|direct"

concurrency:
  group: "benchmark-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

  benchmark:
    name: 📊 Benchmark (${{ matrix.branch }})
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      matrix:
        branch: [pr, main]
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch == 'main' && 'main' || github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🔍 Discover benchmark packages
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(grep -rl '^func Benchmark' --include='*_test.go' . \
            | xargs -I{} dirname {} \
            | sort -u || true)
          if [ -z "$pkgs" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "skip=false"
              echo "packages<<EOF"
              echo "$pkgs"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: 🏃 Run benchmarks
        if: steps.discover.outputs.skip == 'false'
        shell: bash
        env:
          PACKAGES: ${{ steps.discover.outputs.packages }}
        run: |
          set -euo pipefail
          echo "$PACKAGES" \
            | xargs go test -bench=. -benchmem -count=7 -benchtime=500ms -run='^$' -timeout=30m \
            | tee "$RUNNER_TEMP/bench.txt"

      - name: 📤 Upload results
        if: steps.discover.outputs.skip == 'false'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bench-${{ matrix.branch }}
          path: ${{ runner.temp }}/bench.txt
          retention-days: 1

  compare:
    name: 📊 Compare & Gate
    needs: [changes, benchmark]
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: 📦 Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260312031701-16a31bc5fbd0

      - name: 📥 Download results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/benchmarks

      - name: 📊 Compare and gate on regressions
        shell: bash
        run: |
          set -euo pipefail

          main_file="${RUNNER_TEMP}/benchmarks/bench-main/bench.txt"
          pr_file="${RUNNER_TEMP}/benchmarks/bench-pr/bench.txt"

          if [ ! -f "$main_file" ] || [ ! -f "$pr_file" ]; then
            echo "ℹ️ No benchmark results to compare (no benchmarks found)."
            exit 0
          fi

          echo "=== Benchmark Comparison (benchstat, confidence 0.95) ==="
          echo ""

          result=$(benchstat -confidence 0.95 "$main_file" "$pr_file" 2>&1) || true
          echo "$result"
          echo ""

          # Detect regressions from benchstat output.
          # With -confidence 0.95, benchstat shows directional changes when p < 0.05.
          # Two additional filters reduce false positives from cross-runner CI noise:
          #   1. A 40% noise floor for all metrics (cross-runner variance can exceed 30%)
          #   2. For sec/op, sub-microsecond benchmarks are skipped entirely — at that
          #      scale, CPU clock jitter dominates and percentage changes are meaningless
          regressions=0
          regression_details=""
          current_metric=""

          while IFS= read -r line; do
            # Detect which metric this line refers to (sec/op, B/op, or allocs/op)
            if echo "$line" | grep -qE '(sec/op|B/op|allocs/op)'; then
              current_metric=$(echo "$line" | grep -oE '(sec/op|B/op|allocs/op)' | head -1)
            fi

            # Check for regression (+ percentage with p-value), accepting integer or decimal percentages
            if echo "$line" | grep -qE '\+[0-9]+(\.[0-9]+)?%.*\(p='; then
              # For sec/op, skip sub-microsecond benchmarks (values shown with 'n' unit
              # like "0.31n" or "97.4n") — too small for reliable cross-runner comparison
              if [ "$current_metric" = "sec/op" ]; then
                if echo "$line" | grep -qE '[0-9.]+n '; then
                  continue
                fi
              fi

              delta=$(echo "$line" | grep -oE '\+[0-9]+(\.[0-9]+)?%' | head -1 | tr -d '+%')

              # Apply 40% noise floor to all metrics — main and PR benchmarks run on
              # different CI runners, so I/O-bound and memory operations can easily
              # vary 30%+ between machines.
              above_threshold=$(awk "BEGIN { print ($delta >= 40) }")
              if [ "$above_threshold" = "1" ]; then
                regressions=$((regressions + 1))
                bench_name=$(echo "$line" | awk '{print $1}')
                regression_details="${regression_details}  ${bench_name} (${current_metric}): +${delta}%\n"
              fi
            fi
          done <<< "$result"

          if [ "$regressions" -gt 0 ]; then
            echo ""
            echo "❌ $regressions benchmark regression(s) detected — failing check."
            echo -e "$regression_details"
            echo "Run 'go test -bench=. -benchmem -count=7 ./...' locally to investigate."
            exit 1
          else
            echo "✅ No benchmark regressions detected."
          fi

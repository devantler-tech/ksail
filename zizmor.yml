rules:
  impostor-commit:
    # Disabled: the org-level zizmor workflow token receives 403 when verifying
    # SHAs for private org repos (github/gh-aw-actions). zizmor v1.23.1 treats
    # this as a fatal crash rather than an ignorable finding, so the ignore list
    # cannot help. Disabling is the only workaround until fixed upstream.
    disable: true
  known-vulnerable-actions:
    # Disabled: same root cause as impostor-commit above. The advisory API
    # (api.github.com/advisories?ecosystem=actions) returns 403 for the
    # org-level workflow token, causing a fatal crash in zizmor v1.23.1.
    # Both impostor-commit and known-vulnerable-actions are the only online-only
    # audits; all other audits remain active.
    disable: true
  template-injection:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  ref-version-mismatch:
    ignore:
      - agentics-maintenance.yml
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  excessive-permissions:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  artipacked:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  dangerous-triggers:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  unpinned-uses:
    ignore:
      - agentics-maintenance.yml
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  secrets-outside-env:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml

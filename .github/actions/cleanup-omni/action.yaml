name: Cleanup Omni Resources
description: |
  Deletes the specified KSail system-test clusters from Omni to ensure clean slate
  for next CI run, even if individual test jobs fail to clean up after themselves.

inputs:
  cluster-names:
    description: "Space-separated list of cluster names to delete"
    required: true

runs:
  using: composite
  steps:
    - name: 🧹 Cleanup KSail system-test clusters from Omni
      shell: bash
      env:
        CLUSTER_NAMES: ${{ inputs.cluster-names }}
      run: |
        set -euo pipefail

        echo "🧹 Starting Omni cleanup for KSail system-test clusters..."

        MISSING_OMNI_ENV_VARS=()
        if [[ -z "${OMNI_SERVICE_ACCOUNT_KEY:-}" ]]; then
          MISSING_OMNI_ENV_VARS+=("OMNI_SERVICE_ACCOUNT_KEY")
        fi
        if [[ -z "${OMNI_ENDPOINT:-}" ]]; then
          MISSING_OMNI_ENV_VARS+=("OMNI_ENDPOINT")
        fi

        if (( ${#MISSING_OMNI_ENV_VARS[@]} > 0 )); then
          echo "❌ Missing required Omni environment variable(s): ${MISSING_OMNI_ENV_VARS[*]}"
          echo "   Set OMNI_SERVICE_ACCOUNT_KEY and OMNI_ENDPOINT before running cleanup."
          exit 1
        fi

        if ! command -v ksail >/dev/null 2>&1; then
          echo "❌ ksail is not installed or not available on PATH"
          exit 1
        fi

        # Delete each cluster name passed as input
        for CLUSTER_NAME in ${CLUSTER_NAMES}; do
          echo "🗑️  Deleting cluster: ${CLUSTER_NAME}"

          DELETE_OUTPUT=""
          if ! DELETE_OUTPUT="$(ksail cluster delete --name "${CLUSTER_NAME}" --provider Omni --force 2>&1)"; then
            if printf '%s\n' "${DELETE_OUTPUT}" | grep -qiE 'not found|does not exist|already deleted'; then
              echo "  ⚠️  Cluster ${CLUSTER_NAME} does not exist or was already deleted"
              continue
            fi

            echo "❌ Failed to delete cluster ${CLUSTER_NAME}"
            printf '%s\n' "${DELETE_OUTPUT}"
            exit 1
          fi

          printf '%s\n' "${DELETE_OUTPUT}"
          echo "  ✓ Deleted cluster ${CLUSTER_NAME}"
        done

        echo "✅ Omni cleanup complete!"

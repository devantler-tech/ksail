name: Benchmark Regression

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

env:
  GOPROXY: "https://proxy.golang.org|direct"

concurrency:
  group: "benchmark-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  benchmark:
    name: 📊 Benchmark (${{ matrix.branch }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      matrix:
        branch: [pr, main]
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch == 'main' && 'main' || github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: 🔍 Discover benchmark packages
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(grep -rl '^func Benchmark' --include='*_test.go' . \
            | xargs -I{} dirname {} \
            | sort -u || true)
          if [ -z "$pkgs" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "skip=false"
              echo "packages<<EOF"
              echo "$pkgs"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: 🏃 Run benchmarks
        if: steps.discover.outputs.skip == 'false'
        shell: bash
        env:
          PACKAGES: ${{ steps.discover.outputs.packages }}
        run: |
          set -euo pipefail
          echo "$PACKAGES" \
            | xargs go test -bench=. -benchmem -count=10 -benchtime=1s -run='^$' -timeout=30m \
            | tee "$RUNNER_TEMP/bench.txt"

      - name: 📤 Upload results
        if: steps.discover.outputs.skip == 'false'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bench-${{ matrix.branch }}
          path: ${{ runner.temp }}/bench.txt
          retention-days: 1

  compare:
    name: 📊 Compare & Report
    needs: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: ⚙️ Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: 📦 Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: 📥 Download results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: ${{ runner.temp }}/benchmarks

      - name: 📊 Compare benchmarks
        run: |
          main_file="${RUNNER_TEMP}/benchmarks/bench-main/bench.txt"
          pr_file="${RUNNER_TEMP}/benchmarks/bench-pr/bench.txt"
          result_file="${RUNNER_TEMP}/benchstat-result.txt"

          if [ ! -f "$main_file" ] || [ ! -f "$pr_file" ]; then
            echo "No benchmark results to compare (no benchmarks found)." > "$result_file"
            exit 0
          fi

          benchstat -confidence 0.999 "$main_file" "$pr_file" > "$result_file" 2>&1 || true

      - name: 💬 Post benchmark comparison
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const resultFile = process.env.RUNNER_TEMP + '/benchstat-result.txt';
            const raw = fs.existsSync(resultFile) ? fs.readFileSync(resultFile, 'utf8').trimEnd() : '';

            // Parse benchstat v2 output into regressions, improvements, unchanged
            const regressions = [];
            const improvements = [];
            const unchanged = [];

            if (raw && !raw.startsWith('No benchmark results')) {
              let currentMetric = '';

              for (const line of raw.split('\n')) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                // Detect metric from header rows (contain │ and a metric keyword)
                const metricMatch = trimmed.match(/│\s*(sec\/op|B\/op|allocs\/op)\s/i);
                if (metricMatch) {
                  currentMetric = metricMatch[1];
                  continue;
                }

                // Skip header/separator lines
                if (trimmed.includes('│')) continue;
                if (!trimmed.match(/^\S/)) continue;
                if (trimmed.startsWith('geomean')) continue;

                // Extract benchmark name (first token)
                const nameRaw = trimmed.split(/\s+/)[0] || '';
                const name = nameRaw
                  .replace(/^Benchmark/, '')
                  .replace(/-\d+$/, '');
                if (!name || !currentMetric) continue;

                // Classify: unchanged (~), regression (+), or improvement (-)
                const unchangedMatch = trimmed.match(/~\s*\(p=[\d.]+/);
                const deltaMatch = trimmed.match(/([+-][\d.]+%)\s*\(p=([\d.]+)/);

                if (unchangedMatch) {
                  unchanged.push({ name, metric: currentMetric });
                } else if (deltaMatch) {
                  const delta = deltaMatch[1];
                  const pValue = parseFloat(deltaMatch[2]);
                  const absDelta = Math.abs(parseFloat(delta));

                  // Strict filtering: p < 0.001 required for significance.
                  // For sec/op, also require >= 10% change to filter runner noise.
                  const isSignificant = pValue < 0.001;
                  const isAboveNoiseFloor = currentMetric !== 'sec/op' || absDelta >= 10;

                  if (!isSignificant || !isAboveNoiseFloor) {
                    unchanged.push({ name, metric: currentMetric });
                  } else if (delta.startsWith('+')) {
                    regressions.push({ name, metric: currentMetric, delta, pValue: pValue.toFixed(4) });
                  } else {
                    improvements.push({ name, metric: currentMetric, delta, pValue: pValue.toFixed(4) });
                  }
                } else {
                  unchanged.push({ name, metric: currentMetric });
                }
              }
            }

            // Build verdict
            const noData = raw.startsWith('No benchmark results') ||
              (!regressions.length && !improvements.length && !unchanged.length);
            let verdict;
            if (noData) {
              verdict = 'ℹ️ No benchmarks to compare — no benchmark functions found in changed packages.';
            } else if (regressions.length > 0) {
              verdict = `⚠️ **${regressions.length} benchmark${regressions.length > 1 ? 's' : ''} regressed** — review the table below.`;
            } else if (improvements.length > 0) {
              verdict = `✅ No regressions detected — ${improvements.length} benchmark${improvements.length > 1 ? 's' : ''} improved.`;
            } else {
              verdict = '✅ No regressions detected — all benchmarks are within noise.';
            }

            // Build tables
            const tableHeader = '| Benchmark | Metric | Change | p-value |\n|:---|:---|:---|:---|';
            let sections = '';

            if (regressions.length > 0) {
              const rows = regressions.map(r =>
                `| ${r.name} | \`${r.metric}\` | 🔴 ${r.delta} | ${r.pValue} |`
              ).join('\n');
              sections += `\n### 🔴 Regressions\n\n${tableHeader}\n${rows}\n`;
            }

            if (improvements.length > 0) {
              const rows = improvements.map(r =>
                `| ${r.name} | \`${r.metric}\` | 🟢 ${r.delta} | ${r.pValue} |`
              ).join('\n');
              sections += `\n### 🟢 Improvements\n\n${tableHeader}\n${rows}\n`;
            }

            if (unchanged.length > 0) {
              const rows = unchanged.map(r =>
                `| ${r.name} | \`${r.metric}\` | ~ | — |`
              ).join('\n');
              sections += `\n<details>\n<summary>⚪ Unchanged (${unchanged.length})</summary>\n\n${tableHeader}\n${rows}\n\n</details>\n`;
            }

            // Compose comment
            const body = [
              '## 📊 Benchmark Regression Report',
              '',
              verdict,
              sections,
              '<details>',
              '<summary>📖 How to interpret</summary>',
              '',
              '- **sec/op**: Time per operation (lower is better)',
              '- **B/op**: Bytes allocated per operation (lower is better)',
              '- **allocs/op**: Allocations per operation (lower is better)',
              '- **🔴 Regression**: Statistically significant increase (p < 0.001, and ≥ 10% for sec/op)',
              '- **🟢 Improvement**: Statistically significant decrease (p < 0.001, and ≥ 10% for sec/op)',
              '- **⚪ ~ (Unchanged)**: No significant change (p ≥ 0.001 or < 10% for sec/op)',
              '',
              '</details>',
              '',
              '<details>',
              '<summary>🔬 Raw benchstat output</summary>',
              '',
              '```',
              raw,
              '```',
              '',
              '</details>',
              '',
              `> Generated by the [Benchmark Regression](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) workflow. See [docs/BENCHMARK-REGRESSION.md](docs/BENCHMARK-REGRESSION.md) for details.`,
            ].join('\n');

            // Upsert comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📊 Benchmark Regression Report';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

name: 🧩 Web UI

on:
  pull_request:
    paths:
      - "web/ui/**"
      - ".github/workflows/web-ui.yaml"
  push:
    branches: [main]
    paths:
      - "web/ui/**"
      - ".github/workflows/web-ui.yaml"

permissions:
  contents: read

# The web UI is embedded into the binary (go:embed via pkg/webui) and served by the operator and
# `ksail open web`/`ksail open desktop` themselves — there is no separate UI container image. This workflow is the fast
# type-check/build gate for UI changes; the embedded bundle is produced during the operator image
# build (see .goreleaser.yaml and .github/actions/operator-chart-e2e).
jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web/ui
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "web/ui/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

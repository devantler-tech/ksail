name: 🧩 Desktop App

on:
  pull_request:
    paths:
      - "desktop/**"
      - "pkg/cli/uiserver/**"
      - "pkg/webui/**"
      - "web/ui/**"
      # The desktop module vendors the main module via `replace => ../`, so a root
      # dependency bump (which touches only go.mod/go.sum) can break the desktop
      # build. Trigger on those too so drift is caught here, not at release time.
      - "go.mod"
      - "go.sum"
      - ".goreleaser.desktop.yaml"
      - ".github/workflows/desktop.yaml"
      - ".github/actions/setup-desktop-build/**"
      - ".github/actions/free-disk-space/**"
      - "scripts/stage-webui.sh"
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "pkg/cli/uiserver/**"
      - "pkg/webui/**"
      - "web/ui/**"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.desktop.yaml"
      - ".github/workflows/desktop.yaml"
      - ".github/actions/setup-desktop-build/**"
      - ".github/actions/free-disk-space/**"
      - "scripts/stage-webui.sh"

permissions:
  contents: read

jobs:
  build-linux:
    name: 🏗️ Build (Linux)
    # Wails v3's default Linux build targets GTK4 + WebKitGTK 6.0 (libgtk-4-dev + libwebkitgtk-6.0-dev),
    # which are available on ubuntu-24.04 (22.04 only ships the legacy webkit2gtk-4.0/4.1).
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🛠️ Setup desktop build (Go, Node.js, webview deps, staged web UI)
        uses: ./.github/actions/setup-desktop-build

      # The desktop app is a SEPARATE Go module that vendors the main module via `replace => ../`, so
      # its go.mod/go.sum must independently track the main module's dependency graph. The main repo's
      # Tidy check does not cover it, so a dependency bump in the root module (e.g. hcloud-go) can
      # leave desktop/go.{mod,sum} stale and break this build with a cryptic "updates to go.mod
      # needed" / "missing go.sum entry". Fail fast with a clear, actionable message instead: run
      # `go -C desktop mod tidy` and commit the result.
      #
      # Same-repo PRs are exempt: ci.yaml's verify-desktop-tidy job self-heals them (it commits the
      # tidy diff back to the PR branch via the auto-commit job), so hard-failing here would only add
      # a transient red X that the auto-commit push then re-runs. Keep the hard gate for pushes to
      # main and for fork PRs, which the self-heal cannot push to.
      - name: 🧹 Verify desktop module is tidy
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
        working-directory: desktop
        run: go mod tidy -diff

      - name: 🏗️ Build desktop app
        working-directory: desktop
        run: go build -o ksail-desktop .

      # The desktop module's tests are not covered by the main repo's test suite (separate module),
      # so run them here — this is the only CI leg with the CGO webview toolchain they compile against.
      - name: 🧪 Test desktop module
        working-directory: desktop
        run: go test ./...

  # Validate the full macOS desktop release pipeline (build into KSail.app, archive, cask
  # generation) without publishing. --snapshot needs no secrets, so this runs on fork PRs too.
  build-macos:
    name: 🏗️ Build + cask (macOS)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏗️ Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --config .goreleaser.desktop.yaml

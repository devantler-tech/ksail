version: 2

before:
  hooks:
    - go mod tidy
    # Build the web UI and stage it into pkg/webui/dist so it is embedded in the release binary
    # (see pkg/webui/embed.go) and served by both the operator and `ksail open web`/`ksail open desktop` — same origin
    # as /api, no reverse proxy. Built assets are gitignored, so this keeps the working tree clean.
    - bash scripts/stage-webui.sh

builds:
  - binary: ksail
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/devantler-tech/ksail/v7/internal/buildmeta.Version={{.Version}} -X github.com/devantler-tech/ksail/v7/internal/buildmeta.Commit={{.Commit}} -X github.com/devantler-tech/ksail/v7/internal/buildmeta.Date={{.Date}}
    hooks:
      pre:
        - go tool bundler --platform {{ .Os }}/{{ .Arch }} --cli-version 1.0.10

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

homebrew_casks:
  - name: ksail
    # The download URL host (github.com) differs from the homepage host
    # (ksail.devantler.tech), so `brew audit --strict` requires the URL to be
    # marked `verified:` with a trusted prefix. Applied to the default url_template.
    url:
      verified: "github.com/devantler-tech/ksail/"
    # `brew style` (Cask/Desc) rejects a desc that starts with the cask token
    # ("ksail") or ends with a full stop; keep it a plain noun phrase.
    description: "CLI tool to manage Kubernetes clusters and workloads"
    # Trailing slash required by `brew style` (Cask/HomepageUrlStyling).
    homepage: "https://ksail.devantler.tech/"
    repository:
      owner: devantler-tech
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_GITHUB_API_TOKEN }}"
      branch: "goreleaser/{{ .ProjectName }}-{{ .Tag }}"
      pull_request:
        enabled: true
        # Open as a draft so the tap cannot auto-merge it while the GitHub release is still a draft
        # (the cask download URL would 404 for `brew install`). The cd.yaml `homebrew` job marks the
        # PR ready after `publish-release` flips the release public, letting the tap merge it then.
        draft: true
    hooks:
      post:
        # Single-line body: use the modifier form so `brew style`
        # (Style/IfUnlessModifier) is satisfied.
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ksail"] if OS.mac?
    commit_author:
      signing:
        enabled: true
        key: "{{ .Env.GPG_PRIVATE_KEY }}"
        program: gpg2
        format: openpgp

dockers_v2:
  - images:
      - "ghcr.io/devantler-tech/ksail"
    tags:
      - "{{ .Tag }}"
      - "latest"
    labels:
      "org.opencontainers.image.description": "KSail is a CLI tool to manage clusters and workloads."
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.licenses": "PolyForm-Shield-1.0.0"
  # Steering-agent image for `ksail workload intercept` (#5882). Same ksail
  # binary as the CLI image, on an Alpine base that carries the iptables
  # userspace + `sleep` holder the injected steering container needs. It ships
  # latent — `mirror.DefaultSteerImage` is not yet repointed at it (a follow-up
  # flips the default once this image publishes), so no runtime behaviour
  # changes here. Built + signed by the same release pipeline (docker_signs
  # `artifacts: all` below covers it).
  - id: ksail-steer
    images:
      - "ghcr.io/devantler-tech/ksail-steer"
    dockerfile: Dockerfile.steer
    tags:
      - "{{ .Tag }}"
      - "latest"
    labels:
      "org.opencontainers.image.description": "KSail traffic-steering agent image for `ksail workload intercept`."
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}-steer"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.licenses": "PolyForm-Shield-1.0.0"

# Keyless cosign signature for the published container image (the same
# `ghcr.io/devantler-tech/ksail` image the ksail-operator runs). Signing it
# lets downstream consumers verify provenance at the pull layer — e.g. a Talos
# ImageVerificationConfig rule over ghcr.io/devantler-tech/*, which otherwise
# blocks the operator with "no valid signature found" because the image is
# unsigned. Keyless uses the GitHub Actions OIDC identity (cd.yaml grants
# `id-token: write` and installs cosign); the signature is pushed to GHCR
# next to the image. Signs by digest to avoid races; `artifacts: all` covers
# the dockers_v2 image.
docker_signs:
  - artifacts: all
    cmd: cosign
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?((feat|fix|perf|refactor)(\(.+\))?!:|BREAKING CHANGE:)'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?:'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?:'
      order: 2
    - title: "Performance Improvements"
      regexp: '^.*?perf(\(.+\))?:'
      order: 3
    - title: "Refactoring"
      regexp: '^.*?refactor(\(.+\))?:'
      order: 4
    - title: "Other Changes"
      order: 999

release:
  draft: true
  extra_files:
    # Attach the Cluster CRD so it can be applied without the Helm chart.
    - glob: ./charts/ksail-operator/crds/*.yaml
  footer: |
    ## Quick Start

    **Homebrew Cask** (macOS):

    ```bash
    # Standard installation:
    brew install --cask devantler-tech/tap/ksail

    # If you encounter macOS quarantine issues:
    brew install --cask --no-quarantine devantler-tech/tap/ksail
    ```

    **Go Install**:

    ```bash
    go install github.com/devantler-tech/ksail/v7@{{ .Tag }}
    ```

    **Download Binary**: Choose your platform from the assets above

    **Docker**:

    ```bash
    docker pull ghcr.io/devantler-tech/ksail:{{ .Tag }}
    ```

    ---
    **Full Changelog**: https://github.com/devantler-tech/ksail/compare/{{ .PreviousTag }}...{{ .Tag }}

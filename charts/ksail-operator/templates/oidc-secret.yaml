{{- if .Values.auth.oidc.enabled -}}
{{- if not .Values.api.bindPort }}
{{- fail "auth.oidc.enabled=true requires api.bindPort to be non-zero: OIDC is enforced by the operator REST API." }}
{{- end }}
{{- if not .Values.auth.oidc.issuerURL }}
{{- fail "auth.oidc.enabled=true requires auth.oidc.issuerURL." }}
{{- end }}
{{- if not .Values.auth.oidc.clientID }}
{{- fail "auth.oidc.enabled=true requires auth.oidc.clientID." }}
{{- end }}
{{- if and (not .Values.ui.ingress.enabled) (not .Values.auth.oidc.redirectURL) }}
{{- fail "auth.oidc.enabled=true requires ui.ingress.enabled=true or an explicit auth.oidc.redirectURL." }}
{{- end }}
{{- if and (not .Values.auth.oidc.clientSecret) (not .Values.auth.oidc.existingSecret) }}
{{- fail "auth.oidc.enabled=true requires auth.oidc.clientSecret or auth.oidc.existingSecret." }}
{{- end }}
{{- if not .Values.auth.oidc.existingSecret }}
{{- $secretName := include "ksail-operator.oidc.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $session := .Values.auth.oidc.sessionSecret }}
{{- if and (not $session) $existing }}
{{- $session = index $existing.data "session-secret" | b64dec }}
{{- end }}
{{- if not $session }}
{{- $session = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksail-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
type: Opaque
data:
  client-secret: {{ .Values.auth.oidc.clientSecret | b64enc | quote }}
  session-secret: {{ $session | b64enc | quote }}
{{- end }}
{{- end }}

name: 🧩 Web UI

on:
  pull_request:
    paths:
      - "web/ui/**"
      - ".github/workflows/web-ui.yaml"
  push:
    branches: [main]
    paths:
      - "web/ui/**"
      - ".github/workflows/web-ui.yaml"

permissions:
  contents: read

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web/ui
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "web/ui/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

  # Publish only runs on push to main, so PRs (including forks) stay build-only
  # and need no registry credentials. Releases are tagged by cd.yaml; this keeps
  # the floating :latest fresh between releases.
  publish:
    name: 📤 Publish Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏷️ Compute short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push web UI image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: web/ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/devantler-tech/ksail/web-ui:latest
            ghcr.io/devantler-tech/ksail/web-ui:sha-${{ steps.vars.outputs.sha }}

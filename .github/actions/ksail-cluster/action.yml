name: "KSail Cluster"
description: "Provision a KSail Kubernetes cluster for CI testing"

inputs:
  config:
    description: "Path to a KSail config file (e.g. 'ksail.staging.yaml'). When set, --config is passed to all ksail commands."
    default: ""
  distribution:
    description: "KSail distribution to provision (Vanilla, K3s, Talos, VCluster)"
    default: "Vanilla"
  provider:
    description: "Infrastructure provider (Docker, Hetzner, Omni). Cloud providers require credentials via env vars: HCLOUD_TOKEN for Hetzner, OMNI_SERVICE_ACCOUNT_KEY and OMNI_ENDPOINT for Omni."
    default: "Docker"
  args:
    description: "Additional CLI arguments passed to cluster init (and create when init is skipped)"
    default: ""
  init:
    description: "Whether to run ksail cluster init before create"
    default: "true"
  ksail-version:
    description: "KSail version to install (e.g. '5.55.0') or 'latest'"
    default: "latest"
  install:
    description: "Whether to install KSail from releases (set to 'false' if already in PATH)"
    default: "true"
  cache:
    description: "Enable caching of Helm charts and mirror registry volumes between CI runs"
    default: "true"
  sops-age-key:
    description: "SOPS Age private key for decrypting secrets (imports key locally; KSail creates the in-cluster secret during Flux setup)"
    default: ""
  hosts-file:
    description: "Path to hosts file to append to /etc/hosts"
    default: ""
  root-ca-cert-file:
    description: "Path to root CA certificate to install as trusted"
    default: ""
  push:
    description: "Whether to push manifests after cluster creation"
    default: "false"
  reconcile:
    description: "Whether to reconcile workloads after push"
    default: "false"
  validate:
    description: "Whether to validate manifests before cluster creation"
    default: "false"
  scan:
    description: "Whether to run ksail workload scan (can be enabled independently of validate)"
    default: "false"
  scan-framework:
    description: "Comma-separated security frameworks to scan against (e.g. 'nsa,mitre'). Supports any framework known to Kubescape."
    default: "nsa"
  scan-compliance-threshold:
    description: "Fail if the compliance score is below this threshold (0–100)"
    default: "0"
  scan-format:
    description: "Scan output format (pretty-printer, json, sarif, junit). Use sarif with scan-output to enable GitHub Code Scanning upload."
    default: "pretty-printer"
  scan-output:
    description: "File path to write scan results to. Defaults to stdout when empty."
    default: ""
  scan-path:
    description: "Path to scan. When empty, ksail resolves the path from the active config file (or 'k8s/' by default)."
    default: ""
  scan-verbose:
    description: "Show all scanned resources in output, not just failed ones"
    default: "false"
  delete:
    description: "Whether to delete the cluster at the end (runs even on failure)"
    default: "false"

outputs:
  kubeconfig:
    description: "Path to the kubeconfig file for the provisioned cluster"
    value: ${{ steps.create.outputs.kubeconfig }}

runs:
  using: composite
  steps:
    - name: 📥 Install KSail
      if: inputs.install == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        KSAIL_VERSION: ${{ inputs.ksail-version }}
        RUNNER_ARCH: ${{ runner.arch }}
      run: |
        set -euo pipefail
        # Map runner.arch to Go arch naming
        case "$RUNNER_ARCH" in
          X64)   GOARCH="amd64" ;;
          ARM64) GOARCH="arm64" ;;
          *)     echo "❌ Unsupported runner architecture: $RUNNER_ARCH"; exit 1 ;;
        esac
        tmpdir="$(mktemp -d)"
        # A pinned version that resolves to a draft, deleted, or never-cut release makes
        # `gh release download` fail with an opaque "release not found"; the same happens when a
        # published release is missing the linux_<arch> asset. Wrap it so CI gets an actionable
        # message naming the version and the exact failure modes instead (see #5060).
        if [ "$KSAIL_VERSION" = "latest" ]; then
          download_args=(--repo devantler-tech/ksail)
        else
          download_args=("v${KSAIL_VERSION}" --repo devantler-tech/ksail)
        fi
        if ! gh release download "${download_args[@]}" \
          --pattern "ksail_*_linux_${GOARCH}.tar.gz" \
          --dir "$tmpdir"; then
          echo "::error::Could not download KSail '${KSAIL_VERSION}' (linux_${GOARCH})." >&2
          echo "::error::The release may not exist, may be an unpublished draft, or may be missing the linux_${GOARCH} asset." >&2
          echo "::error::Pin a published version from https://github.com/devantler-tech/ksail/releases." >&2
          exit 1
        fi
        tar -xzf "$tmpdir"/ksail_*_linux_${GOARCH}.tar.gz -C "$tmpdir"
        sudo install "$tmpdir/ksail" /usr/local/bin/ksail
        rm -rf "$tmpdir"
        ksail --version

    - name: ✅ Validate Hetzner inputs
      if: inputs.provider == 'Hetzner'
      shell: bash
      run: |
        if [ -z "$HCLOUD_TOKEN" ]; then
          echo "❌ ERROR: HCLOUD_TOKEN env var is required when provider is Hetzner" >&2
          exit 1
        fi

    - name: ✅ Validate Omni inputs
      if: inputs.provider == 'Omni'
      shell: bash
      run: |
        if [ -z "$OMNI_SERVICE_ACCOUNT_KEY" ]; then
          echo "❌ ERROR: OMNI_SERVICE_ACCOUNT_KEY env var is required when provider is Omni" >&2
          exit 1
        fi
        if [ -z "$OMNI_ENDPOINT" ]; then
          echo "❌ ERROR: OMNI_ENDPOINT env var is required when provider is Omni" >&2
          exit 1
        fi

    - name: 📋 Compute cache keys
      if: inputs.cache == 'true'
      id: cache-keys
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ inputs.args }}
        KSAIL_VERSION: ${{ inputs.ksail-version }}
        CONFIG: ${{ inputs.config }}
      run: |
        echo "ksail-version=$KSAIL_VERSION" >> "$GITHUB_OUTPUT"

        if [ "$PROVIDER" = "Docker" ]; then
          # shellcheck disable=SC2086
          IMAGES=$(ksail ${CONFIG:+--config "$CONFIG"} workload images --distribution "$DISTRIBUTION" $ARGS 2>/dev/null || true)
          if [ -n "$IMAGES" ]; then
            IMAGES_HASH=$(echo "$IMAGES" | sort -u | sha256sum | cut -c1-12)
          else
            IMAGES_HASH="none"
          fi
          echo "images-hash=$IMAGES_HASH" >> "$GITHUB_OUTPUT"
        fi

    - name: 📥 Restore Helm chart cache
      if: inputs.cache == 'true'
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ~/.cache/helm/content
          ~/.cache/helm/repository
          ~/.config/helm/repositories.yaml
        key: ksail-helm-${{ steps.cache-keys.outputs.ksail-version }}-${{ runner.os }}-${{ runner.arch }}
        restore-keys: |
          ksail-helm-

    - name: 📥 Restore mirror cache
      if: inputs.cache == 'true' && inputs.provider == 'Docker'
      id: restore-mirror
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/ksail-mirror-cache
        key: ksail-mirror-${{ steps.cache-keys.outputs.images-hash }}-${{ runner.os }}-${{ runner.arch }}
        restore-keys: |
          ksail-mirror-

    - name: 📦 Import mirror volumes
      if: inputs.cache == 'true' && inputs.provider == 'Docker' && steps.restore-mirror.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "📦 Importing mirror registry volumes..."
        for registry in docker.io ghcr.io quay.io registry.k8s.io; do
          if [ -f "/tmp/ksail-mirror-cache/${registry}.tar" ]; then
            docker volume create "$registry" 2>/dev/null || true
            if docker run --rm \
              -v "${registry}":/volume \
              -v /tmp/ksail-mirror-cache:/backup:ro \
              busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f \
              sh -c "cd /volume && tar -xf /backup/${registry}.tar"; then
              echo "  ✅ Restored $registry mirror cache"
            else
              echo "  ⚠️ Failed to import $registry mirror"
            fi
          fi
        done

    - name: 📥 Pre-pull registry image
      if: inputs.provider == 'Docker'
      shell: bash
      # Inlined rather than `uses: ./.github/actions/pull-registry-image`: a `./`
      # path inside a composite action resolves against the *consumer's*
      # workspace, not this repo, so the local reference breaks every external
      # caller of ksail-cluster (actions/runner#1348). Pinning a repo-qualified
      # ref instead would force a post-release version bump on every tag, so the
      # logic lives here directly. Keep it in sync with the standalone
      # .github/actions/pull-registry-image action used internally by
      # warm-mirror-cache.
      run: |
        set -euo pipefail

        # mirror.gcr.io is Google's anonymous pull-through cache for Docker Hub;
        # it is not subject to Docker Hub's per-IP anonymous rate limits, which is
        # what causes the recurring "registry:3 pull timeout" flake on shared CI
        # runners. Try the mirror first, then fall back to Docker Hub directly,
        # and re-tag whichever source succeeds to the canonical registry:3.
        obtain_registry_image() {
          local ref attempt
          for ref in mirror.gcr.io/library/registry:3 registry:3; do
            for attempt in 1 2 3; do
              if docker pull --quiet "$ref"; then
                docker tag "$ref" registry:3
                echo "✅ registry:3 obtained from ${ref}"
                return 0
              fi
              echo "⚠️ pull ${ref} attempt ${attempt}/3 failed; retrying in $((attempt * 5))s…"
              sleep "$((attempt * 5))"
            done
          done
          return 1
        }

        if ! obtain_registry_image; then
          echo "❌ Failed to obtain registry:3 from mirror.gcr.io and Docker Hub"
          exit 1
        fi

    - name: 📥 Pre-pull distribution images
      if: inputs.provider == 'Docker'
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        ARGS: ${{ inputs.args }}
        CONFIG: ${{ inputs.config }}
      run: |
        # Use ksail workload images to list images for this distribution (no source code needed)
        # shellcheck disable=SC2086
        IMAGES=$(ksail ${CONFIG:+--config "$CONFIG"} workload images --distribution "$DISTRIBUTION" $ARGS 2>/dev/null || true)
        if [ -z "$IMAGES" ]; then
          echo "ℹ️ No images to pre-pull for distribution $DISTRIBUTION"
          exit 0
        fi
        echo "📦 Pre-pulling $(echo "$IMAGES" | wc -l) images for $DISTRIBUTION..."
        while IFS= read -r image; do
          [ -z "$image" ] && continue
          pulled=false
          for attempt in 1 2 3; do
            if docker pull --quiet "$image"; then
              echo "  ✅ $image"
              pulled=true
              break
            fi
            echo "  ⚠️ $image attempt $attempt failed, retrying in 5s…"
            sleep 5
          done
          if [ "$pulled" = false ]; then
            echo "  ⚠️ Failed to pull $image after 3 attempts (will retry during cluster creation)"
          fi
        done <<< "$IMAGES"

    - name: 🌐 Add hosts
      if: inputs.hosts-file != ''
      shell: bash
      env:
        HOSTS_FILE: ${{ inputs.hosts-file }}
      run: |
        if [ -f "$HOSTS_FILE" ]; then
          sudo sh -c 'cat "$1" >> /etc/hosts' sh "$HOSTS_FILE"
          echo "✅ Added hosts from $HOSTS_FILE"
        else
          echo "⚠️ Hosts file not found: $HOSTS_FILE"
        fi

    - name: 🔐 Install root CA
      if: inputs.root-ca-cert-file != ''
      shell: bash
      env:
        ROOT_CA_CERT_FILE: ${{ inputs.root-ca-cert-file }}
      run: |
        if [ -f "$ROOT_CA_CERT_FILE" ]; then
          sudo cp "$ROOT_CA_CERT_FILE" /usr/local/share/ca-certificates/root-ca.crt
          sudo update-ca-certificates
          echo "✅ Installed root CA certificate"
        else
          echo "⚠️ Root CA cert file not found: $ROOT_CA_CERT_FILE"
        fi

    - name: 🔑 Import SOPS Age key (local)
      if: inputs.sops-age-key != ''
      shell: bash
      env:
        SOPS_AGE_KEY: ${{ inputs.sops-age-key }}
      run: |
        # Extract the AGE-SECRET-KEY line from the input (supports both bare keys and key files with comments)
        AGE_KEY=$(echo "$SOPS_AGE_KEY" | grep -oE 'AGE-SECRET-KEY-[A-Za-z0-9]+' | head -1)
        if [ -z "$AGE_KEY" ]; then
          echo "❌ No valid AGE-SECRET-KEY found in sops-age-key input"
          exit 1
        fi
        ksail cipher import "$AGE_KEY"

    - name: 🏗️ Initialize Project
      if: inputs.init == 'true'
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ inputs.args }}
        CONFIG: ${{ inputs.config }}
      run: |
        set -o pipefail
        mkdir -p /tmp/ksail-system-test-logs
        # shellcheck disable=SC2086
        ksail ${CONFIG:+--config "$CONFIG"} cluster init --distribution "$DISTRIBUTION" --provider "$PROVIDER" $ARGS --force 2>&1 | tee /tmp/ksail-system-test-logs/cluster-init.log

    - name: 🧹 Validate manifests
      if: inputs.validate == 'true'
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
      run: ksail ${CONFIG:+--config "$CONFIG"} workload validate

    - name: 🔍 Scan manifests
      if: inputs.scan == 'true'
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
        SCAN_FRAMEWORK: ${{ inputs.scan-framework }}
        SCAN_THRESHOLD: ${{ inputs.scan-compliance-threshold }}
        SCAN_FORMAT: ${{ inputs.scan-format }}
        SCAN_OUTPUT: ${{ inputs.scan-output }}
        SCAN_PATH: ${{ inputs.scan-path }}
        SCAN_VERBOSE: ${{ inputs.scan-verbose }}
      run: |
        set -euo pipefail
        cmd_args=()
        [[ -n "$CONFIG" ]] && cmd_args+=(--config "$CONFIG")
        cmd_args+=(workload scan)
        [[ -n "$SCAN_PATH" ]] && cmd_args+=("$SCAN_PATH")
        [[ -n "$SCAN_FRAMEWORK" ]] && cmd_args+=(--framework "$SCAN_FRAMEWORK")
        [[ -n "$SCAN_THRESHOLD" ]] && cmd_args+=(--compliance-threshold "$SCAN_THRESHOLD")
        [[ -n "$SCAN_FORMAT" ]] && cmd_args+=(--format "$SCAN_FORMAT")
        [[ -n "$SCAN_OUTPUT" ]] && cmd_args+=(--output "$SCAN_OUTPUT")
        [[ "$SCAN_VERBOSE" == "true" ]] && cmd_args+=(--verbose)
        ksail "${cmd_args[@]}"

    - name: 🚀 Create Cluster
      id: create
      shell: bash
      env:
        INIT: ${{ inputs.init }}
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ inputs.args }}
        CONFIG: ${{ inputs.config }}
      run: |
        set -euo pipefail
        mkdir -p /tmp/ksail-system-test-logs

        create_cluster() {
          if [ "$INIT" = "true" ]; then
            ksail ${CONFIG:+--config "$CONFIG"} cluster create
          else
            # shellcheck disable=SC2086
            ksail ${CONFIG:+--config "$CONFIG"} cluster create --distribution "$DISTRIBUTION" --provider "$PROVIDER" $ARGS
          fi
        }

        # Talos+Docker clusters may experience transient bootstrap failures
        # (node-join timeouts, CNI/CSI initialization races on shared CI runners).
        # Retry up to 3 times with cleanup between attempts.
        # See: https://github.com/devantler-tech/ksail/issues/4289
        if [ "$DISTRIBUTION" = "Talos" ] && [ "$PROVIDER" = "Docker" ]; then
          MAX_ATTEMPTS=3
        else
          MAX_ATTEMPTS=1
        fi

        create_succeeded=false
        for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
          LOG_FILE="/tmp/ksail-system-test-logs/cluster-create-attempt-${attempt}.log"
          if create_cluster 2>&1 | tee "$LOG_FILE"; then
            create_succeeded=true
            # Copy the successful attempt log to the canonical name for other steps
            cp "$LOG_FILE" /tmp/ksail-system-test-logs/cluster-create.log
            break
          fi
          if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
            echo "⚠️ cluster create attempt $attempt failed, cleaning up before retry…"
            CLEANUP_LOG="/tmp/ksail-system-test-logs/cluster-create-cleanup-${attempt}.log"
            # Remove the partially-created cluster so the next attempt starts clean
            {
            ksail ${CONFIG:+--config "$CONFIG"} cluster delete --force || true
            # Remove any lingering Talos cluster node containers.
            # ksail cluster delete --force may leave Talos Docker containers behind,
            # keeping the cluster Docker network alive. The next create attempt then
            # fails with "cluster already exists" or "network '<cluster>' already exists".
            docker ps -aq --filter "label=talos.owned=true" \
              | xargs -r docker rm -f 2>/dev/null || true
            # Remove any lingering Talos cluster state directories.
            # ksail cluster delete --force may not clean up ~/.talos/clusters/<name>/.
            # On the next attempt, the Talos provisioner checks for this directory and
            # refuses to create with "state directory already exists, is the cluster
            # already running?". Since this retry loop is only for Talos+Docker on a
            # single-use CI runner, it is safe to remove all leftover Talos state.
            rm -rf ~/.talos/clusters/ || true
            # Remove any lingering KSail-managed mirror registry containers.
            # ksail cluster delete may not remove registry containers, leaving their
            # Docker network endpoints alive. The next create attempt then fails with
            # "endpoint with name <cluster>-<registry> already exists in network <cluster>".
            # Filter by the KSail ownership label first, and keep the suffix match to
            # limit cleanup to the known registry container naming scheme.
            for _reg_suffix in docker.io ghcr.io quay.io registry.k8s.io; do
              docker ps -aq \
                --filter "label=io.ksail.registry" \
                --filter "name=-${_reg_suffix}" \
                | xargs -r docker rm -f 2>/dev/null || true
            done
            # Prune unused Docker resources (networks, stopped containers, dangling images).
            # This will also remove any cluster Docker networks left behind after the
            # container cleanup above.
            docker system prune -f || true
            } 2>&1 | tee "$CLEANUP_LOG"
            echo "⚠️ waiting 30s before retry…"
            sleep 30
          fi
        done

        if [ "$create_succeeded" != "true" ]; then
          # Copy the last attempt log to the canonical name for diagnostic uploads
          cp "/tmp/ksail-system-test-logs/cluster-create-attempt-${MAX_ATTEMPTS}.log" \
            /tmp/ksail-system-test-logs/cluster-create.log 2>/dev/null || true
          echo "❌ cluster create failed after $MAX_ATTEMPTS attempts"
          exit 1
        fi

        # Determine kubeconfig path: parse --kubeconfig from args, fall back to default
        KUBECONFIG_PATH="${HOME}/.kube/config"
        # shellcheck disable=SC2086
        set -- $ARGS
        while [ $# -gt 0 ]; do
          case "$1" in
            --kubeconfig)
              if [ $# -gt 1 ]; then
                KUBECONFIG_PATH="$2"
              fi
              break
              ;;
            --kubeconfig=*)
              KUBECONFIG_PATH="${1#--kubeconfig=}"
              break
              ;;
            *)
              shift
              ;;
          esac
        done
        echo "kubeconfig=$KUBECONFIG_PATH" >> "$GITHUB_OUTPUT"

    - name: 📦 Push manifests
      if: inputs.push == 'true'
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
      run: ksail ${CONFIG:+--config "$CONFIG"} workload push

    - name: 🔁 Reconcile workloads
      if: inputs.reconcile == 'true'
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
      run: ksail ${CONFIG:+--config "$CONFIG"} workload reconcile

    - name: 📦 Export mirror volumes
      if: inputs.cache == 'true' && inputs.provider == 'Docker' && steps.restore-mirror.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "📦 Exporting mirror registry volumes for caching..."
        mkdir -p /tmp/ksail-mirror-cache
        for registry in docker.io ghcr.io quay.io registry.k8s.io; do
          if docker volume inspect "$registry" > /dev/null 2>&1; then
            if docker run --rm \
              -v "${registry}":/volume:ro \
              -v /tmp/ksail-mirror-cache:/backup \
              busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f \
              sh -c "cd /volume && tar -cf /backup/${registry}.tar ."; then
              echo "  ✅ Exported $registry"
            else
              echo "  ⚠️ Failed to export $registry"
            fi
          fi
        done

    - name: 💾 Save mirror cache
      if: inputs.cache == 'true' && inputs.provider == 'Docker' && steps.restore-mirror.outputs.cache-hit != 'true'
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/ksail-mirror-cache
        key: ksail-mirror-${{ steps.cache-keys.outputs.images-hash }}-${{ runner.os }}-${{ runner.arch }}
      continue-on-error: true

    - name: 🔥 Delete cluster
      if: always() && inputs.delete == 'true'
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
      run: ksail ${CONFIG:+--config "$CONFIG"} cluster delete || echo "⚠️ Cluster may not have been created"

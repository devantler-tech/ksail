name: KSail Cluster

on:
  workflow_call:
    inputs:
      distribution:
        description: "KSail distribution to provision (Vanilla, K3s, Talos, VCluster)"
        type: string
        default: "Vanilla"
      ttl:
        description: "Cluster TTL; passed to `ksail cluster create --ttl`"
        type: string
        default: "1h"
      ksail-version:
        description: "KSail version to install (e.g. '5.55.0') or 'latest'"
        type: string
        default: "latest"
    outputs:
      kubeconfig:
        description: "Path to the kubeconfig file for the provisioned cluster"
        value: ${{ jobs.provision.outputs.kubeconfig }}

permissions: {}

jobs:
  provision:
    name: 🚀 Provision KSail Cluster
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kubeconfig: ${{ steps.create.outputs.kubeconfig }}
    steps:
      - name: 📥 Install KSail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          if [ "${{ inputs.ksail-version }}" = "latest" ]; then
            gh release download --repo devantler-tech/ksail \
              --pattern 'ksail_*_linux_amd64.tar.gz' \
              --dir "$tmpdir"
          else
            gh release download "v${{ inputs.ksail-version }}" \
              --repo devantler-tech/ksail \
              --pattern 'ksail_*_linux_amd64.tar.gz' \
              --dir "$tmpdir"
          fi
          tar -xzf "$tmpdir"/ksail_*_linux_amd64.tar.gz -C "$tmpdir"
          sudo install "$tmpdir/ksail" /usr/local/bin/ksail
          rm -rf "$tmpdir"
          ksail --version

      - name: 🏗️ Initialize Project
        run: ksail cluster init --distribution ${{ inputs.distribution }}

      - name: 🚀 Create Cluster
        id: create
        run: |
          set -euo pipefail
          ksail cluster create --ttl ${{ inputs.ttl }} &
          KSAIL_PID=$!
          disown "$KSAIL_PID"

          # Poll until the kubeconfig is written and the API server responds.
          # 60 iterations × 10s sleep = 10 minute timeout.
          KUBECONFIG_PATH="${HOME}/.kube/config"
          for i in $(seq 1 60); do
            # Fail fast if the background provisioning process exited (error)
            if ! kill -0 "$KSAIL_PID" 2>/dev/null; then
              echo "❌ ksail cluster create exited unexpectedly"
              exit 1
            fi
            if [ -f "$KUBECONFIG_PATH" ] && kubectl cluster-info >/dev/null 2>&1; then
              echo "kubeconfig=$KUBECONFIG_PATH" >> "$GITHUB_OUTPUT"
              echo "✅ Cluster is ready (PID $KSAIL_PID managing TTL in background)"
              exit 0
            fi
            echo "⏳ Waiting for cluster to become ready... ($i/60)"
            sleep 10
          done
          echo "❌ Cluster did not become ready within 10 minutes"
          exit 1

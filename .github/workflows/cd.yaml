---
name: CD
on:
  push:
    tags:
      - "v*"

env:
  # Use pipe (|) instead of comma (,) so Go falls through to direct on ANY proxy
  # error (including 403), not just 404/410. Hardens CI against transient
  # proxy.golang.org outages. go.sum still verifies module integrity.
  GOPROXY: "https://proxy.golang.org|direct"
  # Soft memory limit for Go build toolchain. GoReleaser links multiple
  # platform binaries and the linker can exceed runner memory.
  GOMEMLIMIT: "6GiB"

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  goreleaser:
    name: 🧩 Release CLI
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🧹 Cleanup node
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Disable module cache restoration in release workflows to avoid
          # cache-poisoning risk for runtime artifacts (see https://docs.zizmor.sh/audits/#cache-poisoning)
          cache: false

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: 🔐 Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  # The web UI is embedded into the binary (go:embed via pkg/webui, staged by the GoReleaser
  # before-hook) and served by the operator and `ksail ui`/`desktop` themselves — no separate UI image.

  vscode-extension:
    name: 🧩 Release VSCode Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: vsce
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Compile
        run: npm run compile

      - name: 📦 Package extension
        run: npm run package

      - name: 📤 Publish to VS Code Marketplace
        run: npx @vscode/vsce publish "$VERSION"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VERSION: ${{ steps.get_version.outputs.version }}
        continue-on-error: true

      # - name: 📤 Publish to Open VSX Registry
      #   run: npx ovsx publish --pat ${{ secrets.OVSX_PAT }}
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   continue-on-error: true

      - name: 📦 Create VSIX package
        run: npx @vscode/vsce package "$VERSION" --out ksail_"$VERSION".vsix
        env:
          VERSION: ${{ steps.get_version.outputs.version }}

      - name: 📤 Upload VSIX artifact
        # Action inputs are workspace-relative — the job's `working-directory: vsce` default applies
        # only to `run` steps — so the vsix lives under vsce/. publish-release attaches it to the draft.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-vscode
          path: vsce/ksail_*.vsix
          if-no-files-found: error

  # The macOS desktop app ships as a Homebrew cask. The desktop app is a separate Go module that
  # links a system webview via CGO and cannot be cross-compiled in the main release, so this job runs
  # a second GoReleaser config on a macOS runner: it builds the darwin binary, packages it as a
  # KSail.app bundle and opens a *draft* cask PR on the homebrew tap (the `homebrew` job marks it ready
  # after publication). GoReleaser's release pipe is disabled (see .goreleaser.desktop.yaml); the built
  # archive is emitted as a workflow artifact and attached to the draft by `publish-release`. No
  # `needs: [goreleaser]` — this builds in parallel with the CLI release.
  desktop-macos:
    name: 🧩 Release Desktop App (macOS cask)
    runs-on: macos-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏗️ Run GoReleaser (desktop cask)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.desktop.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

      # GoReleaser's release pipe is disabled (.goreleaser.desktop.yaml). Emit the macOS archive as a
      # workflow artifact; `publish-release` attaches it to the draft before publishing, so every asset
      # is present before the release is locked by immutable releases (see #4874).
      - name: 📤 Upload desktop archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-desktop-macos
          path: dist-desktop/KSail_*_darwin_*.zip
          if-no-files-found: error

  # Linux and Windows desktop binaries are convenience downloads (no cask). They build on native
  # runners (CGO + the system webview) in parallel with the CLI release and emit their archives as
  # workflow artifacts; `publish-release` attaches them to the draft before publishing, so every asset
  # is present before the release is locked by immutable releases (see #4874).
  desktop:
    name: 🧩 Release Desktop App
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 ships libwebkit2gtk-4.0-dev, which webview_go's cgo requires (24.04 only
          # has 4.1).
          - { os: ubuntu-22.04, goos: linux, arch: amd64, ext: "" }
          - { os: windows-latest, goos: windows, arch: amd64, ext: ".exe" }
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🐧 Install Linux webview dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: 🏷️ Extract version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 🏗️ Build and stage web UI
        shell: bash
        run: |
          npm --prefix web/ui ci
          npm --prefix web/ui run build
          rm -rf pkg/webui/dist
          mkdir -p pkg/webui/dist
          touch pkg/webui/dist/.gitkeep
          cp -R web/ui/dist/. pkg/webui/dist/

      - name: 🏗️ Build desktop app
        shell: bash
        run: cd desktop && go build -ldflags "-s -w" -o "ksail-desktop${{ matrix.ext }}" .

      # Package so the artifact extracts to the name the `ksail desktop` launcher looks for: a
      # ksail-desktop binary the user puts on their PATH. Naming mirrors the main GoReleaser archives.
      - name: 📦 Package desktop app
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          ARCH: ${{ matrix.arch }}
        run: |
          case "$GOOS" in
            linux)
              artifact="ksail-desktop_${VERSION}_linux_${ARCH}.tar.gz"
              tar -C desktop -czf "$artifact" ksail-desktop
              ;;
            windows)
              artifact="ksail-desktop_${VERSION}_windows_${ARCH}.zip"
              7z a "$artifact" "./desktop/ksail-desktop.exe"
              ;;
          esac
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload desktop archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-desktop-${{ matrix.goos }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

  copilot-plugin:
    name: 🧩 Release Copilot CLI Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs in parallel with the other releases — it only opens an auto-merging version-bump
    # PR and consumes no GoReleaser artifact, so it does not wait on `goreleaser`. The gated
    # `publish-release` and `pages-deploy` jobs both list it in `needs`, so a failure here
    # still blocks the GitHub release publish and the docs deploy.
    environment: ci
    permissions:
      contents: write
    steps:
      - name: 🔑 Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📑 Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: true

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Instead of pushing directly to main (which is blocked by the required
      # "✅ Validate Go Project" workflow rule), open a PR so CI can run on the
      # version bump commit and auto-merge once checks pass.
      - name: 📤 Create version bump PR
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail

          bump() {
            local file="$1" filter="$2"
            jq --arg v "$VERSION" "$filter" "$file" > "$file.tmp"
            mv "$file.tmp" "$file"
          }

          git config user.name "devantler-tech-bot[bot]"
          git config user.email "devantler-tech-bot[bot]@users.noreply.github.com"

          # Skip if the repo already carries an equal-or-newer version to
          # prevent a slow-merging older-tag PR from downgrading the plugin.
          CURRENT_VERSION="$(jq -r '.version' copilot-plugin/plugin.json)"
          HIGHEST="$(printf '%s\n%s\n' "$CURRENT_VERSION" "$VERSION" | sort -V | tail -1)"
          if [ "$HIGHEST" != "$VERSION" ]; then
            echo "Skipping: repo is already at v${CURRENT_VERSION}, which is newer than target v${VERSION}"
            exit 0
          fi

          bump copilot-plugin/plugin.json ".version = \$v"
          bump copilot-plugin/.claude-plugin/plugin.json ".version = \$v"
          bump .github/plugin/marketplace.json ".metadata.version = \$v | .plugins[0].version = \$v"
          bump .claude-plugin/marketplace.json ".metadata.version = \$v | .plugins[0].version = \$v"

          if git diff --quiet; then
            echo "No version change to commit"
            exit 0
          fi

          BRANCH="chore/copilot-plugin-v${VERSION}"

          git checkout -b "${BRANCH}"
          git add copilot-plugin/plugin.json copilot-plugin/.claude-plugin/plugin.json \
            .github/plugin/marketplace.json .claude-plugin/marketplace.json
          git commit -m "chore(copilot-plugin): release v${VERSION}"
          # Fetch the remote branch only when it exists (i.e. a prior job
          # attempt already pushed it) so --force-with-lease has up-to-date
          # tracking info on re-runs.  git ls-remote exits 2 when no matching
          # ref is found, so auth/network failures still surface immediately
          # via stderr instead of being silently swallowed.
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null; then
            git fetch origin "${BRANCH}"
          fi
          git push --force-with-lease origin "${BRANCH}"

          # Create PR if one doesn't already exist for this branch.
          EXISTING_PR="$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING_PR}" ]; then
            echo "PR #${EXISTING_PR} already exists for ${BRANCH}"
          else
            gh pr create \
              --base "${DEFAULT_BRANCH}" \
              --head "${BRANCH}" \
              --title "chore(copilot-plugin): release v${VERSION}" \
              --body "Automated version bump for copilot plugin manifests to v${VERSION}."
          fi

          # Ensure auto-merge is enabled at the repository level (idempotent).
          if ! gh api "repos/{owner}/{repo}" --method PATCH -f allow_auto_merge=true --silent; then
            echo "::warning::Could not enable auto-merge at the repository level (token may lack administration permissions)."
          fi

          if ! gh pr merge "${BRANCH}" --auto --squash; then
            echo "::warning::Auto-merge could not be enabled; the PR must be merged manually or auto-merge must be enabled in repository settings."
          fi

  mcp-publish:
    name: 📤 Publish to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [goreleaser]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: 📝 Update server.json version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          IMAGE_TAG: ${{ steps.get_version.outputs.image_tag }}
        run: |
          jq --arg v "$VERSION" \
             --arg tag "$IMAGE_TAG" \
             '.version = $v | .packages[0].identifier = "ghcr.io/devantler-tech/ksail:" + $tag' \
             server.json > server.json.tmp && mv server.json.tmp server.json

      - name: 📥 Install mcp-publisher
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.8/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.8/registry_1.7.8_checksums.txt"
          grep "mcp-publisher_linux_amd64.tar.gz$" registry_1.7.8_checksums.txt | sha256sum --check
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          rm mcp-publisher_linux_amd64.tar.gz registry_1.7.8_checksums.txt

      - name: 🔐 Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: 📤 Publish to MCP Registry
        run: |
          set -euo pipefail
          max_attempts=3
          delay=15
          last_output=""
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Publish attempt ${attempt}/${max_attempts}..."
            if last_output="$(./mcp-publisher publish 2>&1)"; then
              echo "$last_output"
              exit 0
            fi
            echo "$last_output"
            # Only retry on 5xx (server) errors — bail immediately on anything else
            if echo "$last_output" | grep -Eq 'status 5[0-9]{2}'; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Server error; retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
                continue
              fi
            else
              break
            fi
          done
          echo "::error::mcp-publisher publish failed after ${attempt} attempt(s)"
          exit 1

  pages-build:
    name: 📄 Build Pages
    runs-on: ubuntu-latest
    # Runs in parallel with the other releases (no GoReleaser artifact dependency). The
    # gated `pages-deploy` and `publish-release` jobs both list it in `needs`, so a docs
    # build failure blocks both the Pages deploy and the GitHub release publish.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: ⚙️ Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: 📦 Install dependencies
        working-directory: docs
        run: npm ci

      - name: 📥 Download benchmark data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/public
          if gh api "repos/{owner}/{repo}/contents/dev/bench/data.js?ref=benchmark-data" \
            -H "Accept: application/vnd.github.raw+json" > /tmp/data.js 2>/tmp/benchmark-data.err; then
            node -e "
              const s = require('fs').readFileSync('/tmp/data.js', 'utf8');
              const match = s.match(/^window\.BENCHMARK_DATA\s*=\s*([\s\S]+?);?\s*\$/);
              if (!match) { process.stderr.write('Unexpected data.js format\n'); process.exit(1); }
              JSON.parse(match[1]);
              require('fs').writeFileSync('docs/public/benchmark-data.json', match[1]);
            "
            echo "Downloaded benchmark data from benchmark-data branch"
          else
            status=$?
            if grep -Eqi '(^|[^0-9])404([^0-9]|$)|not[ -]?found' /tmp/benchmark-data.err; then
              echo "No benchmark data found on benchmark-data branch; continuing without benchmark-data.json"
              rm -f docs/public/benchmark-data.json
            else
              echo "Failed to download benchmark data" >&2
              cat /tmp/benchmark-data.err >&2
              exit "$status"
            fi
          fi

      - name: 🏗️ Build with Astro
        working-directory: docs
        run: npm run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  pages-deploy:
    name: 🚀 Deploy Pages
    runs-on: ubuntu-latest
    # Gate the docs deploy on ALL releases (not just `pages-build`) so a partial release
    # failure never pushes a fresh docs site. Runs in parallel with `publish-release` —
    # neither depends on the other; both fan in from the same set of release jobs.
    needs:
      [
        goreleaser,
        vscode-extension,
        desktop-macos,
        desktop,
        copilot-plugin,
        mcp-publish,
        pages-build,
      ]
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish-release:
    name: 📢 Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gate on ALL releases so the draft is published only when every release succeeded.
    # Runs in parallel with `pages-deploy` (it no longer lists it in `needs`) — both fan in
    # from the same release jobs, so the GitHub release publish and the docs deploy happen
    # concurrently. `pages-build` replaces the former `pages-deploy` edge: the release is
    # gated on the docs *building*, not on Pages having deployed.
    needs:
      [
        goreleaser,
        vscode-extension,
        mcp-publish,
        copilot-plugin,
        desktop-macos,
        desktop,
        pages-build,
      ]
    permissions:
      contents: write
    steps:
      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 📥 Download release asset artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: dist-assets

      # Attach the desktop archives and the VSIX to the draft BEFORE publishing. Once published the
      # release is immutable and late uploads 422 (see #4874); all asset jobs gate this one, so every
      # artifact exists here and is attached immediately before the draft→published flip below.
      - name: 📤 Attach assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
        run: gh release upload "$RELEASE_TAG" dist-assets/* --clobber

      - name: 📢 Publish draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;

            // List releases and find the one(s) matching the tag
            // Note: getReleaseByTag does not return draft releases, so we use listReleases instead
            let matching;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              matching = releases.filter(r => r.tag_name === tag);
            } catch (error) {
              core.setFailed(`Failed to list releases: ${error.message}`);
              throw error;
            }

            if (matching.length === 0) {
              core.setFailed(`Release not found for tag ${tag}`);
              return;
            }

            // More than one release for a tag means an asset job created a duplicate (e.g. a second
            // GoReleaser run that couldn't see the draft) — see #4874. Bail before publishing rather
            // than racing an immutable release into existence; the duplicate needs manual cleanup.
            if (matching.length > 1) {
              const ids = matching.map(r => `${r.id} (draft=${r.draft})`).join(', ');
              core.setFailed(`Found ${matching.length} releases for tag ${tag}: ${ids}. Expected exactly one — manual cleanup required.`);
              return;
            }

            const release = matching[0];

            if (!release.draft) {
              console.log(`Release ${tag} is already published`);
              return;
            }

            // Publish the release
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });

            console.log(`Successfully published release ${tag}`);

  # GoReleaser opens the Homebrew cask PRs during the build (CLI in `goreleaser`, macOS in
  # `desktop-macos`) as DRAFTS, so the tap cannot merge them while the cask still points at a draft
  # (not-yet-public, 404) release. Now that `publish-release` has made the release public, mark both
  # PRs ready and enable auto-merge so the tap lands them — keeping the tap bump strictly after the
  # GitHub release exists. Branch names mirror `.goreleaser*.yaml` (goreleaser/<project>-<tag>).
  homebrew:
    name: 🍺 Promote Homebrew cask PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-release]
    permissions:
      contents: read
    steps:
      - name: 🍺 Mark cask PRs ready and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          TAP: devantler-tech/homebrew-tap
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for name in ksail ksail-desktop; do
            branch="goreleaser/${name}-${TAG}"
            pr="$(gh pr list --repo "$TAP" --head "$branch" --state open --json number --jq '.[0].number // empty')"
            if [ -z "$pr" ]; then
              echo "::warning::No open cask PR found on $TAP for branch ${branch}; skipping"
              continue
            fi
            echo "Promoting ${TAP}#${pr} (${branch})"
            # Both gh calls are non-fatal under `set -e`: the PR may already be ready, or auto-merge
            # may already be enabled by the tap's own automation — neither should fail the job.
            gh pr ready "$pr" --repo "$TAP" \
              || echo "::warning::Could not mark ${TAP}#${pr} ready; it may already be ready"
            gh pr merge "$pr" --repo "$TAP" --auto --squash \
              || echo "::warning::Could not enable auto-merge for ${TAP}#${pr}; the tap automation may still merge it"
          done

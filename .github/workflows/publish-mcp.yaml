---
name: Publish MCP
on:
  push:
    tags:
      - "v*"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: 📝 Update server.json version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          IMAGE_TAG: ${{ steps.get_version.outputs.image_tag }}
        run: |
          jq --arg v "$VERSION" \
             --arg tag "$IMAGE_TAG" \
             '.version = $v | .packages[0].identifier = "ghcr.io/devantler-tech/ksail:" + $tag' \
             server.json > server.json.tmp && mv server.json.tmp server.json

      - name: 📥 Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.5.0
        run: |
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          TARBALL="mcp-publisher_${OS}_${ARCH}.tar.gz"
          CHECKSUMS="registry_${MCP_PUBLISHER_VERSION#v}_checksums.txt"
          BASE_URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}"
          curl -sLO "${BASE_URL}/${TARBALL}"
          curl -sLO "${BASE_URL}/${CHECKSUMS}"
          grep "${TARBALL}" "${CHECKSUMS}" | sha256sum --check
          tar -xzf "${TARBALL}" mcp-publisher
          rm "${TARBALL}" "${CHECKSUMS}"

      - name: 🔐 Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: 📤 Publish to MCP Registry
        run: ./mcp-publisher publish

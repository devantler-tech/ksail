name: KSail Workload Watch Test
description: |
  Tests the workload watch command E2E on a running cluster:
    1. --initial-apply syncs cluster on startup
    2. File modification triggers debounced re-apply
    3. Kustomize boundary scoping (only affected overlay re-applied)
    4. Graceful shutdown on SIGTERM
    5. --hook runs shell commands before each apply
    6. Failing --hook skips the apply
  Non-existent directory rejection is covered by unit tests
  (TestRunWatchEarlyPathValidation in workload_pure_test.go).

inputs:
  workload-timeout:
    description: |
      Timeout for workload wait operations. Set to 10 minutes to handle
      intermittent delays in CI environments (image pulls, resource contention).
    required: false
    default: "600s"

runs:
  using: composite
  steps:
    # Test 1 (non-existent directory rejection) is covered by the unit
    # test TestRunWatchEarlyPathValidation and removed from E2E.

    # ── Test 1 — --initial-apply syncs cluster on startup ────────────
    - name: 🧪 watch --initial-apply syncs on startup
      id: watch-initial-apply
      shell: bash
      run: |
        # Use a directory on the main filesystem (not tmpfs) to avoid inotify
        # event loss from sed -i's create+rename under CI load (see #3729).
        WATCH_ROOT="${GITHUB_WORKSPACE:-.}"
        WATCH_DIR="$(mktemp -d -p "$WATCH_ROOT" .watch-initial-apply-XXXXXX)"
        WATCH_LOG="${WATCH_DIR}.log"
        trap 'kill $WATCH_PID 2>/dev/null || true; ksail workload delete configmap/ksail-watch-initial-test --ignore-not-found 2>/dev/null || true; rm -rf "$WATCH_DIR" "$WATCH_LOG"' EXIT

        cat > "$WATCH_DIR/configmap.yaml" <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ksail-watch-initial-test
        data:
          status: applied-by-initial-apply
        EOF
        cat > "$WATCH_DIR/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - configmap.yaml
        EOF

        # Start watcher with --initial-apply (resource should not exist yet)
        ksail workload watch --path "$WATCH_DIR" --initial-apply --debug > "$WATCH_LOG" 2>&1 &
        WATCH_PID=$!

        # Poll until the ConfigMap appears in the cluster
        APPLY_SUCCESS=false
        for i in $(seq 1 60); do
          if ksail workload get configmap/ksail-watch-initial-test -o jsonpath='{.data.status}' 2>/dev/null | grep -q "applied-by-initial-apply"; then
            APPLY_SUCCESS=true
            break
          fi
          sleep 2
        done

        kill $WATCH_PID 2>/dev/null || true
        for _ in $(seq 1 10); do
          kill -0 "$WATCH_PID" 2>/dev/null || break
          sleep 1
        done
        if kill -0 "$WATCH_PID" 2>/dev/null; then
          kill -KILL "$WATCH_PID" 2>/dev/null || true
        fi
        wait "$WATCH_PID" 2>/dev/null || true
        ksail workload delete configmap/ksail-watch-initial-test --ignore-not-found
        rm -rf "$WATCH_DIR" "$WATCH_LOG"
        trap - EXIT

        if [ "$APPLY_SUCCESS" = "true" ]; then
          echo "✅ --initial-apply correctly synced cluster on startup"
        else
          echo "❌ --initial-apply did not create the ConfigMap within timeout"
          cat "$WATCH_LOG" 2>/dev/null || true
          exit 1
        fi

    # ── Test 2 — File modification triggers debounced re-apply ───────
    - name: 🧪 watch detects file modification
      id: watch-file-modify
      shell: bash
      env:
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        WATCH_ROOT="${GITHUB_WORKSPACE:-.}"
        WATCH_DIR="$(mktemp -d -p "$WATCH_ROOT" .watch-modify-XXXXXX)"
        WATCH_LOG="${WATCH_DIR}.log"
        trap 'kill $WATCH_PID 2>/dev/null || true; ksail workload delete deployment/ksail-watch-modify-test --ignore-not-found 2>/dev/null || true; rm -rf "$WATCH_DIR" "$WATCH_LOG"' EXIT

        cat > "$WATCH_DIR/deployment.yaml" <<'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ksail-watch-modify-test
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ksail-watch-modify-test
          template:
            metadata:
              labels:
                app: ksail-watch-modify-test
            spec:
              containers:
                - name: test
                  image: traefik/whoami:v1.10
        EOF
        cat > "$WATCH_DIR/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - deployment.yaml
        EOF

        # Apply the initial manifest and wait for it to be ready
        ksail workload apply -k "$WATCH_DIR"
        ksail workload wait --for=condition=Available deployment/ksail-watch-modify-test --timeout="$TIMEOUT"

        # Start watcher in background
        ksail workload watch --path "$WATCH_DIR" --debug > "$WATCH_LOG" 2>&1 &
        WATCH_PID=$!

        # Wait for watcher to finish initialization (poll: started marker)
        WATCHER_READY=false
        for i in $(seq 1 120); do
          if grep -q "poll: started" "$WATCH_LOG" 2>/dev/null; then
            WATCHER_READY=true
            break
          fi
          sleep 1
        done
        if [ "$WATCHER_READY" != "true" ]; then
          echo "❌ Watcher did not become ready within 120s"
          cat "$WATCH_LOG" || true
          exit 1
        fi

        # Modify the manifest (change replicas 1 → 2)
        sed -i 's/replicas: 1/replicas: 2/' "$WATCH_DIR/deployment.yaml"

        # Wait for watcher to pick up the change
        WATCH_SUCCESS=false
        for i in $(seq 1 24); do
          sleep 5
          REPLICAS=$(ksail workload get deployment/ksail-watch-modify-test -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "unknown")
          if [ "$REPLICAS" = "2" ]; then
            WATCH_SUCCESS=true
            break
          fi
          echo "  Waiting for watch to apply change (attempt $i/24, replicas=$REPLICAS)..."
        done

        kill $WATCH_PID 2>/dev/null || true
        for _ in $(seq 1 10); do
          kill -0 "$WATCH_PID" 2>/dev/null || break
          sleep 1
        done
        if kill -0 "$WATCH_PID" 2>/dev/null; then
          kill -KILL "$WATCH_PID" 2>/dev/null || true
        fi
        wait "$WATCH_PID" 2>/dev/null || true
        ksail workload delete deployment/ksail-watch-modify-test --ignore-not-found
        rm -rf "$WATCH_DIR" "$WATCH_LOG"
        trap - EXIT

        if [ "$WATCH_SUCCESS" = "true" ]; then
          echo "✅ File modification correctly triggered debounced re-apply"
        else
          echo "❌ File modification was not auto-applied: expected 2 replicas, got $REPLICAS"
          echo "--- watcher output ---"
          cat "$WATCH_LOG" 2>/dev/null || true
          echo "--- end watcher output ---"
          exit 1
        fi

    # ── Test 3 — Kustomize boundary scoping ──────────────────────────
    - name: 🧪 watch scopes apply to kustomize boundary
      id: watch-boundary
      shell: bash
      env:
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        WATCH_ROOT="${GITHUB_WORKSPACE:-.}"
        WATCH_DIR="$(mktemp -d -p "$WATCH_ROOT" .watch-boundary-XXXXXX)"
        WATCH_LOG="${WATCH_DIR}.log"
        trap 'kill $WATCH_PID 2>/dev/null || true; ksail workload delete configmap/ksail-watch-boundary-a configmap/ksail-watch-boundary-b --ignore-not-found 2>/dev/null || true; rm -rf "$WATCH_DIR" "$WATCH_LOG"' EXIT

        # Create two overlay sub-directories, each with their own kustomization
        mkdir -p "$WATCH_DIR/overlay-a" "$WATCH_DIR/overlay-b"

        cat > "$WATCH_DIR/overlay-a/configmap.yaml" <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ksail-watch-boundary-a
        data:
          value: original-a
        EOF
        cat > "$WATCH_DIR/overlay-a/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - configmap.yaml
        EOF

        cat > "$WATCH_DIR/overlay-b/configmap.yaml" <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ksail-watch-boundary-b
        data:
          value: original-b
        EOF
        cat > "$WATCH_DIR/overlay-b/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - configmap.yaml
        EOF

        # Root kustomization referencing both overlays
        cat > "$WATCH_DIR/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - overlay-a
          - overlay-b
        EOF

        # Apply initial state
        ksail workload apply -k "$WATCH_DIR"

        # Start watcher in background
        ksail workload watch --path "$WATCH_DIR" --debug > "$WATCH_LOG" 2>&1 &
        WATCH_PID=$!

        # Wait for watcher readiness
        WATCHER_READY=false
        for i in $(seq 1 120); do
          if grep -q "poll: started" "$WATCH_LOG" 2>/dev/null; then
            WATCHER_READY=true
            break
          fi
          sleep 1
        done
        if [ "$WATCHER_READY" != "true" ]; then
          echo "❌ Watcher did not become ready within 120s"
          cat "$WATCH_LOG" || true
          exit 1
        fi

        # Modify only overlay-a
        sed -i 's/value: original-a/value: modified-a/' "$WATCH_DIR/overlay-a/configmap.yaml"

        # Wait for change to be applied
        BOUNDARY_SUCCESS=false
        for i in $(seq 1 24); do
          sleep 5
          VALUE_A=$(ksail workload get configmap/ksail-watch-boundary-a -o jsonpath='{.data.value}' 2>/dev/null || echo "unknown")
          if [ "$VALUE_A" = "modified-a" ]; then
            BOUNDARY_SUCCESS=true
            break
          fi
          echo "  Waiting for overlay-a change (attempt $i/24, value=$VALUE_A)..."
        done

        # Verify the watcher log shows subtree reconcile (not full root)
        SCOPING_OK=false
        if grep -q "reconciling subtree: overlay-a" "$WATCH_LOG" 2>/dev/null; then
          SCOPING_OK=true
        fi

        kill $WATCH_PID 2>/dev/null || true
        for _ in $(seq 1 10); do
          kill -0 "$WATCH_PID" 2>/dev/null || break
          sleep 1
        done
        if kill -0 "$WATCH_PID" 2>/dev/null; then
          kill -KILL "$WATCH_PID" 2>/dev/null || true
        fi
        wait "$WATCH_PID" 2>/dev/null || true
        ksail workload delete configmap/ksail-watch-boundary-a configmap/ksail-watch-boundary-b --ignore-not-found
        rm -rf "$WATCH_DIR" "$WATCH_LOG"
        trap - EXIT

        if [ "$BOUNDARY_SUCCESS" != "true" ]; then
          echo "❌ Overlay-a change was not applied: expected modified-a, got $VALUE_A"
          exit 1
        fi
        if [ "$SCOPING_OK" = "true" ]; then
          echo "✅ Watch correctly scoped apply to kustomize boundary (overlay-a subtree)"
        else
          echo "⚠️  Overlay-a change applied but subtree scoping not confirmed in log (may have used polling fallback)"
          echo "✅ Test passed (change was applied correctly)"
        fi

    # ── Test 4 — Graceful shutdown on SIGTERM ────────────────────────
    - name: 🧪 watch graceful shutdown on SIGTERM
      id: watch-sigterm
      shell: bash
      run: |
        WATCH_ROOT="${GITHUB_WORKSPACE:-.}"
        WATCH_DIR="$(mktemp -d -p "$WATCH_ROOT" .watch-sigterm-XXXXXX)"
        WATCH_LOG="${WATCH_DIR}.log"
        trap 'rm -rf "$WATCH_DIR" "$WATCH_LOG"' EXIT

        # Create a minimal manifest directory
        cat > "$WATCH_DIR/configmap.yaml" <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ksail-watch-sigterm-test
        data:
          key: value
        EOF
        cat > "$WATCH_DIR/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - configmap.yaml
        EOF

        # Start watcher in background
        ksail workload watch --path "$WATCH_DIR" --debug > "$WATCH_LOG" 2>&1 &
        WATCH_PID=$!

        # Wait for watcher readiness
        WATCHER_READY=false
        for i in $(seq 1 120); do
          if grep -q "poll: started" "$WATCH_LOG" 2>/dev/null; then
            WATCHER_READY=true
            break
          fi
          sleep 1
        done
        if [ "$WATCHER_READY" != "true" ]; then
          echo "❌ Watcher did not become ready within 120s"
          cat "$WATCH_LOG" || true
          rm -rf "$WATCH_DIR" "$WATCH_LOG"
          trap - EXIT
          exit 1
        fi

        # Send SIGTERM and wait for the process to exit (bounded to avoid hanging)
        kill -TERM "$WATCH_PID"
        EXIT_CODE=0
        if timeout 30s bash -c 'while kill -0 "$1" 2>/dev/null; do sleep 1; done' _ "$WATCH_PID"; then
          wait "$WATCH_PID" || EXIT_CODE=$?
        else
          echo "❌ Watch did not exit within 30s of SIGTERM"
          cat "$WATCH_LOG" || true
          kill -KILL "$WATCH_PID" 2>/dev/null || true
          wait "$WATCH_PID" 2>/dev/null || true
          ksail workload delete configmap/ksail-watch-sigterm-test --ignore-not-found 2>/dev/null || true
          rm -rf "$WATCH_DIR" "$WATCH_LOG"
          trap - EXIT
          exit 1
        fi

        # Check for graceful shutdown message
        SHUTDOWN_OK=false
        if grep -q "watcher stopped" "$WATCH_LOG" 2>/dev/null; then
          SHUTDOWN_OK=true
        fi

        # Clean up resources that may have been created
        ksail workload delete configmap/ksail-watch-sigterm-test --ignore-not-found 2>/dev/null || true
        rm -rf "$WATCH_DIR" "$WATCH_LOG"
        trap - EXIT

        if [ "$SHUTDOWN_OK" = "true" ]; then
          echo "✅ Watch gracefully shut down on SIGTERM (exit=$EXIT_CODE)"
        else
          echo "❌ Watch did not show graceful shutdown message (exit=$EXIT_CODE)"
          exit 1
        fi

    # ── Test 6 — Hooks execute before apply ──────────────────────────
    - name: 🧪 watch --hook runs before apply
      id: watch-hook
      shell: bash
      run: |
        WATCH_ROOT="${GITHUB_WORKSPACE:-.}"
        WATCH_DIR="$(mktemp -d -p "$WATCH_ROOT" .watch-hook-XXXXXX)"
        WATCH_LOG="${WATCH_DIR}.log"
        HOOK_LOG="${WATCH_DIR}.hook"
        trap 'kill $WATCH_PID 2>/dev/null || true; ksail workload delete configmap/ksail-watch-hook-test --ignore-not-found 2>/dev/null || true; rm -rf "$WATCH_DIR" "$WATCH_LOG" "$HOOK_LOG"' EXIT

        cat > "$WATCH_DIR/configmap.yaml" <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ksail-watch-hook-test
        data:
          status: applied-with-hook
        EOF
        cat > "$WATCH_DIR/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - configmap.yaml
        EOF

        # Start watcher with --initial-apply and a hook that writes a marker
        ksail workload watch \
          --path "$WATCH_DIR" \
          --initial-apply \
          --hook "echo hook-executed >> $HOOK_LOG" \
          --debug > "$WATCH_LOG" 2>&1 &
        WATCH_PID=$!

        # Poll until the ConfigMap appears (proves apply ran after hook)
        APPLY_SUCCESS=false
        for i in $(seq 1 60); do
          if ksail workload get configmap/ksail-watch-hook-test -o jsonpath='{.data.status}' 2>/dev/null | grep -q "applied-with-hook"; then
            APPLY_SUCCESS=true
            break
          fi
          sleep 2
        done

        kill $WATCH_PID 2>/dev/null || true
        for _ in $(seq 1 10); do
          kill -0 "$WATCH_PID" 2>/dev/null || break
          sleep 1
        done
        if kill -0 "$WATCH_PID" 2>/dev/null; then
          kill -KILL "$WATCH_PID" 2>/dev/null || true
        fi
        wait "$WATCH_PID" 2>/dev/null || true

        # Verify the hook marker file exists
        HOOK_OK=false
        if [ -f "$HOOK_LOG" ] && grep -q "hook-executed" "$HOOK_LOG" 2>/dev/null; then
          HOOK_OK=true
        fi

        ksail workload delete configmap/ksail-watch-hook-test --ignore-not-found
        rm -rf "$WATCH_DIR" "$WATCH_LOG" "$HOOK_LOG"
        trap - EXIT

        if [ "$APPLY_SUCCESS" != "true" ]; then
          echo "❌ --hook: apply did not create the ConfigMap within timeout"
          exit 1
        fi
        if [ "$HOOK_OK" = "true" ]; then
          echo "✅ --hook correctly executed before apply"
        else
          echo "❌ --hook marker file not found — hook did not run"
          exit 1
        fi

    # ── Test 7 — Failing hook skips apply ────────────────────────────
    - name: 🧪 watch --hook failure skips apply
      id: watch-hook-fail
      shell: bash
      run: |
        WATCH_ROOT="${GITHUB_WORKSPACE:-.}"
        WATCH_DIR="$(mktemp -d -p "$WATCH_ROOT" .watch-hookfail-XXXXXX)"
        WATCH_LOG="${WATCH_DIR}.log"
        trap 'kill $WATCH_PID 2>/dev/null || true; ksail workload delete configmap/ksail-watch-hookfail-test --ignore-not-found 2>/dev/null || true; rm -rf "$WATCH_DIR" "$WATCH_LOG"' EXIT

        cat > "$WATCH_DIR/configmap.yaml" <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ksail-watch-hookfail-test
        data:
          status: should-not-appear
        EOF
        cat > "$WATCH_DIR/kustomization.yaml" <<'EOF'
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - configmap.yaml
        EOF

        # Start watcher with --initial-apply and a hook that always fails
        ksail workload watch \
          --path "$WATCH_DIR" \
          --initial-apply \
          --hook "exit 1" \
          --debug > "$WATCH_LOG" 2>&1 &
        WATCH_PID=$!

        # Give time for the initial apply cycle to attempt (and be skipped)
        sleep 15

        # The ConfigMap should NOT exist because the failing hook skips apply
        SKIP_OK=true
        if ksail workload get configmap/ksail-watch-hookfail-test 2>/dev/null; then
          SKIP_OK=false
        fi

        # Verify watcher log contains the hook failure message
        HOOK_FAIL_LOGGED=false
        if grep -q "hook failed, apply skipped" "$WATCH_LOG" 2>/dev/null; then
          HOOK_FAIL_LOGGED=true
        fi

        kill $WATCH_PID 2>/dev/null || true
        for _ in $(seq 1 10); do
          kill -0 "$WATCH_PID" 2>/dev/null || break
          sleep 1
        done
        if kill -0 "$WATCH_PID" 2>/dev/null; then
          kill -KILL "$WATCH_PID" 2>/dev/null || true
        fi
        wait "$WATCH_PID" 2>/dev/null || true
        ksail workload delete configmap/ksail-watch-hookfail-test --ignore-not-found 2>/dev/null || true
        rm -rf "$WATCH_DIR" "$WATCH_LOG"
        trap - EXIT

        if [ "$SKIP_OK" != "true" ]; then
          echo "❌ Failing hook did not prevent apply (ConfigMap was created)"
          exit 1
        fi
        if [ "$HOOK_FAIL_LOGGED" = "true" ]; then
          echo "✅ Failing hook correctly skipped apply"
        else
          echo "⚠️  Apply was skipped but hook failure message not found in log"
          echo "✅ Test passed (ConfigMap was not created)"
        fi

    - name: 🐞 Debug Kubernetes failure
      if: failure() && (steps.watch-initial-apply.outcome == 'failure' || steps.watch-file-modify.outcome == 'failure' || steps.watch-boundary.outcome == 'failure' || steps.watch-sigterm.outcome == 'failure' || steps.watch-hook.outcome == 'failure' || steps.watch-hook-fail.outcome == 'failure')
      uses: ./.github/actions/debug-kubernetes-failure
      with:
        kubectl-command: "ksail workload"

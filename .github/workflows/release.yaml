---
name: Release
on:
  workflow_dispatch:

concurrency:
  group: "Release"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: 🎉 Create Release
    uses: devantler-tech/reusable-workflows/.github/workflows/create-release.yaml@6b44cfb837e545a8179b0cc97a63b7c694cb9287 # v5.5.7
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

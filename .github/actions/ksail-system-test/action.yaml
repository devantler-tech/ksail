name: KSail System Test
description: |
  Runs a full end-to-end system test of KSail, testing cluster lifecycle
  and workload management capabilities.

inputs:
  distribution:
    description: Kubernetes distribution (Vanilla, K3s, Talos, VCluster)
    required: true
  provider:
    description: Infrastructure provider (Docker, Hetzner, Omni)
    required: false
    default: "Docker"
  args:
    description: Additional arguments for cluster init/create
    required: false
    default: ""
  init:
    description: Whether to run ksail cluster init before create
    required: false
    default: "false"
  test-workload-image:
    description: Image to use for workload create test
    required: false
    default: "traefik/whoami:v1.10"
  test-workload-name:
    description: Name for the test workload deployment
    required: false
    default: "whoami"
  apply-overlay-path:
    description: Path to kustomize overlay for workload apply test
    required: false
    default: ""
  gitops-path:
    description: Path for GitOps push (only if --gitops-engine in args)
    required: false
    default: "k8s"
  workload-timeout:
    description: |
      Timeout for workload wait operations. Set to 10 minutes to handle
      intermittent delays in CI environments (image pulls, resource contention).
    required: false
    default: "600s"
  ghcr-user:
    description: GitHub Container Registry username (for external registry auth)
    required: false
    default: ""
  ghcr-token:
    description: GitHub Container Registry token (for external registry auth)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: ✅ Validate Omni inputs
      if: inputs.provider == 'Omni'
      shell: bash
      run: |
        if [ -z "$OMNI_SERVICE_ACCOUNT_KEY" ]; then
          echo "❌ ERROR: OMNI_SERVICE_ACCOUNT_KEY env var is required when provider is Omni" >&2
          exit 1
        fi
        if [ -z "$OMNI_ENDPOINT" ]; then
          echo "❌ ERROR: OMNI_ENDPOINT env var is required when provider is Omni" >&2
          exit 1
        fi

    - name: 🔧 Generate unique artifact tag
      id: generate-tag
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        INIT: ${{ inputs.init }}
        ARGS: ${{ inputs.args }}
      run: |
        # Generate unique tag: distribution-provider-init-sanitized_args-shortsha
        DIST_LOWER=$(echo "$DISTRIBUTION" | tr '[:upper:]' '[:lower:]')
        PROVIDER_LOWER=$(echo "$PROVIDER" | tr '[:upper:]' '[:lower:]')
        INIT_SUFFIX=$([ "$INIT" = "true" ] && echo "init" || echo "no-init")
        # Sanitize args: extract key values, remove special chars, lowercase
        ARGS_SANITIZED=$(echo "$ARGS" | sed 's/--[a-z-]*=\?//g' | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-30)
        SHORT_SHA="${GITHUB_SHA:0:7}"
        if [[ -n "$ARGS_SANITIZED" ]]; then
          TAG="${DIST_LOWER}-${PROVIDER_LOWER}-${INIT_SUFFIX}-${ARGS_SANITIZED}-${SHORT_SHA}"
        else
          TAG="${DIST_LOWER}-${PROVIDER_LOWER}-${INIT_SUFFIX}-${SHORT_SHA}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Generated unique artifact tag: $TAG"

    - name: 🔧 Resolve GHCR credentials in args
      id: resolve-args
      shell: bash
      env:
        ARGS: ${{ inputs.args }}
        GHCR_USER: ${{ inputs.ghcr-user }}
        GHCR_TOKEN: ${{ inputs.ghcr-token }}
        ARTIFACT_TAG: ${{ steps.generate-tag.outputs.tag }}
      run: |
        # Inject GHCR credentials into --local-registry if it contains ghcr.io
        RESOLVED_ARGS="$ARGS"
        if [[ "$ARGS" == *"--local-registry"* ]] && [[ "$ARGS" == *"ghcr.io"* ]] && [[ -n "$GHCR_USER" ]] && [[ -n "$GHCR_TOKEN" ]]; then
          # Replace 'ghcr.io/' with 'user:token@ghcr.io/'
          RESOLVED_ARGS="${ARGS//ghcr.io\//${GHCR_USER}:${GHCR_TOKEN}@ghcr.io/}"
          # Append unique tag to avoid collisions between parallel CI runs
          # Format: user:token@ghcr.io/org/repo/path -> user:token@ghcr.io/org/repo/path:tag
          RESOLVED_ARGS="${RESOLVED_ARGS}:${ARTIFACT_TAG}"
        fi
        echo "args=$RESOLVED_ARGS" >> "$GITHUB_OUTPUT"

    - name: 🧪 ksail cluster create
      id: cluster-create
      uses: ./.github/actions/ksail-cluster
      with:
        distribution: ${{ inputs.distribution }}
        provider: ${{ inputs.provider }}
        args: ${{ steps.resolve-args.outputs.args }}
        init: ${{ inputs.init }}
        install: "false"
        cache: "true"
        validate: ${{ inputs.init }}

    - name: 🧪 ksail cluster info
      shell: bash
      env:
      run: |
        ksail cluster info

    - name: 🧪 ksail cluster connect --help
      shell: bash
      run: |
        ksail cluster connect --help

    - name: 🧪 ksail cluster list
      shell: bash
      env:
      run: |
        ksail cluster list

    - name: 🧪 ksail workload create
      id: workload-create
      shell: bash
      env:
        WORKLOAD_NAME: ${{ inputs.test-workload-name }}
        WORKLOAD_IMAGE: ${{ inputs.test-workload-image }}
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        for attempt in 1 2 3; do
          if ksail workload create deployment "$WORKLOAD_NAME" --image="$WORKLOAD_IMAGE"; then
            break
          fi
          echo "⚠️ workload create attempt $attempt failed, retrying in 10s…"
          sleep 10
        done
        ksail workload wait --for=condition=Available deployment/"$WORKLOAD_NAME" --timeout="$TIMEOUT"

    - name: 🧪 ksail workload get
      shell: bash
      env:
        WORKLOAD_NAME: ${{ inputs.test-workload-name }}
      run: |
        ksail workload get deployment/"$WORKLOAD_NAME"

    - name: 🧪 ksail workload describe
      shell: bash
      env:
        WORKLOAD_NAME: ${{ inputs.test-workload-name }}
      run: |
        ksail workload describe deployment/"$WORKLOAD_NAME"

    - name: 🧪 ksail workload logs
      shell: bash
      env:
        WORKLOAD_NAME: ${{ inputs.test-workload-name }}
      run: |
        ksail workload logs deployment/"$WORKLOAD_NAME" --tail=5

    - name: 🧪 ksail workload scale
      id: workload-scale
      shell: bash
      env:
        WORKLOAD_NAME: ${{ inputs.test-workload-name }}
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        ksail workload scale deployment/"$WORKLOAD_NAME" --replicas=2
        ksail workload wait --for=condition=Available deployment/"$WORKLOAD_NAME" --timeout="$TIMEOUT"
        ksail workload scale deployment/"$WORKLOAD_NAME" --replicas=1
        ksail workload wait --for=condition=Available deployment/"$WORKLOAD_NAME" --timeout="$TIMEOUT"

    - name: 🧪 ksail workload install
      id: workload-install
      shell: bash
      env:
      run: |
        # Install a lightweight Helm chart to verify workload install works
        install_succeeded=false
        for attempt in 1 2 3; do
          if ksail workload install ksail-install-test oci://ghcr.io/stefanprodan/charts/podinfo --version=6.7.1 --wait --timeout=120s; then
            install_succeeded=true
            break
          fi
          echo "⚠️ workload install attempt $attempt failed, retrying in 10s…"
          sleep 10
        done
        if [ "$install_succeeded" != "true" ]; then
          echo "❌ workload install failed after 3 attempts"
          exit 1
        fi
        echo "✅ workload install succeeded"

    - name: 🧪 ksail workload apply
      id: workload-apply
      if: inputs.apply-overlay-path != ''
      shell: bash
      env:
        OVERLAY_PATH: ${{ inputs.apply-overlay-path }}
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        apply_succeeded=false
        for attempt in 1 2 3; do
          if ksail workload apply -k "$OVERLAY_PATH" --wait --timeout="$TIMEOUT"; then
            apply_succeeded=true
            break
          fi
          echo "⚠️ workload apply attempt $attempt failed, retrying in 10s…"
          sleep 10
        done
        if [ "$apply_succeeded" != "true" ]; then
          echo "❌ workload apply failed after 3 attempts"
          exit 1
        fi

    - name: 🧪 ksail workload watch
      id: workload-watch
      if: inputs.apply-overlay-path != ''
      continue-on-error: true
      shell: bash
      env:
      run: |
        # Create a temporary directory with a simple manifest
        WATCH_DIR=$(mktemp -d)
        cat > "$WATCH_DIR/deployment.yaml" <<'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ksail-watch-test
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ksail-watch-test
          template:
            metadata:
              labels:
                app: ksail-watch-test
            spec:
              containers:
                - name: test
                  image: traefik/whoami:v1.10
        EOF
        # Apply the initial manifest
        ksail workload apply -f "$WATCH_DIR/deployment.yaml"
        ksail workload wait --for=condition=Available deployment/ksail-watch-test --timeout=120s
        # Start watcher in background
        ksail workload watch --path "$WATCH_DIR" &
        WATCH_PID=$!
        sleep 5
        # Modify the manifest (change replicas)
        sed -i 's/replicas: 1/replicas: 2/' "$WATCH_DIR/deployment.yaml"
        # Wait for watcher to pick up the change (poll with timeout)
        WATCH_SUCCESS=false
        for i in $(seq 1 6); do
          sleep 5
          REPLICAS=$(ksail workload get deployment/ksail-watch-test -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "unknown")
          if [ "$REPLICAS" = "2" ]; then
            WATCH_SUCCESS=true
            break
          fi
          echo "  Waiting for watch to apply change (attempt $i/6, replicas=$REPLICAS)..."
        done
        kill $WATCH_PID 2>/dev/null || true
        # Clean up
        ksail workload delete deployment/ksail-watch-test --ignore-not-found
        rm -rf "$WATCH_DIR"
        if [ "$WATCH_SUCCESS" = "true" ]; then
          echo "✅ Workload watch correctly auto-applied changes"
        else
          echo "❌ Workload watch test failed: expected 2 replicas, got $REPLICAS"
          exit 1
        fi

    - name: 🧪 ksail workload push and reconcile
      id: workload-push-reconcile
      if: contains(inputs.args, '--gitops-engine')
      shell: bash
      env:
        GITOPS_PATH: ${{ inputs.gitops-path }}
        GHCR_USER: ${{ inputs.ghcr-user }}
        GHCR_TOKEN: ${{ inputs.ghcr-token }}
      run: |
        mkdir -p "$GITOPS_PATH"
        if [ ! -f "$GITOPS_PATH/kustomization.yaml" ]; then
          echo "apiVersion: kustomize.config.k8s.io/v1beta1" > "$GITOPS_PATH/kustomization.yaml"
          echo "kind: Kustomization" >> "$GITOPS_PATH/kustomization.yaml"
          echo "resources: []" >> "$GITOPS_PATH/kustomization.yaml"
        fi
        ksail workload push --path "$GITOPS_PATH/"
        ksail workload reconcile

    - name: 🧪 ksail workload delete
      shell: bash
      env:
        WORKLOAD_NAME: ${{ inputs.test-workload-name }}
      run: |
        ksail workload delete deployment/"$WORKLOAD_NAME" --ignore-not-found

    - name: 🧪 ksail cluster update --dry-run
      id: cluster-update-dry-run
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        set -o pipefail
        # Strip init-only flags that cluster update does not accept
        UPDATE_ARGS=$(echo "$ARGS" | sed 's/--image-verification [^ ]*//')
        # shellcheck disable=SC2086
        ksail cluster update --dry-run --distribution "$DISTRIBUTION" --provider "$PROVIDER" $UPDATE_ARGS | tee /tmp/update-dry-run-output.txt
        # Fail early if the dry run detects unexpected changes.
        # The cluster was just created with the same config, so zero changes are expected.
        if ! grep -qE "No changes detected|Would apply 0 in-place, 0 reboot-required, 0 recreate-required" /tmp/update-dry-run-output.txt; then
          echo "❌ ERROR: Unexpected changes detected in dry run after cluster creation"
          echo "This indicates a regression — the cluster was just created with the same configuration."
          exit 1
        fi
        echo "✅ No unexpected changes detected (dry run)"

    - name: 🧪 ksail cluster update
      id: cluster-update
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        set -o pipefail
        # Strip init-only flags that cluster update does not accept
        UPDATE_ARGS=$(echo "$ARGS" | sed 's/--image-verification [^ ]*//')
        # shellcheck disable=SC2086
        ksail cluster update --force --distribution "$DISTRIBUTION" --provider "$PROVIDER" $UPDATE_ARGS | tee /tmp/update-output.txt
        # Fail early if the update detects unexpected changes.
        # The cluster was just created with the same config, so zero changes are expected.
        if ! grep -q "No changes detected" /tmp/update-output.txt; then
          echo "❌ ERROR: Unexpected changes detected during update after cluster creation"
          echo "This indicates a regression — the cluster was just created with the same configuration."
          exit 1
        fi
        echo "✅ No unexpected changes detected"

    - name: 🐞 Debug Kubernetes failure
      if: failure() && (steps.cluster-create.outcome == 'failure' || steps.workload-create.outcome == 'failure' || steps.workload-install.outcome == 'failure' || steps.workload-apply.outcome == 'failure' || steps.workload-scale.outcome == 'failure' || steps.workload-push-reconcile.outcome == 'failure' || steps.cluster-update-dry-run.outcome == 'failure' || steps.cluster-update.outcome == 'failure')
      uses: ./.github/actions/debug-kubernetes-failure
      with:
        kubectl-command: "ksail workload"

    - name: 🧪 ksail cluster stop
      shell: bash
      env:
      run: |
        ksail cluster stop

    - name: 🧪 ksail cluster start
      shell: bash
      env:
      run: |
        start_succeeded=false
        for attempt in 1 2 3; do
          if timeout 600 ksail cluster start; then
            start_succeeded=true
            break
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "⚠️ cluster start attempt $attempt failed, retrying in 10s…"
            sleep 10
          fi
        done
        if [ "$start_succeeded" != "true" ]; then
          echo "❌ cluster start failed after 3 attempts"
          exit 1
        fi

    - name: 🧪 ksail cluster switch
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
      run: |
        # Get current cluster name from ksail cluster list
        # Output format: "provider: cluster1, cluster2, ..."
        PROVIDER_NAME=$(printf '%s' "$PROVIDER" | tr '[:upper:]' '[:lower:]')
        CLUSTER_NAME=$(
          ksail cluster list 2>/dev/null \
            | grep -i "^${PROVIDER_NAME}:" \
            | head -1 \
            | cut -d: -f2- \
            | cut -d, -f1 \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            || true
        )
        if [ -n "$CLUSTER_NAME" ]; then
          ksail cluster switch "$CLUSTER_NAME"
        else
          echo "⚠️ Could not determine cluster name for switch test, skipping"
        fi

    - name: 🧪 ksail cluster delete
      if: always()
      shell: bash
      env:
      run: |
        ksail cluster delete || echo "⚠️ ksail cluster delete failed (cluster may not have been created)"

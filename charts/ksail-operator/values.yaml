# Default values for the ksail-operator chart.

# nameOverride / fullnameOverride let you customize the generated resource names.
nameOverride: ""
fullnameOverride: ""

# imagePullSecrets are references to existing Secrets (type kubernetes.io/dockerconfigjson) used to
# pull the operator image. Leave empty to rely on the node's registry credentials (the default: the
# published image is public). Set it when the image lives in a private registry, or when you would
# rather not depend on node-level auth — a stale node credential otherwise leaves new pods unable to
# pull, which blocks upgrades. The secrets are attached to both the operator Deployment's pod spec
# and the chart's ServiceAccount, so pods that use the ServiceAccount inherit them too.
#
#   imagePullSecrets:
#     - name: ghcr-auth
imagePullSecrets: []

operator:
  enabled: true
  image:
    repository: ghcr.io/devantler-tech/ksail
    # tag defaults to v<appVersion> (the v-prefixed chart appVersion, matching the
    # released image tag) when empty.
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  # leaderElection ensures a single active operator when running multiple replicas.
  leaderElection: true
  # dockerSocket mounts the host Docker socket for Docker-based distributions (Kind/K3d).
  # This is privileged and single-node; leave disabled and prefer VCluster/K3s in-cluster.
  dockerSocket:
    enabled: false
  metricsBindAddress: "0"
  healthProbeBindAddress: ":8081"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

api:
  # Port the operator REST API listens on (consumed by the UI). Set to 0 to disable the API.
  bindPort: 8080

# hostCluster self-registers the cluster the operator runs on as a Cluster resource (named "host",
# labelled ksail.io/host-cluster, in the release namespace), so the hub itself appears in the
# cluster list and its workloads can be browsed through the operator's ServiceAccount — like
# Rancher's "local" cluster or Argo CD's "in-cluster" destination. The operator never provisions,
# updates, or deletes the underlying cluster for this entry, and the API rejects lifecycle
# mutations on it (kubectl-deleting the resource merely deregisters it until the next restart).
hostCluster:
  enabled: true

# ui is the web dashboard. It is embedded in the operator binary and served by the operator itself
# on the API port (api.bindPort) — same origin as the REST API, so there is no separate UI
# container and no reverse proxy. Reach it via the ingress below or by port-forwarding the operator
# Service.
#
# readOnly is the single, user-controlled lock that governs the whole deployment. It is wired to
# the operator API as --read-only (enforced server-side); the SPA reflects the mode at runtime via
# GET /api/v1/config, so no separate UI env var is needed. It is intentionally independent of any
# cluster's spec.cluster.gitOpsEngine: set it to true for GitOps-enforced environments so the Git
# repository remains the single source of truth.
ui:
  readOnly: false
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ksail.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# auth enables app-driven OIDC authentication for the operator REST API (and therefore the UI),
# in the style of Headlamp: the API itself owns the OIDC login/callback (a confidential client),
# so clicking "Login" redirects the user to the configured provider (e.g. Dex), and after sign-in
# the provider calls back to the API, which establishes a secure session cookie. The client secret
# stays server-side. This closes the otherwise-unauthenticated API: when enabled, all cluster API
# calls require a valid session.
auth:
  oidc:
    enabled: false
    # issuerURL is the OIDC issuer (discovery) URL, e.g. https://dex.example.com.
    issuerURL: ""
    clientID: ""
    # clientSecret and sessionSecret are sensitive. Provide them inline (rendered into a Secret) or
    # reference a pre-created Secret via existingSecret (keys: client-secret, session-secret).
    clientSecret: ""
    # sessionSecret signs the session cookie. When left empty and no existingSecret is set, the
    # chart generates one (preserved across upgrades via lookup).
    sessionSecret: ""
    existingSecret: ""
    # scopes requested from the issuer (openid is always included).
    scopes: "openid email profile"
    # redirectURL is the OIDC callback registered with the provider. Defaults to
    # <scheme>://<first ingress host>/api/v1/auth/callback when ui.ingress is enabled.
    redirectURL: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # create the operator's ClusterRole and ClusterRoleBinding. Set to false to bind your own role.
  create: true
  # clusterAdmin grants a full wildcard ClusterRole (cluster-admin) instead of the least-privilege
  # default. Opt in only if a distribution/component set needs resources the default does not cover.
  clusterAdmin: false

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

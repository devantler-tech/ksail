# CONFIGURATION
APPLY_FIXES: all
FLAVOR_SUGGESTIONS: false
IGNORE_GITIGNORED_FILES: true
REPORTERS_MARKDOWN_SUMMARY_TYPE: sections
LINTER_RULES_PATH: .
DISABLE_LINTERS:
  - GO_GOLANGCI_LINT # Disabled: MegaLinter container has Go 1.24.7, but project requires Go 1.26.0. CI runs golangci-lint separately with correct Go version.
  - GO_REVIVE
  - REPOSITORY_CHECKOV
  - REPOSITORY_GITLEAKS
  - REPOSITORY_GRYPE
  - REPOSITORY_SECRETLINT
  - REPOSITORY_TRIVY
  - SPELL_CSPELL

# EXCLUDE FILTERS
EXCLUDED_DIRECTORIES:
  - megalinter-reports
  - report
  - .github/agents
  - .github/prompts
  - .jscpd
  - schemas
  - .agents
ACTION_ACTIONLINT_FILTER_REGEX_EXCLUDE: (.github/workflows/.*\.lock\.yml|.github/workflows/agentics-maintenance\.yml)
# web/ui is a self-contained Vite/React app with its own toolchain (tsc + vite build, run in CI),
# so it is excluded from the repo-wide linters here.
FILTER_REGEX_EXCLUDE: (megalinter-reports/.*|web/ui/.*)
JSON_V8R_FILTER_REGEX_EXCLUDE: (\.github/workflows/.*\.lock\.yml)
MARKDOWN_MARKDOWN_TABLE_FORMATTER_FILTER_REGEX_EXCLUDE: .github/(agents|prompts)
MARKDOWN_MARKDOWNLINT_FILTER_REGEX_EXCLUDE: (.github/(agents|prompts)|\.github/workflows/.*\.lock\.yml)
SPELL_LYCHEE_FILTER_REGEX_EXCLUDE: (AGENTS\.md|.*\.mdx|docs/src/.*\.md|\.github/workflows/.*\.md)
# Helm chart templates contain Go template directives ({{ ... }}) and are not valid standalone
# YAML, so exclude them from the YAML linters.
YAML_YAMLLINT_FILTER_REGEX_EXCLUDE: (charts/.*/templates/.*|\.github/workflows/.*\.lock\.yml)
YAML_PRETTIER_FILTER_REGEX_EXCLUDE: charts/.*/templates/.*
YAML_V8R_FILTER_REGEX_EXCLUDE: (\.github/workflows/.*\.lock\.yml|charts/.*/templates/.*)

name: Test - KSail Cluster Action

on:
  workflow_dispatch:
    inputs:
      distribution:
        description: "KSail distribution to provision"
        type: choice
        options:
          - Vanilla
          - K3s
        default: "Vanilla"

permissions:
  contents: read

jobs:
  test-ksail-cluster:
    name: 🧪 Test KSail Cluster Action
    runs-on: ubuntu-latest
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Provision Cluster
        id: cluster
        uses: ./.github/actions/ksail-cluster
        with:
          distribution: ${{ inputs.distribution }}

      - name: ✅ Verify Cluster
        run: ksail cluster info

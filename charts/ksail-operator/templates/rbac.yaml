{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ksail-operator.fullname" . }}
  labels:
    {{- include "ksail-operator.labels" . | nindent 4 }}
rules:
  # Provisioning a cluster in-cluster (a vcluster control plane) means installing a full application:
  # the operator must create and manage namespaces, workloads, Services, ConfigMaps, PVCs and RBAC —
  # including the ClusterRole/ClusterRoleBinding the vcluster syncer needs, which itself carries broad
  # rights, so granting them requires equally broad rights (Kubernetes privilege-escalation rules).
  # Like other cluster-lifecycle operators (Cluster API, the vcluster platform), KSail therefore runs
  # with broad cluster access. This wildcard also covers the operator's own control loop: its
  # ksail.io/clusters CRD, the kubeconfig Secrets it reads, the Events it emits, and the
  # coordination.k8s.io Leases used for leader election. Set rbac.create=false to bind a narrower,
  # self-managed role if your distribution set needs less.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ksail-operator.fullname" . }}
  labels:
    {{- include "ksail-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ksail-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ksail-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

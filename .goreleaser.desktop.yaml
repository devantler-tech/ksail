# GoReleaser config for the macOS KSail desktop app.
#
# The desktop app is a separate Go module (desktop/) that links a system webview via CGO, so it
# cannot be cross-compiled in the main release; this config runs on a macOS runner and builds the
# darwin binary natively. It packages the binary into a KSail.app bundle, archives it, and publishes
# a Homebrew cask to the same tap as the main `ksail` cask.
version: 2

project_name: ksail-desktop

dist: dist-desktop

# This runs as a second GoReleaser invocation (on a macOS runner) after the main release. Disable
# GoReleaser's own release pipe entirely: `keep-existing` looks the release up via GitHub's
# get-release-by-tag API, which does NOT return drafts, so it would not find the main run's draft and
# would instead create a brand-new — and immediately published, hence immutable — release for the tag
# (see #4874). The cd.yaml job uploads the built archive to the existing draft with `gh release upload`
# instead. The Homebrew cask PR is still opened: the cask pipe builds its download URL from
# owner/repo/tag (not from a created release object), so it works with the release pipe disabled.
release:
  disable: true

before:
  hooks:
    # Build and stage the web UI so it is embedded in the desktop binary (see pkg/webui/embed.go).
    - bash scripts/stage-webui.sh

builds:
  - id: ksail-desktop
    dir: desktop
    main: .
    # Build straight into the bundle layout so the archive contains a valid KSail.app.
    binary: KSail.app/Contents/MacOS/ksail-desktop
    goos: [darwin]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w
    hooks:
      # Generate the bundle Info.plist (with the release version) and the Dock/Finder icon for
      # inclusion in the archive.
      post:
        - cmd: bash desktop/scripts/make-info-plist.sh "{{ .Version }}" "desktop/build/Info.plist"
        - cmd: bash desktop/scripts/make-icns.sh "desktop/resources/icon.png" "desktop/build/AppIcon.icns"

archives:
  - id: ksail-desktop
    ids: [ksail-desktop]
    formats: [zip]
    wrap_in_directory: false
    name_template: "KSail_{{ .Version }}_darwin_{{ .Arch }}"
    # The build emits KSail.app/Contents/MacOS/ksail-desktop; add the Info.plist and AppIcon.icns
    # alongside it so the archive holds a complete, icon-bearing KSail.app bundle.
    files:
      - src: desktop/build/Info.plist
        dst: KSail.app/Contents/Info.plist
      - src: desktop/build/AppIcon.icns
        dst: KSail.app/Contents/Resources/AppIcon.icns

homebrew_casks:
  - name: ksail-desktop
    ids: [ksail-desktop]
    # The release pipe is disabled (see above), so GoReleaser refuses to derive the default cask
    # download URL ("release is disabled, cannot use default url_template"). Set it explicitly to the
    # main repo's release assets — where the cd.yaml desktop-macos job uploads the archive via
    # `gh release upload`. This is the same URL the default would have produced.
    url:
      template: "https://github.com/devantler-tech/ksail/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      # The download URL host (github.com) differs from the homepage host
      # (ksail.devantler.tech), so `brew audit --strict` requires the URL to be
      # marked `verified:` with a trusted prefix.
      verified: "github.com/devantler-tech/ksail/"
    # `brew style` (Cask/Desc) rejects a desc that starts with the cask token
    # ("ksail-desktop") or ends with a full stop; keep it a plain noun phrase.
    description: "Native desktop app to manage local Kubernetes clusters"
    # Trailing slash required by `brew style` (Cask/HomepageUrlStyling).
    homepage: "https://ksail.devantler.tech/"
    repository:
      owner: devantler-tech
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_GITHUB_API_TOKEN }}"
      branch: "goreleaser/{{ .ProjectName }}"
      pull_request:
        enabled: true
        # Open as a draft so the tap cannot auto-merge it while the GitHub release is still a draft
        # (the cask download URL would 404 for `brew install`). Once the release is public the
        # cd.yaml `homebrew` job style-cleans, validates, and marks the PR ready for the tap's
        # check-gated auto-merge — a trusted programmed release path with no review or maintainer
        # promotion step (maintainer direction ksail#6095).
        # The branch is deliberately version-less (evergreen): a new release commits onto the same
        # branch so the ONE open cask PR updates in place instead of a new PR superseding it each
        # release (tap#1172 — GoReleaser tolerates an existing ref and soft-skips the duplicate PR;
        # the tap deletes the branch on merge, so it is recreated fresh from main next release).
        draft: true
    # The cask schema has no first-class `app`, `depends_on` or `uninstall` field; emit them via a
    # custom stanza. `depends_on macos` satisfies `brew style` (Homebrew/OSDependsOn) for this
    # macOS-only GUI cask; the bare `:big_sur` symbol means "Big Sur or newer" (matching the Go
    # toolchain's minimum supported macOS) and is the canonical form — the old `">= :big_sur"`
    # string-comparison syntax is deprecated by Homebrew. `uninstall quit:` names the app's bundle id
    # so Homebrew quits a running KSail.app before it replaces the bundle on upgrade/uninstall; without
    # it, upgrading while the app is open interrupts the transaction and leaves a stale
    # `<version>.upgrading` staging dir that blocks every subsequent `brew upgrade` (a real cascade
    # observed in the field). The cd.yaml `homebrew` job runs `brew style --fix`, which reorders these
    # stanzas into canonical position before the cask lands in the tap.
    custom_block: |
      depends_on macos: :big_sur
      app "KSail.app"
      uninstall quit: "tech.devantler.ksail.desktop"
    # Symlink the CLI from inside the installed app (the canonical GUI-app-with-CLI cask pattern),
    # so `ksail-desktop` is on PATH and `ksail open desktop` finds it. Without this, GoReleaser would
    # default the symlink to the bare basename, which does not exist at the archive root.
    binaries:
      - "#{appdir}/KSail.app/Contents/MacOS/ksail-desktop"
    hooks:
      post:
        # Single-line body: use the modifier form so `brew style`
        # (Style/IfUnlessModifier) is satisfied.
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/KSail.app"] if OS.mac?

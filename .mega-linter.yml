# CONFIGURATION
APPLY_FIXES: all
FLAVOR_SUGGESTIONS: false
IGNORE_GITIGNORED_FILES: true
REPORTERS_MARKDOWN_SUMMARY_TYPE: sections
LINTER_RULES_PATH: .
DISABLE_LINTERS:
  - GO_GOLANGCI_LINT # Disabled: MegaLinter container has Go 1.24.7, but project requires Go 1.26.0. CI runs golangci-lint separately with correct Go version.
  - GO_REVIVE
  - REPOSITORY_CHECKOV
  - REPOSITORY_GITLEAKS
  - REPOSITORY_GRYPE
  - REPOSITORY_SECRETLINT
  - REPOSITORY_TRIVY
  - SPELL_CSPELL

# zizmor resolves action tags via the GitHub API; MegaLinter strips GITHUB_TOKEN from the
# linter environment by default, so zizmor falls back to unauthenticated requests and fails
# with HTTP 401 ("couldn't list tags for actions/checkout"). Allow the token through so zizmor
# can authenticate (same fix as go-template's .mega-linter.yml).
ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN

# EXCLUDE FILTERS
EXCLUDED_DIRECTORIES:
  - megalinter-reports
  - report
  - .jscpd
  - schemas
  - .agents
# web/ui is a self-contained Vite/React app with its own toolchain (tsc + vite build, run in CI),
# so it is excluded from the repo-wide linters here. desktop/ is a separate cgo Go module
# (webview C bindings, kept out of the static ksail binary); MegaLinter's containerized Go
# analysis cannot import "C" without the desktop C deps installed, so it fails with
# "could not import C" / "webview.HintNone unknown invalid type". Real CI builds and tests
# desktop/ via dedicated jobs, so exclude it from the repo-wide linters here too.
FILTER_REGEX_EXCLUDE: (megalinter-reports/.*|web/ui/.*|desktop/.*)
SPELL_LYCHEE_FILTER_REGEX_EXCLUDE: (AGENTS\.md|.*\.mdx|docs/src/.*\.md)
# Helm chart templates contain Go template directives ({{ ... }}) and are not valid standalone
# YAML; generated CRDs (controller-gen output) are large and machine-managed. Exclude both from
# the YAML linters.
YAML_YAMLLINT_FILTER_REGEX_EXCLUDE: (charts/.*/templates/.*|charts/.*/crds/.*)
YAML_PRETTIER_FILTER_REGEX_EXCLUDE: (charts/.*/templates/.*|charts/.*/crds/.*)
YAML_V8R_FILTER_REGEX_EXCLUDE: (charts/.*/templates/.*|charts/.*/crds/.*)

name: Update Agent Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-agent-skills:
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/reusable-workflows/.github/workflows/update-agent-skills.yaml@e67eb6e14b733748c43a4e0df1c572fdd0ae3773 # v5.5.6
    with:
      dir: .agents/skills

name: "System Test - Hetzner"

on:
  workflow_dispatch:
    inputs:
      init:
        description: "Run ksail cluster init before create"
        required: false
        type: boolean
        default: true
      cni:
        description: "Container Network Interface"
        required: false
        type: choice
        options: [Default, Cilium, Calico]
        default: Default
      csi:
        description: "Container Storage Interface"
        required: false
        type: choice
        options: [Default, Enabled, Disabled]
        default: Default
      load_balancer:
        description: "LoadBalancer support"
        required: false
        type: choice
        options: [Default, Enabled, Disabled]
        default: Default
      metrics_server:
        description: "Metrics Server"
        required: false
        type: choice
        options: [Default, Enabled, Disabled]
        default: Default
      policy_engine:
        description: "Policy engine"
        required: false
        type: choice
        options: [None, Kyverno, Gatekeeper]
        default: None
      cert_manager:
        description: "Cert-Manager"
        required: false
        type: choice
        options: [Disabled, Enabled]
        default: Disabled
      gitops_engine:
        description: "GitOps engine"
        required: false
        type: choice
        options: [None, Flux, ArgoCD]
        default: None
      control_planes:
        description: "Number of control-plane nodes"
        required: false
        type: number
        default: 1
      workers:
        description: "Number of worker nodes"
        required: false
        type: number
        default: 0
  schedule:
    # Weekly: Sunday 03:00 UTC
    - cron: "0 3 * * 0"

env:
  GOPROXY: "https://proxy.golang.org|direct"
  GOMEMLIMIT: "6GiB"

concurrency:
  group: system-test-hetzner
  cancel-in-progress: false

permissions: {}

jobs:
  build-artifact:
    name: 🏗️ Build KSail Binary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail

  warm-helm-cache:
    name: 🔥 Warm Helm Cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-artifact]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🔥 Warm Helm chart cache
        uses: ./.github/actions/warm-helm-cache

  warm-mirror-cache:
    name: 🔥 Warm Mirror Cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-artifact]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🔥 Warm mirror cache
        uses: ./.github/actions/warm-mirror-cache

  system-test:
    name: "🧪 System Test (Hetzner)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [build-artifact, warm-helm-cache, warm-mirror-cache]
    environment: ci
    permissions:
      actions: read
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # On schedule: test both init and noinit with defaults.
        # On workflow_dispatch: run only the user-selected variant.
        init: ${{ github.event_name == 'schedule' && fromJSON('[true, false]') || fromJSON(format('[{0}]', inputs.init)) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⏳ Wait for cloud test queue
        id: turnstyle
        continue-on-error: true
        uses: softprops/turnstyle@e565d2d86403c5d23533937e95980570545e5586 # v3.2.3
        with:
          same-branch-only: false
          job-to-wait-for: "🧪 System Test (Hetzner)"
          poll-interval-seconds: 30
          abort-after-seconds: 5400

      - name: 🧹 Free disk space
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/free-disk-space

      - name: 🔐 Login to Docker Hub
        if: steps.turnstyle.outcome == 'success' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env] - third-party action input, no environment scoping available

      - name: ⚙️ Setup Go
        if: steps.turnstyle.outcome == 'success'
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 📥 Restore Helm Cache
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/restore-helm-cache

      - name: 📥 Restore Mirror Cache
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/restore-mirror-cache

      - name: 🔧 Build args string
        if: steps.turnstyle.outcome == 'success'
        id: args
        shell: bash
        run: |
          ARGS="--name st-hetzner-${{ matrix.init && 'init' || 'noinit' }}-${{ github.run_id }}"

          # Component configurations (only add non-default values)
          [[ "${{ inputs.cni }}" != "Default" && -n "${{ inputs.cni }}" ]] && ARGS+=" --cni ${{ inputs.cni }}"
          [[ "${{ inputs.csi }}" != "Default" && -n "${{ inputs.csi }}" ]] && ARGS+=" --csi ${{ inputs.csi }}"
          [[ "${{ inputs.load_balancer }}" != "Default" && -n "${{ inputs.load_balancer }}" ]] && ARGS+=" --load-balancer ${{ inputs.load_balancer }}"
          [[ "${{ inputs.metrics_server }}" != "Default" && -n "${{ inputs.metrics_server }}" ]] && ARGS+=" --metrics-server ${{ inputs.metrics_server }}"
          [[ "${{ inputs.policy_engine }}" != "None" && -n "${{ inputs.policy_engine }}" ]] && ARGS+=" --policy-engine ${{ inputs.policy_engine }}"
          [[ "${{ inputs.cert_manager }}" != "Disabled" && -n "${{ inputs.cert_manager }}" ]] && ARGS+=" --cert-manager ${{ inputs.cert_manager }}"
          [[ "${{ inputs.gitops_engine }}" != "None" && -n "${{ inputs.gitops_engine }}" ]] && ARGS+=" --gitops-engine ${{ inputs.gitops_engine }}"

          # Scale
          [[ "${{ inputs.control_planes }}" != "1" && -n "${{ inputs.control_planes }}" ]] && ARGS+=" --control-planes ${{ inputs.control_planes }}"
          [[ "${{ inputs.workers }}" != "0" && -n "${{ inputs.workers }}" ]] && ARGS+=" --workers ${{ inputs.workers }}"

          echo "value=${ARGS}" >> "$GITHUB_OUTPUT"
          echo "Args: ${ARGS}"

      - name: 🧪 Run KSail System Test
        if: steps.turnstyle.outcome == 'success'
        uses: ./.github/actions/ksail-system-test
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        with:
          distribution: Talos
          provider: Hetzner
          init: ${{ matrix.init }}
          args: ${{ steps.args.outputs.value }}
          apply-overlay-path: ".github/fixtures/podinfo-overlay"

          ghcr-user: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ❌ Fail on turnstyle failure
        if: steps.turnstyle.outcome != 'success'
        run: |
          echo "::error::Turnstyle failed or timed out waiting for cloud test queue — no resources were created"
          exit 1

  cleanup:
    name: 🧹 Cleanup Hetzner Resources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [system-test]
    if: always()
    environment: ci
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧹 Cleanup Hetzner resources for init cluster
        uses: ./.github/actions/cleanup-hetzner
        with:
          label-selector: "ksail.cluster.name=st-hetzner-init-${{ github.run_id }}"
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 🧹 Cleanup Hetzner resources for noinit cluster
        uses: ./.github/actions/cleanup-hetzner
        with:
          label-selector: "ksail.cluster.name=st-hetzner-noinit-${{ github.run_id }}"
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

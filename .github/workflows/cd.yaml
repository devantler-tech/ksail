---
name: CD
on:
  push:
    tags:
      - "v*"

env:
  # Use pipe (|) instead of comma (,) so Go falls through to direct on ANY proxy
  # error (including 403), not just 404/410. Hardens CI against transient
  # proxy.golang.org outages. go.sum still verifies module integrity.
  GOPROXY: "https://proxy.golang.org|direct"
  # Soft memory limit for Go build toolchain. GoReleaser links multiple
  # platform binaries and the linker can exceed runner memory.
  GOMEMLIMIT: "6GiB"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🧹 Cleanup node
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Disable module cache restoration in release workflows to avoid
          # cache-poisoning risk for runtime artifacts (see https://docs.zizmor.sh/audits/#cache-poisoning)
          cache: false

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  vscode-extension:
    name: 🧩 Release VSCode Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [goreleaser]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: vsce
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Compile
        run: npm run compile

      - name: 📦 Package extension
        run: npm run package

      - name: 📤 Publish to VS Code Marketplace
        run: npx @vscode/vsce publish "$VERSION"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VERSION: ${{ steps.get_version.outputs.version }}
        continue-on-error: true

      # - name: 📤 Publish to Open VSX Registry
      #   run: npx ovsx publish --pat ${{ secrets.OVSX_PAT }}
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   continue-on-error: true

      - name: 📦 Create VSIX package
        run: npx @vscode/vsce package "$VERSION" --out ksail_"$VERSION".vsix
        env:
          VERSION: ${{ steps.get_version.outputs.version }}

      - name: 📤 Upload VSIX to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" ksail_*.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  copilot-plugin:
    name: 🧩 Release Copilot CLI Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [goreleaser]
    environment: ci
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📑 Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: true

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 📤 Commit + push version bump
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          bump() {
            local file="$1" filter="$2"
            jq --arg v "$VERSION" "$filter" "$file" > "$file.tmp"
            mv "$file.tmp" "$file"
          }

          git config user.name "devantler-tech-bot[bot]"
          git config user.email "devantler-tech-bot[bot]@users.noreply.github.com"

          # Retry to tolerate concurrent tag releases or main advancing mid-run.
          # Each attempt regenerates the version bump on top of the latest
          # origin/${DEFAULT_BRANCH} so we never try to rebase a stale commit
          # that conflicts with a concurrent release.
          for attempt in 1 2 3; do
            git fetch origin "${DEFAULT_BRANCH}"
            git reset --hard "origin/${DEFAULT_BRANCH}"

            bump copilot-plugin/plugin.json ".version = \$v"
            bump copilot-plugin/.claude-plugin/plugin.json ".version = \$v"
            bump .github/plugin/marketplace.json ".metadata.version = \$v | .plugins[0].version = \$v"
            bump .claude-plugin/marketplace.json ".metadata.version = \$v | .plugins[0].version = \$v"

            if git diff --quiet; then
              echo "No version change to commit"
              exit 0
            fi

            git add copilot-plugin/plugin.json copilot-plugin/.claude-plugin/plugin.json \
              .github/plugin/marketplace.json .claude-plugin/marketplace.json
            git commit -m "chore(copilot-plugin): release v${VERSION}"

            if git push origin "HEAD:${DEFAULT_BRANCH}"; then
              exit 0
            fi

            echo "Push failed (attempt ${attempt}); refreshing from origin/${DEFAULT_BRANCH} and retrying"
            sleep 2
          done
          echo "Failed to push version bump after 3 attempts" >&2
          exit 1

  mcp-publish:
    name: 📤 Publish to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [goreleaser]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: 📝 Update server.json version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          IMAGE_TAG: ${{ steps.get_version.outputs.image_tag }}
        run: |
          jq --arg v "$VERSION" \
             --arg tag "$IMAGE_TAG" \
             '.version = $v | .packages[0].identifier = "ghcr.io/devantler-tech/ksail:" + $tag' \
             server.json > server.json.tmp && mv server.json.tmp server.json

      - name: 📥 Install mcp-publisher
        run: |
          curl -sLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz"
          curl -sLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/registry_1.5.0_checksums.txt"
          grep "mcp-publisher_linux_amd64.tar.gz$" registry_1.5.0_checksums.txt | sha256sum --check
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          rm mcp-publisher_linux_amd64.tar.gz registry_1.5.0_checksums.txt

      - name: 🔐 Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: 📤 Publish to MCP Registry
        run: ./mcp-publisher publish

  pages-build:
    name: 📄 Build Pages
    runs-on: ubuntu-latest
    needs: [goreleaser]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: ⚙️ Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: 📦 Install dependencies
        working-directory: docs
        run: npm ci

      - name: 📥 Download benchmark data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/public
          if gh api "repos/{owner}/{repo}/contents/dev/bench/data.js?ref=benchmark-data" \
            -H "Accept: application/vnd.github.raw+json" > /tmp/data.js 2>/tmp/benchmark-data.err; then
            node -e "
              const s = require('fs').readFileSync('/tmp/data.js', 'utf8');
              const match = s.match(/^window\.BENCHMARK_DATA\s*=\s*([\s\S]+?);?\s*\$/);
              if (!match) { process.stderr.write('Unexpected data.js format\n'); process.exit(1); }
              JSON.parse(match[1]);
              require('fs').writeFileSync('docs/public/benchmark-data.json', match[1]);
            "
            echo "Downloaded benchmark data from benchmark-data branch"
          else
            status=$?
            if grep -Eqi '(^|[^0-9])404([^0-9]|$)|not[ -]?found' /tmp/benchmark-data.err; then
              echo "No benchmark data found on benchmark-data branch; continuing without benchmark-data.json"
              rm -f docs/public/benchmark-data.json
            else
              echo "Failed to download benchmark data" >&2
              cat /tmp/benchmark-data.err >&2
              exit "$status"
            fi
          fi

      - name: 🏗️ Build with Astro
        working-directory: docs
        run: npm run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  pages-deploy:
    name: 🚀 Deploy Pages
    runs-on: ubuntu-latest
    needs: [pages-build]
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish-release:
    name: 📢 Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      [goreleaser, vscode-extension, mcp-publish, pages-deploy, copilot-plugin]
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 📢 Publish draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;

            // List releases and find the one matching the tag
            // Note: getReleaseByTag does not return draft releases, so we use listReleases instead
            let release;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              release = releases.find(r => r.tag_name === tag);
            } catch (error) {
              core.setFailed(`Failed to list releases: ${error.message}`);
              throw error;
            }

            if (!release) {
              core.setFailed(`Release not found for tag ${tag}`);
              return;
            }

            if (!release.draft) {
              console.log(`Release ${tag} is already published`);
              return;
            }

            // Publish the release
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });

            console.log(`Successfully published release ${tag}`);

name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: devantler-tech/actions/sync-github-labels@59d3ffbe1a9437fcc39e2794fa2f221abe878310 # v3.3.0

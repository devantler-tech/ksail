name: Warm Mirror Cache
description: |
  Pre-warms the mirror registry cache by extracting all images needed for
  system tests and pulling them through mirror registries. Run this before
  the system test matrix to ensure all tests have a warm cache.

  This action:
  1. Extracts images for all distribution × component combinations
  2. Deduplicates the image list
  3. Creates mirror registries for docker.io, ghcr.io, quay.io, and registry.k8s.io
  4. Pulls all images through the mirrors (populating their volumes)
  5. Saves the mirror volumes to GitHub Actions cache

  The cache key is based on the hash of the extracted image list, ensuring
  cache invalidation when any image reference changes (including code changes
  that affect image extraction, not just go.mod changes).

inputs:
  cache-version:
    description: |
      Version salt for cache key. Bump this to invalidate all caches.
    required: false
    default: "v1"

outputs:
  cache-hit:
    description: Whether the cache was restored (warm start)
    value: ${{ steps.restore-cache.outputs.cache-hit || 'false' }}
  cache-key:
    description: The cache key used for this operation
    value: ${{ steps.generate-key.outputs.cache-key }}
  image-count:
    description: Number of unique images extracted
    value: ${{ steps.extract-images.outputs.count }}

runs:
  using: composite
  steps:
    - name: 📋 Extract images for all configurations
      id: extract-images
      shell: bash
      run: |
        echo "📋 Extracting images for all system test configurations..."

        # All unique distribution × component combinations from CI matrix
        CONFIGS=(
          # Default (Cilium CNI)
          "--distribution Vanilla --cni Cilium"

          # Full featured (Cilium + Flux + all extras)
          "--distribution Vanilla --cni Cilium --csi Enabled --load-balancer Enabled --metrics-server Enabled --policy-engine Kyverno --cert-manager Enabled --gitops-engine Flux"

          # Calico + ArgoCD + Gatekeeper
          "--distribution Vanilla --cni Calico --policy-engine Gatekeeper --gitops-engine ArgoCD"

          # K3s specific (no cloud-provider-kind)
          "--distribution K3s --cni Cilium --gitops-engine Flux"
          "--distribution K3s --cni Cilium --gitops-engine ArgoCD"

          # Talos specific
          "--distribution Talos --cni Cilium --gitops-engine Flux"
          "--distribution Talos --cni Cilium --gitops-engine ArgoCD"

          # Talos + MetalLB (only installed for Talos×Docker×LB=Enabled)
          "--distribution Talos --cni Cilium --load-balancer Enabled --gitops-engine Flux"

          # VCluster specific
          "--distribution VCluster --cni Cilium --gitops-engine Flux"
          "--distribution VCluster --cni Cilium --gitops-engine ArgoCD"
        )

        # Create temp file for all images
        IMAGES_FILE="/tmp/all-images.txt"
        > "$IMAGES_FILE"
        ERRORS_FILE="/tmp/extraction-errors.txt"
        > "$ERRORS_FILE"

        for config in "${CONFIGS[@]}"; do
          echo "  Extracting: $config"
          # shellcheck disable=SC2086
          if ! ksail workload images $config >> "$IMAGES_FILE" 2>> "$ERRORS_FILE"; then
            echo "  ⚠️ Warning: Failed to extract images for: $config"
          fi
        done

        # Show any errors that occurred
        if [ -s "$ERRORS_FILE" ]; then
          echo "⚠️ Extraction errors (may be expected for some configs):"
          cat "$ERRORS_FILE"
        fi

        # Append VCluster provisioner-level images that ksail workload images
        # cannot enumerate (pulled by the vCluster SDK, not the installer factory).
        # Source of truth: pkg/fsutil/configmanager/vcluster/Dockerfile
        grep '^FROM ' pkg/fsutil/configmanager/vcluster/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append Flux distribution controller images that the Flux operator deploys
        # when creating a FluxInstance. These are not part of the operator Helm chart
        # but are critical for avoiding image pull timeouts (see issue #3012).
        # Source of truth: pkg/svc/installer/flux/Dockerfile.distribution
        grep '^FROM ' pkg/svc/installer/flux/Dockerfile.distribution | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append KWOK control plane images pulled by kwokctl on the host Docker daemon.
        # kwokctl calls "docker inspect <image>" first and skips the pull if the image
        # already exists locally. Pre-pulling via mirror and saving with docker save/load
        # ensures KWOK clusters are created without hitting registry.k8s.io rate limits
        # when many KWOK system tests run in parallel. See issue #4058.
        # Source of truth: pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane
        grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append CI test workload images that are not part of any cluster component
        # but are used by ksail-test-workload, ksail-test-backup-restore,
        # ksail-test-workload-watch, and the in-cluster API connectivity pre-flight
        # pod. Without pre-warming, transient Docker Hub or proxy registry errors can
        # cause ImagePullBackOff timeouts in system tests (see issue #3822).
        echo "docker.io/traefik/whoami:v1.10" >> "$IMAGES_FILE"
        echo "docker.io/library/busybox:1.36.1" >> "$IMAGES_FILE"

        # Deduplicate and sort
        sort -u "$IMAGES_FILE" > /tmp/unique-images.txt
        mv /tmp/unique-images.txt "$IMAGES_FILE"

        COUNT=$(wc -l < "$IMAGES_FILE" | tr -d ' ')
        echo "count=$COUNT" >> "$GITHUB_OUTPUT"

        # Fail if no images were extracted (indicates a problem with ksail or config)
        if [ "$COUNT" -eq 0 ]; then
          echo "❌ Error: No images extracted. Check errors above."
          exit 1
        fi

        echo "✅ Extracted $COUNT unique images"

        # Compute hash of the image list for cache key
        # This ensures cache invalidation when any image reference changes
        IMAGES_HASH=$(sha256sum "$IMAGES_FILE" | cut -c1-12)
        echo "images-hash=$IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 Images hash: $IMAGES_HASH"

        # Show images for debugging
        echo "📦 Images to cache:"
        cat "$IMAGES_FILE" | head -30
        if [ "$COUNT" -gt 30 ]; then
          echo "  ... and $((COUNT - 30)) more"
        fi

    - name: 🔑 Generate cache key
      id: generate-key
      shell: bash
      env:
        CACHE_VERSION: ${{ inputs.cache-version }}
        RUNNER_OS: ${{ runner.os }}
        RUNNER_ARCH: ${{ runner.arch }}
        IMAGES_HASH: ${{ steps.extract-images.outputs.images-hash }}
      run: |
        # Use hash of extracted image list to invalidate when images change
        # This covers both go.mod changes AND code changes affecting image extraction
        CACHE_KEY="mirror-cache-${CACHE_VERSION}-${IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "cache-key=$CACHE_KEY" >> "$GITHUB_OUTPUT"
        echo "📦 Cache key: $CACHE_KEY"

    - name: 📥 Restore mirror cache
      id: restore-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/mirror-cache
        key: ${{ steps.generate-key.outputs.cache-key }}
        restore-keys: |
          mirror-cache-${{ inputs.cache-version }}-

    - name: 🔍 Check if cache is complete
      id: check-cache
      if: steps.restore-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        if [ -d "/tmp/mirror-cache" ] && [ -n "$(ls -A /tmp/mirror-cache 2>/dev/null)" ]; then
          echo "✅ Cache restored, checking completeness..."
          # Check for all 4 mirror volumes (using KSail's naming convention).
          # kwok-control-plane.tar is optional: its creation is non-fatal in the
          # warm step, so its absence must not invalidate an otherwise complete cache.
          if [ -f "/tmp/mirror-cache/docker.io.tar" ] && \
             [ -f "/tmp/mirror-cache/ghcr.io.tar" ] && \
             [ -f "/tmp/mirror-cache/quay.io.tar" ] && \
             [ -f "/tmp/mirror-cache/registry.k8s.io.tar" ]; then
            echo "complete=true" >> "$GITHUB_OUTPUT"
            echo "✅ Cache complete: 4 mirror volumes present (kwok-control-plane.tar is optional)"
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Cache incomplete, will re-warm"
          fi
        else
          echo "complete=false" >> "$GITHUB_OUTPUT"
        fi

    - name: 🐳 Create mirror registries
      id: create-mirrors
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "🐳 Creating mirror registries for docker.io, ghcr.io, quay.io, and registry.k8s.io..."

        # Create Docker network for mirrors
        docker network create ksail-mirrors 2>/dev/null || true

        # Create docker.io mirror (port 5000)
        docker run -d \
          --name docker.io-mirror \
          --network ksail-mirrors \
          -p 5000:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://registry-1.docker.io \
          -v docker.io:/var/lib/registry \
          registry:3 || echo "docker.io mirror already exists"

        # Create ghcr.io mirror (port 5001)
        docker run -d \
          --name ghcr.io-mirror \
          --network ksail-mirrors \
          -p 5001:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://ghcr.io \
          -v ghcr.io:/var/lib/registry \
          registry:3 || echo "ghcr.io mirror already exists"

        # Create quay.io mirror (port 5002)
        docker run -d \
          --name quay.io-mirror \
          --network ksail-mirrors \
          -p 5002:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://quay.io \
          -v quay.io:/var/lib/registry \
          registry:3 || echo "quay.io mirror already exists"

        # Create registry.k8s.io mirror (port 5003)
        docker run -d \
          --name registry.k8s.io-mirror \
          --network ksail-mirrors \
          -p 5003:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://registry.k8s.io \
          -v registry.k8s.io:/var/lib/registry \
          registry:3 || echo "registry.k8s.io mirror already exists"

        # Wait for registries to be ready
        sleep 5
        echo "✅ Mirror registries created"

    - name: 📥 Pull images through mirrors
      id: pull-images
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "📥 Pulling images through mirrors..."

        IMAGES_FILE="/tmp/all-images.txt"
        TOTAL=$(wc -l < "$IMAGES_FILE" | tr -d ' ')
        CURRENT=0
        FAILED=0

        while IFS= read -r image; do
          CURRENT=$((CURRENT + 1))

          # Determine which mirror to use based on registry
          if [[ "$image" == docker.io/* ]] || [[ "$image" == library/* ]] || [[ "$image" != */* ]]; then
            # Normalize image reference for docker.io
            if [[ "$image" != docker.io/* ]]; then
              if [[ "$image" == library/* ]]; then
                IMAGE_REF="docker.io/$image"
              else
                IMAGE_REF="docker.io/library/$image"
              fi
            else
              IMAGE_REF="$image"
            fi
            PULL_REF="${IMAGE_REF/docker.io\//localhost:5000/}"
          elif [[ "$image" == ghcr.io/* ]]; then
            PULL_REF="${image/ghcr.io\//localhost:5001/}"
          elif [[ "$image" == quay.io/* ]]; then
            PULL_REF="${image/quay.io\//localhost:5002/}"
          elif [[ "$image" == registry.k8s.io/* ]]; then
            PULL_REF="${image/registry.k8s.io\//localhost:5003/}"
          else
            # Unknown registry, try direct pull
            echo "[$CURRENT/$TOTAL] Pulling directly: $image"
            docker pull "$image" --quiet 2>/dev/null || {
              echo "  ⚠️ Failed: $image"
              FAILED=$((FAILED + 1))
            }
            continue
          fi

          echo "[$CURRENT/$TOTAL] Pulling via mirror: $image"

          # Pull through the mirror to populate cache
          # The mirror acts as a pull-through cache
          docker pull "$PULL_REF" --quiet 2>/dev/null || {
            # Fallback to direct pull if mirror fails
            echo "  ⚠️ Mirror failed, trying direct: $image"
            docker pull "$image" --quiet 2>/dev/null || {
              echo "  ⚠️ Failed: $image"
              FAILED=$((FAILED + 1))
            }
          }

        done < "$IMAGES_FILE"

        echo ""
        echo "✅ Pulled $((TOTAL - FAILED))/$TOTAL images successfully"
        if [ "$FAILED" -gt 0 ]; then
          echo "⚠️ $FAILED images failed (may be platform-specific)"
        fi

    - name: 💾 Export mirror volumes
      id: export-volumes
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "💾 Exporting mirror registry volumes..."
        mkdir -p /tmp/mirror-cache

        # Export docker.io mirror volume
        docker run --rm \
          -v docker.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f \
          tar -cf /backup/docker.io.tar -C /volume . || echo "⚠️ Failed to export docker.io mirror"

        # Export ghcr.io mirror volume
        docker run --rm \
          -v ghcr.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f \
          tar -cf /backup/ghcr.io.tar -C /volume . || echo "⚠️ Failed to export ghcr.io mirror"

        # Export quay.io mirror volume
        docker run --rm \
          -v quay.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f \
          tar -cf /backup/quay.io.tar -C /volume . || echo "⚠️ Failed to export quay.io mirror"

        # Export registry.k8s.io mirror volume
        docker run --rm \
          -v registry.k8s.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          busybox:1.37@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f \
          tar -cf /backup/registry.k8s.io.tar -C /volume . || echo "⚠️ Failed to export registry.k8s.io mirror"

        # Show cache size
        if command -v du &> /dev/null; then
          TOTAL_SIZE=$(du -sh /tmp/mirror-cache | cut -f1)
          echo "✅ Mirror cache size: $TOTAL_SIZE"
          ls -lh /tmp/mirror-cache/
        fi

    - name: 🐳 Save KWOK control plane images
      id: save-kwok-images
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "🐳 Saving KWOK control plane images for Docker pre-loading on test runners..."

        # KWOK images were pulled through registry.k8s.io-mirror as localhost:5003/...
        # Retag them to canonical registry.k8s.io/... so kwokctl's "docker inspect" finds them.
        # kwokctl's EnsureImage() checks "docker inspect <image>" first; if found, no pull occurs.
        while IFS= read -r image; do
          prefix_stripped="${image#registry.k8s.io/}"
          if [ "$prefix_stripped" != "$image" ]; then
            mirror_ref="localhost:5003/$prefix_stripped"
            docker tag "$mirror_ref" "$image" 2>/dev/null && echo "  ✅ Tagged: $image" || echo "  ⚠️ Failed to tag: $image"
          fi
        done < <(grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //')

        # Save all KWOK control plane images as a single tar for docker load on test runners.
        # Non-fatal: if any image wasn't tagged (e.g. mirror pull failed), skip saving rather than
        # aborting the whole cache step — kwokctl will pull missing images directly at test time.
        KWOK_IMAGES=$(grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | awk '{print $2}' | tr '\n' ' ')
        # shellcheck disable=SC2086
        if docker save $KWOK_IMAGES -o /tmp/mirror-cache/kwok-control-plane.tar 2>/dev/null; then
          SIZE=$(du -h /tmp/mirror-cache/kwok-control-plane.tar | cut -f1)
          echo "✅ KWOK control plane images saved: $SIZE"
        else
          echo "⚠️ Failed to save KWOK control plane images — they will be pulled by kwokctl at test time"
          rm -f /tmp/mirror-cache/kwok-control-plane.tar
        fi

    - name: 🔍 Verify all mirror volumes exported
      id: verify-exports
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        # Verify all 4 required mirror volumes were exported (see issue #2075)
        echo "🔍 Verifying exported mirror volumes..."
        REQUIRED_VOLUMES=("docker.io" "ghcr.io" "quay.io" "registry.k8s.io")
        MISSING_VOLUMES=()

        for vol in "${REQUIRED_VOLUMES[@]}"; do
          TAR_FILE="/tmp/mirror-cache/${vol}.tar"
          if [ -f "$TAR_FILE" ]; then
            SIZE=$(du -h "$TAR_FILE" | cut -f1)
            echo "  ✅ ${vol}.tar ($SIZE)"
          else
            echo "  ❌ ${vol}.tar - MISSING"
            MISSING_VOLUMES+=("$vol")
          fi
        done

        if [ ${#MISSING_VOLUMES[@]} -gt 0 ]; then
          echo "⚠️ Warning: ${#MISSING_VOLUMES[@]} mirror volumes failed to export: ${MISSING_VOLUMES[*]}"
          echo "   System tests will fall back to direct registry pulls for these registries."
          echo "   This may cause slower tests and potential rate limiting."
          echo "   See issue #2075 for context."
        else
          echo "✅ All 4 required mirror cache volumes exported successfully"
        fi

        # Verify KWOK control plane tar (non-fatal: kwokctl falls back to live pull if missing)
        if [ -f "/tmp/mirror-cache/kwok-control-plane.tar" ]; then
          SIZE=$(du -h "/tmp/mirror-cache/kwok-control-plane.tar" | cut -f1)
          echo "  ✅ kwok-control-plane.tar ($SIZE)"
        else
          echo "  ⚠️ kwok-control-plane.tar - MISSING (KWOK tests will pull from registry.k8s.io)"
        fi

    - name: 🧹 Cleanup containers
      if: always() && steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        docker rm -f docker.io-mirror ghcr.io-mirror quay.io-mirror registry.k8s.io-mirror 2>/dev/null || true
        docker network rm ksail-mirrors 2>/dev/null || true

    - name: 💾 Save mirror cache
      if: steps.check-cache.outputs.complete != 'true'
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/mirror-cache
        key: ${{ steps.generate-key.outputs.cache-key }}

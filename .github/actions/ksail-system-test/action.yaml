name: KSail System Test
description: |
  Orchestrates a full end-to-end system test of KSail by delegating to
  focused sub-actions.  The test flow is:

    Phase 1 — Setup (provider validation, artifact tag, GHCR resolution)
    Phase 2 — Offline tests (gen/smoke, tenant — no cluster needed)
    Phase 3 — Cluster provisioning (init + create, info, list)
    Phase 4 — Online tests (workload CRUD, image export/import, online gen, backup/restore, update)
    Phase 5 — Debug (on failure)
    Phase 6 — Lifecycle tests (stop, start, switch)
    Phase 7 — Cleanup (cluster delete, always)

  Cloud provider credentials are read from environment variables, not action
  inputs. Set these in the calling job before invoking this action:
  - Hetzner provider: HCLOUD_TOKEN
  - Omni provider: OMNI_SERVICE_ACCOUNT_KEY and OMNI_ENDPOINT

inputs:
  distribution:
    description: Kubernetes distribution (Vanilla, K3s, Talos, VCluster, KWOK)
    required: true
  provider:
    description: Infrastructure provider (Docker, Hetzner, Omni)
    required: false
    default: "Docker"
  args:
    description: Additional arguments for cluster init/create
    required: false
    default: ""
  init:
    description: Whether to run ksail cluster init before create
    required: false
    default: "false"
  test-workload-image:
    description: Image to use for workload create test
    required: false
    default: "traefik/whoami:v1.10"
  test-workload-name:
    description: Name for the test workload deployment
    required: false
    default: "whoami"
  apply-overlay-path:
    description: Path to kustomize overlay for workload apply test
    required: false
    default: ""
  gitops-path:
    description: Path for GitOps push (only if --gitops-engine in args)
    required: false
    default: "k8s"
  workload-timeout:
    description: |
      Timeout for workload wait operations. Set to 10 minutes to handle
      intermittent delays in CI environments (image pulls, resource contention).
    required: false
    default: "600s"
  ghcr-user:
    description: GitHub Container Registry username (for external registry auth)
    required: false
    default: ""
  ghcr-token:
    description: GitHub Container Registry token (for external registry auth)
    required: false
    default: ""

runs:
  using: composite
  steps:
    # ── Phase 1 — Setup ──────────────────────────────────────────────

    - name: ✅ Validate Hetzner inputs
      if: inputs.provider == 'Hetzner'
      shell: bash
      run: |
        if [ -z "$HCLOUD_TOKEN" ]; then
          echo "❌ ERROR: HCLOUD_TOKEN env var is required when provider is Hetzner" >&2
          exit 1
        fi

    - name: ✅ Validate Omni inputs
      if: inputs.provider == 'Omni'
      shell: bash
      run: |
        if [ -z "$OMNI_SERVICE_ACCOUNT_KEY" ]; then
          echo "❌ ERROR: OMNI_SERVICE_ACCOUNT_KEY env var is required when provider is Omni" >&2
          exit 1
        fi
        if [ -z "$OMNI_ENDPOINT" ]; then
          echo "❌ ERROR: OMNI_ENDPOINT env var is required when provider is Omni" >&2
          exit 1
        fi

    - name: 🔧 Generate unique artifact tag
      id: generate-tag
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        INIT: ${{ inputs.init }}
        ARGS: ${{ inputs.args }}
      run: |
        # Generate unique tag: distribution-provider-init-sanitized_args-shortsha
        DIST_LOWER=$(echo "$DISTRIBUTION" | tr '[:upper:]' '[:lower:]')
        PROVIDER_LOWER=$(echo "$PROVIDER" | tr '[:upper:]' '[:lower:]')
        INIT_SUFFIX=$([ "$INIT" = "true" ] && echo "init" || echo "no-init")
        # Sanitize args: extract key values, remove special chars, lowercase
        ARGS_SANITIZED=$(echo "$ARGS" | sed 's/--[a-z-]*=\?//g' | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-30)
        SHORT_SHA="${GITHUB_SHA:0:7}"
        if [[ -n "$ARGS_SANITIZED" ]]; then
          TAG="${DIST_LOWER}-${PROVIDER_LOWER}-${INIT_SUFFIX}-${ARGS_SANITIZED}-${SHORT_SHA}"
        else
          TAG="${DIST_LOWER}-${PROVIDER_LOWER}-${INIT_SUFFIX}-${SHORT_SHA}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Generated unique artifact tag: $TAG"

    - name: 🔧 Resolve GHCR credentials in args
      id: resolve-args
      shell: bash
      env:
        ARGS: ${{ inputs.args }}
        GHCR_USER: ${{ inputs.ghcr-user }}
        GHCR_TOKEN: ${{ inputs.ghcr-token }}
        ARTIFACT_TAG: ${{ steps.generate-tag.outputs.tag }}
      run: |
        # Inject GHCR credentials into --local-registry if it contains ghcr.io
        RESOLVED_ARGS="$ARGS"
        if [[ "$ARGS" == *"--local-registry"* ]] && [[ "$ARGS" == *"ghcr.io"* ]] && [[ -n "$GHCR_USER" ]] && [[ -n "$GHCR_TOKEN" ]]; then
          # Replace 'ghcr.io/' with 'user:token@ghcr.io/'
          RESOLVED_ARGS="${ARGS//ghcr.io\//${GHCR_USER}:${GHCR_TOKEN}@ghcr.io/}"
          # Append unique tag only to the --local-registry value (not the entire args string)
          # This is safe regardless of flag ordering
          RESOLVED_ARGS=$(echo "$RESOLVED_ARGS" | sed -E 's/(--local-registry[[:space:]]+)([^[:space:]]+)/\1\2:'"${ARTIFACT_TAG}"'/')
        fi
        echo "args=$RESOLVED_ARGS" >> "$GITHUB_OUTPUT"

    - name: 📁 Initialize test log directory
      shell: bash
      env:
        TAG: ${{ steps.generate-tag.outputs.tag }}
      run: |
        mkdir -p /tmp/ksail-system-test-logs
        echo "System test started at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/ksail-system-test-logs/test-timeline.log
        echo "Tag: $TAG" >> /tmp/ksail-system-test-logs/test-timeline.log

    # ── Phase 2 — Offline tests ──────────────────────────────────────

    - name: 🧪 Gen & Smoke Tests
      uses: ./.github/actions/ksail-test-gen-smoke

    - name: 🧪 Tenant Tests
      uses: ./.github/actions/ksail-tenant-test

    # ── Phase 3 — Cluster provisioning ───────────────────────────────

    - name: 🧪 ksail cluster create
      id: cluster-create
      uses: ./.github/actions/ksail-cluster
      with:
        distribution: ${{ inputs.distribution }}
        provider: ${{ inputs.provider }}
        args: ${{ steps.resolve-args.outputs.args }}
        init: ${{ inputs.init }}
        install: "false"
        cache: "true"
        validate: ${{ inputs.init }}

    - name: 🧪 ksail cluster info
      shell: bash
      run: |
        LOG_FILE="/tmp/ksail-system-test-logs/cluster-info.log"
        # Tee directly so output streams in real-time and lands in the artifact.
        # PIPESTATUS[0] captures ksail's own exit code through the pipeline.
        _info_tmp=$(mktemp)
        ksail cluster info 2>&1 | tee "$_info_tmp" | tee "$LOG_FILE"
        status=${PIPESTATUS[0]}
        output=$(cat "$_info_tmp")
        rm -f "$_info_tmp"

        {
        if [ "$status" -ne 0 ]; then
          echo "❌ ksail cluster info failed with exit code $status"
          exit "$status"
        fi

        FAILED=0
        # Use a here-string instead of printf | grep to avoid a SIGPIPE race
        # under `set -o pipefail`: if grep exits early after a match, the
        # upstream writer receives SIGPIPE and the pipe's exit status propagates
        # as a failure even when the string was found.  Here-strings bypass the
        # pipe entirely and are not subject to that race.
        assert_contains() {
          if grep -Fq -- "$1" <<< "$output"; then
            echo "  ✅ Found: $1"
          else
            echo "  ❌ Missing: $1"
            FAILED=$((FAILED + 1))
          fi
        }

        echo "=== Validating cluster info output ==="

        # Provider status
        assert_contains "Provider:"
        assert_contains "Cluster:"
        assert_contains "Status:"
        assert_contains "Ready:"

        # kubectl cluster-info
        assert_contains "Kubernetes control plane is running at"

        # KSail cluster details
        assert_contains "KSail Cluster Details:"
        assert_contains "Distribution:"
        assert_contains "Kubeconfig:"

        if [ "$FAILED" -gt 0 ]; then
          echo "❌ $FAILED cluster info assertions failed"
          exit 1
        fi
        echo "✅ All cluster info assertions passed"
        } 2>&1 | tee -a "$LOG_FILE"

    - name: 🧪 ksail cluster connect --help
      shell: bash
      run: |
        ksail cluster connect --help 2>&1 | tee /tmp/ksail-system-test-logs/cluster-connect-help.log

    - name: 🧪 ksail cluster list
      shell: bash
      run: |
        ksail cluster list 2>&1 | tee /tmp/ksail-system-test-logs/cluster-list.log

    # ── Phase 4 — Online tests ───────────────────────────────────────

    - name: 🧪 Workload Lifecycle Tests
      id: workload-tests
      uses: ./.github/actions/ksail-test-workload
      with:
        test-workload-name: ${{ inputs.test-workload-name }}
        test-workload-image: ${{ inputs.test-workload-image }}
        workload-timeout: ${{ inputs.workload-timeout }}
        apply-overlay-path: ${{ inputs.apply-overlay-path }}
        args: ${{ steps.resolve-args.outputs.args }}
        ghcr-user: ${{ inputs.ghcr-user }}
        ghcr-token: ${{ inputs.ghcr-token }}
        gitops-path: ${{ inputs.gitops-path }}

    - name: 🧪 Image Export/Import Tests
      id: image-export-import-tests
      if: inputs.distribution == 'Vanilla' || inputs.distribution == 'K3s'
      uses: ./.github/actions/ksail-test-image-export-import
      with:
        test-workload-name: ${{ inputs.test-workload-name }}
        test-workload-image: ${{ inputs.test-workload-image }}
        workload-timeout: ${{ inputs.workload-timeout }}

    - name: 🧪 Workload Watch Tests
      id: workload-watch-tests
      uses: ./.github/actions/ksail-test-workload-watch
      with:
        workload-timeout: ${{ inputs.workload-timeout }}

    - name: 🧪 workload gen — API-dependent (clusterrole, role)
      id: online-gen
      shell: bash
      run: |
        LOG_FILE="/tmp/ksail-system-test-logs/workload-gen.log"
        {
        FAILED=0
        GEN_DIR=$(mktemp -d)

        echo "=== Testing API-dependent workload gen subcommands ==="

        run_gen_test() {
          local name="$1"
          shift
          local OUTPUT_FILE="$GEN_DIR/${name}.yaml"
          echo "--- gen $name ---"
          if "$@" > "$OUTPUT_FILE"; then
            echo "  ✅ gen $name succeeded"
            if ksail workload validate "$OUTPUT_FILE"; then
              echo "  ✅ validate $name succeeded"
            else
              echo "  ❌ validate $name FAILED"
              cat "$OUTPUT_FILE"
              FAILED=$((FAILED + 1))
            fi
          else
            echo "  ❌ gen $name FAILED"
            cat "$OUTPUT_FILE" 2>/dev/null || true
            FAILED=$((FAILED + 1))
          fi
        }

        run_gen_test clusterrole ksail workload gen clusterrole test-cr --resource=pods --verb=get
        run_gen_test role ksail workload gen role test-role --resource=pods --verb=get

        rm -rf "$GEN_DIR"

        if [ "$FAILED" -gt 0 ]; then
          echo "❌ $FAILED API-dependent gen/validate tests failed"
          exit 1
        fi
        echo "✅ All API-dependent workload gen tests passed"
        } 2>&1 | tee "$LOG_FILE"

    - name: 🧪 Backup & Restore Tests
      id: backup-restore-tests
      uses: ./.github/actions/ksail-test-backup-restore
      with:
        workload-timeout: ${{ inputs.workload-timeout }}

    - name: 🧪 ksail cluster update --dry-run
      id: cluster-update-dry-run
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        set -o pipefail
        # Strip init-only flags that cluster update does not accept
        UPDATE_ARGS=$(echo "$ARGS" | sed 's/--image-verification [^ ]*//')
        # shellcheck disable=SC2086
        ksail cluster update --dry-run --distribution "$DISTRIBUTION" --provider "$PROVIDER" $UPDATE_ARGS 2>&1 | tee /tmp/ksail-system-test-logs/cluster-update-dry-run.log
        # Fail early if the dry run detects unexpected changes.
        # The cluster was just created with the same config, so zero changes are expected.
        if ! grep -qE "No changes detected|Would apply 0 in-place, 0 reboot-required, 0 recreate-required" /tmp/ksail-system-test-logs/cluster-update-dry-run.log; then
          echo "❌ ERROR: Unexpected changes detected in dry run after cluster creation"
          echo "This indicates a regression — the cluster was just created with the same configuration."
          exit 1
        fi
        echo "✅ No unexpected changes detected (dry run)"

    - name: 🧪 ksail cluster update
      id: cluster-update
      shell: bash
      env:
        DISTRIBUTION: ${{ inputs.distribution }}
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        set -o pipefail
        # Strip init-only flags that cluster update does not accept
        UPDATE_ARGS=$(echo "$ARGS" | sed 's/--image-verification [^ ]*//')
        # shellcheck disable=SC2086
        ksail cluster update --force --distribution "$DISTRIBUTION" --provider "$PROVIDER" $UPDATE_ARGS 2>&1 | tee /tmp/ksail-system-test-logs/cluster-update.log
        # Fail early if the update detects unexpected changes.
        # The cluster was just created with the same config, so zero changes are expected.
        if ! grep -q "No changes detected" /tmp/ksail-system-test-logs/cluster-update.log; then
          echo "❌ ERROR: Unexpected changes detected during update after cluster creation"
          echo "This indicates a regression — the cluster was just created with the same configuration."
          exit 1
        fi
        echo "✅ No unexpected changes detected"

    # ── Phase 5 — Debug ──────────────────────────────────────────────

    - name: 🐞 Debug Kubernetes failure
      if: failure() && (steps.cluster-create.outcome == 'failure' || steps.image-export-import-tests.outcome == 'failure' || steps.workload-watch-tests.outcome == 'failure' || steps.online-gen.outcome == 'failure' || steps.cluster-update-dry-run.outcome == 'failure' || steps.cluster-update.outcome == 'failure')
      uses: ./.github/actions/debug-kubernetes-failure
      with:
        kubectl-command: "ksail workload"

    # ── Phase 6 — Lifecycle tests ────────────────────────────────────

    - name: 🧪 ksail cluster stop
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        {
        CLUSTER_NAME=$(echo "$ARGS" | grep -oP '(?<=--name\s)\S+' || true)
        if [ -n "$CLUSTER_NAME" ]; then
          ksail cluster stop --provider "$PROVIDER" --name "$CLUSTER_NAME"
        else
          ksail cluster stop
        fi
        } 2>&1 | tee /tmp/ksail-system-test-logs/cluster-stop.log

    - name: 🧪 ksail cluster start
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        {
        CLUSTER_NAME=$(echo "$ARGS" | grep -oP '(?<=--name\s)\S+' || true)
        start_succeeded=false
        for attempt in 1 2 3; do
          if [ -n "$CLUSTER_NAME" ]; then
            if timeout 600 ksail cluster start --provider "$PROVIDER" --name "$CLUSTER_NAME"; then
              start_succeeded=true
              break
            fi
          else
            if timeout 600 ksail cluster start; then
              start_succeeded=true
              break
            fi
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "⚠️ cluster start attempt $attempt failed, retrying in 10s…"
            sleep 10
          fi
        done
        if [ "$start_succeeded" != "true" ]; then
          echo "❌ cluster start failed after 3 attempts"
          exit 1
        fi
        } 2>&1 | tee /tmp/ksail-system-test-logs/cluster-start.log

    - name: 🧪 ksail cluster switch
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        {
        # Prefer the explicit --name from ARGS (avoids picking up stale
        # clusters from other concurrent test runs, especially on Omni).
        CLUSTER_NAME=$(echo "$ARGS" | grep -oP '(?<=--name\s)\S+' || true)
        if [ -z "$CLUSTER_NAME" ]; then
          # Fall back to discovering from ksail cluster list
          PROVIDER_NAME=$(printf '%s' "$PROVIDER" | tr '[:upper:]' '[:lower:]')
          CLUSTER_NAME=$(
            ksail cluster list 2>/dev/null \
              | awk -v prov="$PROVIDER_NAME" 'NR>1 && $1==prov {print $3; exit}' \
              || true
          )
        fi
        if [ -n "$CLUSTER_NAME" ]; then
          ksail cluster switch "$CLUSTER_NAME"
        else
          echo "⚠️ Could not determine cluster name for switch test, skipping"
        fi
        } 2>&1 | tee /tmp/ksail-system-test-logs/cluster-switch.log

    # ── Phase 7 — Cleanup ────────────────────────────────────────────

    - name: 🧪 ksail cluster delete
      if: always()
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
        ARGS: ${{ steps.resolve-args.outputs.args }}
      run: |
        {
        # Extract --name value from args for reliable cleanup even when no kubeconfig exists
        CLUSTER_NAME=$(echo "$ARGS" | grep -oP '(?<=--name\s)\S+' || true)
        if [ -n "$CLUSTER_NAME" ]; then
          ksail cluster delete --provider "$PROVIDER" --name "$CLUSTER_NAME" --force \
            || echo "⚠️ ksail cluster delete failed (cluster may not have been created)"
        else
          ksail cluster delete \
            || echo "⚠️ ksail cluster delete failed (cluster may not have been created)"
        fi
        } 2>&1 | tee /tmp/ksail-system-test-logs/cluster-delete.log

    - name: 📝 Finalize test timeline
      if: always()
      shell: bash
      run: |
        echo "System test completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/ksail-system-test-logs/test-timeline.log

    - name: 📤 Upload system test logs
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: system-test-logs-${{ steps.generate-tag.outputs.tag }}
        path: /tmp/ksail-system-test-logs/
        retention-days: 7
        if-no-files-found: ignore

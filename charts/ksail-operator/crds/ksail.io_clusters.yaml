---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: clusters.ksail.io
spec:
  group: ksail.io
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    shortNames:
    - ksail
    singular: cluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cluster.distribution
      name: Distribution
      type: string
    - jsonPath: .spec.cluster.provider
      name: Provider
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Cluster represents a KSail cluster configuration including API metadata and desired state.
          It contains TypeMeta for API versioning information, ObjectMeta for the cluster name and
          standard Kubernetes object metadata, Spec for the desired state, and Status for the
          observed state when reconciled by the KSail operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of a KSail cluster.
            properties:
              chat:
                description: |-
                  Chat configures the KSail AI chat assistant.
                  CLI-only; ignored by the operator (the Cluster CRD shares this type but never reads it).
                properties:
                  model:
                    type: string
                  reasoningEffort:
                    description: |-
                      ReasoningEffort specifies the reasoning effort level for chat responses.
                      Valid values: "low", "medium", "high"
                    type: string
                type: object
              cluster:
                description: |-
                  Cluster configures the Kubernetes cluster KSail manages: distribution,
                  provider, components, and connection settings.
                properties:
                  autoscaler:
                    description: |-
                      Autoscaler defines pod and node autoscaling configuration.
                      Supersedes spec.cluster.nodeAutoscaling (deprecated; aliased on load).
                    properties:
                      node:
                        description: Node configures node-level autoscaling via the
                          Cluster Autoscaler.
                        properties:
                          capacityBuffers:
                            description: |-
                              CapacityBuffers enables the Cluster Autoscaler capacity-buffers feature:
                              KSail installs the CapacityBuffer CRD and turns on the buffer controller
                              and pod-injection flags, so CapacityBuffer resources reserve scale-up
                              headroom as virtual (pod-less) chunks — a native replacement for
                              low-priority balloon-pod overprovisioning.
                            type: boolean
                          enabled:
                            description: |-
                              Enabled controls whether the Cluster Autoscaler is installed to manage
                              worker node counts dynamically (Enabled or Disabled). A YAML boolean is
                              still accepted on load (true -> Enabled, false -> Disabled).
                            type: string
                          expander:
                            description: |-
                              Expander selects the Cluster Autoscaler expander strategy. It accepts a
                              single value (e.g. LeastWaste) or an ordered priority list
                              (e.g. [LeastNodes, LeastWaste]) applied as a chain.
                            items:
                              description: AutoscalerExpander defines the node expander
                                strategy for the cluster autoscaler.
                              type: string
                            type: array
                          ignoreDaemonsetsUtilization:
                            description: |-
                              IgnoreDaemonsetsUtilization excludes DaemonSet pods from a node's
                              resource-utilization calculation when the autoscaler decides whether a node
                              is unneeded (upstream --ignore-daemonsets-utilization, off by default). Set
                              this when every DaemonSet is a system component whose per-node overhead
                              should not, on its own, keep an otherwise-empty node above the scale-down
                              threshold — otherwise heavy node agents (CNI, storage, observability) can
                              pin every autoscaler node as "utilized" and prevent scale-down entirely.
                            type: boolean
                          maxNodesTotal:
                            description: |-
                              MaxNodesTotal caps the total number of nodes in the cluster
                              (control-planes + workers + autoscaler nodes). 0 disables the global cap.
                            format: int32
                            type: integer
                          pools:
                            description: Pools defines the node pools the Cluster
                              Autoscaler may scale (Hetzner only).
                            items:
                              description: NodePool defines a Hetzner node pool managed
                                by the cluster autoscaler.
                              properties:
                                labels:
                                  additionalProperties:
                                    type: string
                                  description: |-
                                    Labels are Kubernetes node labels applied to every node provisioned in this
                                    pool. They are baked into the pool's Talos worker config (machine.nodeLabels)
                                    so they land on the real Node object, and are also attributed to the pool's
                                    scale-from-zero template so the autoscaler scales the pool for pods that
                                    select these labels. Keys must be valid Kubernetes label keys.
                                  type: object
                                location:
                                  description: Location is the Hetzner datacenter
                                    location for this pool (e.g. "fsn1", "nbg1").
                                  type: string
                                max:
                                  description: Max is the maximum number of nodes
                                    in this pool.
                                  format: int32
                                  type: integer
                                min:
                                  description: Min is the minimum number of nodes
                                    in this pool.
                                  format: int32
                                  type: integer
                                name:
                                  description: Name is the unique identifier for this
                                    node pool (DNS-1123 label).
                                  type: string
                                serverType:
                                  description: ServerType is the Hetzner server type
                                    for nodes in this pool (e.g. "cx23", "cax11").
                                  type: string
                                taints:
                                  description: |-
                                    Taints are Kubernetes node taints applied to every node provisioned in this
                                    pool. They are baked into the pool's Talos worker config (machine.nodeTaints)
                                    so they land on the real Node object, and are also attributed to the pool's
                                    scale-from-zero template so the autoscaler only scales the pool for pods that
                                    tolerate the taints.
                                  items:
                                    description: |-
                                      NodePoolTaint defines a Kubernetes node taint applied to every node in an
                                      autoscaler node pool.
                                    properties:
                                      effect:
                                        description: 'Effect is the scheduling effect:
                                          NoSchedule, PreferNoSchedule, or NoExecute.'
                                        type: string
                                      key:
                                        description: |-
                                          Key is the taint key. Must be a valid Kubernetes label key (an optional
                                          DNS-subdomain prefix followed by a name segment).
                                        type: string
                                      value:
                                        description: Value is the optional taint value.
                                        type: string
                                    type: object
                                  type: array
                              type: object
                            type: array
                          scaleDownUnneededTime:
                            description: |-
                              ScaleDownUnneededTime is how long a node must be unneeded before it is
                              eligible for scale down (e.g. "10m").
                            type: string
                          scaleDownUtilizationThreshold:
                            description: |-
                              ScaleDownUtilizationThreshold is the node resource-utilization ratio
                              (0.0–1.0, computed over requests) at or below which the Cluster Autoscaler
                              considers a node for scale down (upstream --scale-down-utilization-threshold,
                              default 0.5). Passed verbatim as a string; leave empty to inherit the upstream
                              default. For agent-heavy clusters prefer ignoreDaemonsetsUtilization, which
                              excludes DaemonSet requests from this calculation entirely.
                            type: string
                          skipNodesWithLocalStorage:
                            description: |-
                              SkipNodesWithLocalStorage controls whether the Cluster Autoscaler refuses to
                              scale down a node that runs a pod with local storage (emptyDir, hostPath, or
                              a local PersistentVolume). Upstream defaults to true (never remove such
                              nodes). Set false to allow scale-down of nodes whose only local storage is
                              ephemeral scratch — required for overflow nodes to ever drain, since
                              emptyDir is pervasive. A pointer so an explicit false is preserved and only
                              an unset value inherits the upstream default. Ignored unless the node
                              autoscaler is installed (Talos on Hetzner with enabled: true).
                            type: boolean
                          skipNodesWithSystemPods:
                            description: |-
                              SkipNodesWithSystemPods controls whether the Cluster Autoscaler refuses to
                              scale down a node that runs a non-DaemonSet kube-system pod without a
                              controlling PodDisruptionBudget. Upstream defaults to true. Set false to let
                              overflow nodes hosting movable system Deployments (metrics-server, CSI
                              controllers, relays) drain — verify those components tolerate eviction and
                              carry PDBs. A pointer so an explicit false is preserved and only an unset
                              value inherits the upstream default. Ignored unless the node autoscaler is
                              installed (Talos on Hetzner with enabled: true).
                            type: boolean
                        type: object
                      pod:
                        description: Pod configures pod-level autoscaling (horizontal
                          and vertical).
                        properties:
                          horizontal:
                            description: Horizontal controls Horizontal Pod Autoscaler
                              (HPA) support.
                            type: string
                          vertical:
                            description: Vertical controls Vertical Pod Autoscaler
                              (VPA) support.
                            type: string
                        type: object
                    type: object
                  cdi:
                    description: |-
                      CDI controls Container Device Interface support in the container runtime
                      (Default, Enabled, or Disabled).
                    type: string
                  certManager:
                    description: CertManager controls whether cert-manager is installed
                      (Enabled or Disabled).
                    type: string
                  cni:
                    description: |-
                      CNI selects the Container Network Interface plugin. Default keeps the
                      distribution's built-in CNI; Cilium or Calico install that CNI instead.
                    type: string
                  connection:
                    description: |-
                      Connection defines how KSail connects to the cluster: the kubeconfig path,
                      context name, and operation timeout.
                      CLI-only (local kubeconfig path/context); ignored by the operator.
                    properties:
                      context:
                        description: |-
                          Context is the kubeconfig context for the cluster. When empty, KSail derives
                          it from the distribution and cluster name (e.g. "kind-kind").
                        type: string
                      kubeconfig:
                        description: |-
                          Kubeconfig is the path to the kubeconfig file KSail reads and writes.
                          Defaults to "~/.kube/config".
                        type: string
                      timeout:
                        description: |-
                          Timeout is the maximum time KSail waits for cluster operations to complete
                          (e.g. "5m").
                        type: string
                    type: object
                  controlPlanes:
                    description: |-
                      ControlPlanes is the number of control-plane nodes (default: 1).
                      Provider/distribution-agnostic: applies to Vanilla (Kind), K3s (K3d), Talos, and VCluster.
                      Supersedes spec.cluster.talos.controlPlanes (deprecated; aliased on load).
                    format: int32
                    type: integer
                  csi:
                    description: |-
                      CSI controls Container Storage Interface support. Default keeps the
                      distribution's behavior; Enabled installs a CSI driver
                      (local-path-provisioner, or Hetzner CSI on Hetzner); Disabled installs none.
                    type: string
                  distribution:
                    description: |-
                      Distribution selects the Kubernetes distribution to provision: Vanilla (Kind),
                      K3s (K3d), Talos, VCluster, KWOK (simulated), EKS (AWS), GKE (Google Cloud),
                      or AKS (Azure).
                    type: string
                  distributionConfig:
                    description: |-
                      DistributionConfig is the path to the distribution's own configuration file
                      (e.g. kind.yaml, k3d.yaml, vcluster.yaml, kwok.yaml, eks.yaml, gke.yaml, aks.yaml, or the talos directory).
                      When empty, KSail uses the distribution's default configuration path.
                      CLI-only (a local file path on the CLI host); ignored by the operator.
                    type: string
                  gitOpsEngine:
                    description: 'GitOpsEngine selects the GitOps engine KSail bootstraps:
                      None, Flux, or ArgoCD.'
                    type: string
                  imageVerification:
                    description: |-
                      ImageVerification controls container-image signature verification scaffolding
                      for every supported distribution (not just Talos):
                        - Talos: scaffolds a native ImageVerificationConfig document (Talos 1.13+).
                        - Vanilla (Kind): injects a containerd image-verifier plugin patch.
                        - K3s (K3d): scaffolds a containerd config template with the image-verifier
                          plugin and mounts it into the node containers.
                      Enabled requires verifier binaries (and typically policy) to be present in the
                      node image bin_dir. Disabled (default) skips it.
                      Supersedes spec.cluster.talos.imageVerification (deprecated; aliased on load).
                    type: string
                  importImages:
                    type: string
                  kubernetesVersion:
                    description: |-
                      KubernetesVersion pins the Kubernetes version to deploy. Accepts values with
                      or without the "v" prefix (e.g., "v1.32.0" or "1.32.0"). Honored by the Talos
                      distribution (Docker/Hetzner); for Kind, K3d, and EKS the version is set in the
                      distribution config (kind.yaml/k3d.yaml/eks.yaml) instead.

                      When set, KSail reconciles toward this version: `cluster create` provisions at
                      it and `cluster update` upgrades the cluster toward it (skipping downgrades).
                      For brand-new Talos clusters an unset value uses a built-in default capped to a
                      version compatible with the pinned Talos release (spec.cluster.talos.version),
                      so a pinned older Talos version is never paired with a Kubernetes version it
                      cannot run.

                      When unset, `cluster update` follows the latest stable Kubernetes version
                      available in the OCI registry (an in-place rolling upgrade for Talos; a
                      confirmation-gated recreation for Kind/K3d). Override per invocation with the
                      --kubernetes-version flag (precedence: flag > env > config > default).
                    type: string
                  loadBalancer:
                    description: |-
                      LoadBalancer controls load-balancer support. Default keeps the
                      distribution and provider behavior; Enabled or Disabled override it.
                    type: string
                  localRegistry:
                    description: |-
                      LocalRegistry configures the host-local OCI registry (or an external
                      registry for cloud providers) used by GitOps workflows.
                    properties:
                      registry:
                        description: |-
                          Registry is the full registry specification in the format: [user:pass@]host[:port][/path]
                          When populated, enables registry integration for GitOps workflows.
                          Examples:
                            - "localhost:5050" (local Docker registry)
                            - "ghcr.io/myorg/myrepo" (GitHub Container Registry with path)
                            - "${USER}:${PASS}@ghcr.io:443/myorg" (with credentials from env vars)
                          Credentials support ${ENV_VAR} placeholders for environment variable expansion.
                        type: string
                    type: object
                  metricsServer:
                    description: |-
                      MetricsServer controls metrics-server installation. Default keeps the
                      distribution's behavior; Enabled or Disabled override it.
                    type: string
                  nodeAutoscaling:
                    description: |-
                      NodeAutoscaling is a deprecated alias for spec.cluster.autoscaler.node.enabled
                      and is migrated on load. Do not set both nodeAutoscaling and autoscaler.
                    type: string
                  oidc:
                    description: |-
                      OIDC defines OIDC authentication configuration.
                      When issuerURL is set, KSail configures the API server with OIDC flags
                      and sets up kubeconfig with exec-based OIDC credentials.
                    properties:
                      caFile:
                        description: CAFile is the path to the OIDC provider's CA
                          certificate for self-signed TLS.
                        type: string
                      clientID:
                        description: ClientID is the OIDC client ID for kubectl authentication.
                        type: string
                      extraScopes:
                        description: ExtraScopes are additional OIDC scopes to request
                          beyond the default 'openid' scope.
                        items:
                          type: string
                        type: array
                      groupsClaim:
                        description: GroupsClaim is the JWT claim to use for Kubernetes
                          group membership.
                        type: string
                      groupsPrefix:
                        description: GroupsPrefix is prepended to group names from
                          the OIDC provider.
                        type: string
                      issuerURL:
                        description: |-
                          IssuerURL is the OIDC provider's issuer URL (e.g., https://dex.example.com).
                          Setting this field enables OIDC authentication for the cluster.
                        type: string
                      usernameClaim:
                        description: UsernameClaim is the JWT claim to use as the
                          Kubernetes username.
                        type: string
                      usernamePrefix:
                        description: UsernamePrefix is prepended to usernames from
                          the OIDC provider.
                        type: string
                    type: object
                  policyEngine:
                    description: 'PolicyEngine selects the policy engine to install:
                      None, Kyverno, or Gatekeeper.'
                    type: string
                  provider:
                    description: |-
                      Provider selects the infrastructure that runs the cluster nodes: Docker,
                      Hetzner, Omni, AWS, GCP, Azure, or Kubernetes (nested clusters inside an
                      existing cluster). Each distribution supports a subset of providers; when
                      empty, KSail uses the distribution's default provider.
                    type: string
                  sops:
                    description: |-
                      SOPS configures automatic creation of the SOPS Age secret used to decrypt
                      encrypted manifests in the cluster.
                    properties:
                      ageKeyEnvVar:
                        description: |-
                          Deprecated: Use Env.Var instead. AgeKeyEnvVar is the name of the environment
                          variable containing the Age private key. Kept for backward compatibility.
                          When Env.Var is set, it takes priority over AgeKeyEnvVar.
                        type: string
                      enabled:
                        description: |-
                          Enabled controls whether the SOPS Age secret is created (tri-state toggle):
                            - Default ("" / unset) = auto-detect (create if a key is found via env var or key file).
                            - Enabled = require key (error if not found).
                            - Disabled = disable entirely (skip secret creation).
                          A YAML boolean is still accepted on load (true -> Enabled, false -> Disabled).
                        type: string
                      env:
                        description: Env configures the environment variable source
                          for the Age private key.
                        properties:
                          var:
                            description: |-
                              Var is the name of the environment variable containing the Age private key.
                              When set, takes priority over SOPS.AgeKeyEnvVar.
                              Leave empty to fall back to AgeKeyEnvVar (default: "SOPS_AGE_KEY").
                            type: string
                        type: object
                      extract:
                        description: Extract configures extraction of Age private
                          keys from a key file.
                        properties:
                          file:
                            description: |-
                              File is the path to the Age key file (absolute or relative to the working directory).
                              Defaults to the OS-specific SOPS age key path when empty.
                            type: string
                          publicKeys:
                            description: |-
                              PublicKeys is a list of Age public keys (age1...) used to select which
                              private keys to include in the SOPS secret. For each private key in the
                              key file, its public key is derived and compared against this list.
                              Only matching private keys are included.
                              When empty (default), all private keys from the file are included.
                            items:
                              type: string
                            type: array
                        type: object
                    type: object
                  talos:
                    description: Talos holds options specific to the Talos distribution.
                    properties:
                      config:
                        description: |-
                          Config is the path to the talosconfig file.
                          Defaults to "~/.talos/config".
                        type: string
                      controlPlanes:
                        description: |-
                          ControlPlanes is the number of control-plane nodes (default: 1).

                          Deprecated: use spec.cluster.controlPlanes. This field is kept as a
                          migration alias and emits a warning on load. Removal planned in a
                          future minor release.
                        format: int32
                        type: integer
                      drainTimeout:
                        description: |-
                          DrainTimeout is the per-node pod-eviction budget for rolling node drains during
                          `cluster update` (rolling reboot and Hetzner server-type rolling-recreate). When
                          unset, KSail uses 10m. Increase it for clusters whose stateful workloads need
                          longer to evict gracefully — e.g. Longhorn volume rebuilds or database failovers
                          gated by PodDisruptionBudgets. A drain that exceeds this budget aborts the update;
                          re-run with --force-drain to delete pods bypassing PodDisruptionBudgets instead.
                          Override per invocation with --drain-timeout. Example: "15m".
                        type: string
                      extensions:
                        description: |-
                          Extensions lists Talos Image Factory official system extension names to include in the
                          node image. KSail automatically computes the Image Factory schematic ID from this list
                          and sets machine.install.image to factory.talos.dev/installer/{schematicID}:{version},
                          where {version} is derived from the Talos config bundle's existing install image tag.
                          For Hetzner, the schematic is also used for snapshot building.
                          Extension names follow the Image Factory convention (e.g., "siderolabs/iscsi-tools").
                          The Image Factory resolves extension versions automatically per Talos release.
                          When SchematicID is also set, it takes precedence over Extensions.
                        items:
                          type: string
                        type: array
                      extraPortMappings:
                        description: |-
                          ExtraPortMappings defines additional port mappings from Docker containers to the host.
                          Only used with the Docker provider. Useful on macOS where MetalLB virtual IPs
                          are not accessible from the host because Docker runs in a Linux VM.
                          Ports are exposed on the first control-plane node (when multiple control-planes are configured).
                        items:
                          description: PortMapping defines a mapping between a container
                            port and a host port.
                          properties:
                            containerPort:
                              description: ContainerPort is the port inside the container.
                              format: int32
                              type: integer
                            hostPort:
                              description: HostPort is the port on the host. If 0,
                                Docker assigns a random port.
                              format: int32
                              type: integer
                            protocol:
                              description: Protocol is the network protocol (TCP or
                                UDP). Defaults to TCP.
                              type: string
                          type: object
                        type: array
                      imageVerification:
                        description: |-
                          ImageVerification enables scaffolding of a Talos ImageVerificationConfig document
                          during project init. When Enabled, generates an image-verification.yaml template
                          in the Talos patches directory with commented-out examples for keyless (Cosign/OIDC)
                          and public key verification rules. Requires Talos 1.13+.

                          Deprecated: use spec.cluster.imageVerification. This field is kept as a
                          migration alias and emits a warning on load (the value is copied into the
                          cluster-level field). Removal planned in a future minor release.
                        type: string
                      iso:
                        description: |-
                          ISO is the cloud provider's ISO/image ID for booting Talos Linux.
                          Only used when targeting cloud providers (e.g., Hetzner Cloud).
                          For Hetzner: See https://docs.hetzner.cloud/changelog for available Talos ISOs.
                          Defaults to 125127 (Talos Linux 1.12.4 x86). The prior default 122630
                          (Talos 1.11.2) was removed from Hetzner on 2026-03-18. For ARM, look up the
                          matching Talos ISO ID in the Hetzner Cloud Console (Images → ISOs).
                          When SchematicID is set, ISO is ignored in favour of a pre-built snapshot.
                        format: int64
                        type: integer
                      schematicId:
                        description: |-
                          SchematicID is the Talos factory schematic ID used to build a Hetzner snapshot image.
                          When set, KSail uploads a Talos OS disk snapshot using this schematic ID and Version
                          instead of booting from the cloud ISO specified in ISO.
                          Obtain a schematic ID from https://factory.talos.dev.
                          Only used when targeting cloud providers (e.g., Hetzner Cloud).
                        type: string
                      storageHealthTimeout:
                        description: |-
                          StorageHealthTimeout opts into a between-node storage-health gate during the
                          `cluster update` rolling reboot. When set to a positive duration, the roll waits
                          — up to this timeout — for the cluster's storage to return to a stable state
                          before draining the next node: generically, no PersistentVolume in phase Failed,
                          no PersistentVolumeClaim in phase Lost, and no VolumeAttachment with an
                          attach/detach error; plus, when a replicated node-local storage backend is
                          detected (Longhorn), no degraded or faulted replicated volume. This prevents
                          progressively faulting volumes whose replicas are spread one-per-node: without
                          the gate the roll advances as soon as a node reports Kubernetes Ready, so
                          rebooting consecutive replica holders before a rebuild completes can take every
                          replica of a volume down at once. Default off (unset / 0): behaviour is
                          unchanged. The gate only helps when replicas have spare capacity to rebuild
                          during the roll; on a fully drained pool with hard anti-affinity it times out
                          (naming the stuck volumes) rather than hanging. Example: "10m".
                        type: string
                        x-kubernetes-validations:
                        - rule: self.matches('^[0-9]+(ns|us|µs|ms|s|m|h)$')
                      version:
                        description: |-
                          Version pins the Talos OS (distribution) version used for cluster creation and
                          upgrades. When set, KSail uses this version as the Docker container image tag
                          and `cluster update` reconciles the cluster toward it (skipping downgrades).
                          Accepts values with or without the "v" prefix (e.g., "v1.11.2" or "1.11.2").
                          When empty, `cluster create` uses KSail's built-in default version and
                          `cluster update` follows the latest stable version available in the OCI
                          registry. Override per invocation with the --distribution-version flag
                          (precedence: flag > env > config > default).
                        type: string
                      workers:
                        description: |-
                          Workers is the number of worker nodes (default: 0).
                          When 0, scheduling is allowed on control-plane nodes.

                          Deprecated: use spec.cluster.workers. This field is kept as a
                          migration alias and emits a warning on load. Removal planned in a
                          future minor release.
                        format: int32
                        type: integer
                    type: object
                  vanilla:
                    description: Vanilla holds options specific to the Vanilla (Kind)
                      distribution.
                    properties:
                      mirrorsDir:
                        description: |-
                          MirrorsDir is the directory for containerd host mirror configuration.
                          Defaults to "kind/mirrors" if not specified.
                        type: string
                    type: object
                  workers:
                    description: |-
                      Workers is the number of worker nodes (default: 0).
                      Provider/distribution-agnostic: applies to Vanilla (Kind), K3s (K3d), Talos, and VCluster.
                      When 0 on Talos, scheduling is allowed on control-plane nodes.
                      Supersedes spec.cluster.talos.workers (deprecated; aliased on load).
                    format: int32
                    type: integer
                type: object
              editor:
                description: |-
                  Editor is the editor command launched for interactive workflows (e.g. "code --wait").
                  CLI-only; ignored by the operator (the Cluster CRD shares this type but never reads it).
                type: string
              provider:
                description: |-
                  Provider holds infrastructure-provider-specific options
                  (Hetzner, Omni, AWS, GCP, Azure, and the Kubernetes provider for nested clusters).
                properties:
                  aws:
                    description: AWS holds options for the AWS provider used by the
                      EKS distribution.
                    properties:
                      accessKeyIdEnvVar:
                        description: |-
                          AccessKeyIDEnvVar is the environment variable containing a static AWS access key ID.
                          Defaults to "AWS_ACCESS_KEY_ID".
                        type: string
                      profileEnvVar:
                        description: |-
                          ProfileEnvVar is the environment variable containing the AWS shared-config profile name.
                          Defaults to "AWS_PROFILE".
                        type: string
                      regionEnvVar:
                        description: |-
                          RegionEnvVar is the environment variable containing the AWS region.
                          When set, it overrides the region declared in eks.yaml.
                          Defaults to "AWS_REGION".
                        type: string
                      secretAccessKeyEnvVar:
                        description: |-
                          SecretAccessKeyEnvVar is the environment variable containing a static AWS secret access key.
                          Defaults to "AWS_SECRET_ACCESS_KEY".
                        type: string
                      sessionTokenEnvVar:
                        description: |-
                          SessionTokenEnvVar is the environment variable containing an AWS session token
                          (used with temporary credentials from STS).
                          Defaults to "AWS_SESSION_TOKEN".
                        type: string
                    type: object
                  azure:
                    description: Azure holds options for the Microsoft Azure provider
                      used by the AKS distribution.
                    properties:
                      resourceGroupEnvVar:
                        description: |-
                          ResourceGroupEnvVar is the environment variable containing the Azure resource group
                          that hosts the cluster. Defaults to "AZURE_RESOURCE_GROUP". When neither the
                          environment variable nor a configured value provides a resource group, cluster-scoped
                          calls resolve it from the cluster's ARM ID via a subscription-wide list, and Create
                          requires it explicitly.
                        type: string
                      subscriptionIdEnvVar:
                        description: |-
                          SubscriptionIDEnvVar is the environment variable containing the Azure subscription ID.
                          Defaults to "AZURE_SUBSCRIPTION_ID".
                        type: string
                    type: object
                  gcp:
                    description: GCP holds options for the Google Cloud provider used
                      by the GKE distribution.
                    properties:
                      locationEnvVar:
                        description: |-
                          LocationEnvVar is the environment variable containing the GKE location (zone or region).
                          Defaults to "GOOGLE_CLOUD_LOCATION".
                        type: string
                      projectEnvVar:
                        description: |-
                          ProjectEnvVar is the environment variable containing the Google Cloud project ID.
                          Defaults to "GOOGLE_CLOUD_PROJECT".
                        type: string
                    type: object
                  hetzner:
                    description: Hetzner holds options for the Hetzner Cloud provider.
                    properties:
                      allowedCidrs:
                        description: |-
                          AllowedCIDRs restricts public access to the Kubernetes API (6443) and Talos API (50000)
                          on control-plane nodes to the specified CIDR blocks. When empty, both APIs are open
                          to the entire internet (0.0.0.0/0 and ::/0). Applied to both the Hetzner Cloud Firewall
                          and the Talos OS-level ingress firewall for defense-in-depth.
                          Examples: ["203.0.113.0/24", "198.51.100.0/24"]
                        items:
                          type: string
                        type: array
                      autoscalerNodePoolNames:
                        description: |-
                          AutoscalerNodePoolNames lists the node-group names configured in the
                          Kubernetes Cluster Autoscaler for this cluster. When non-empty, KSail
                          deletes servers labelled with hcloud/node-group=<name> during cluster
                          deletion so that autoscaler-managed nodes are cleaned up alongside
                          KSail-managed nodes.
                        items:
                          type: string
                        type: array
                      controlPlanePublicIPv4:
                        description: |-
                          ControlPlanePublicIPv4 controls whether control-plane nodes are assigned a public IPv4.
                          nil (default) or true assigns a public IPv4 (billed). false provisions IPv4-less control
                          planes; the kube/talos endpoint is then derived from the private-network IP so the cluster
                          is reachable only from inside the private network.
                        type: boolean
                      controlPlanePublicIPv6:
                        description: |-
                          ControlPlanePublicIPv6 controls whether control-plane nodes are assigned a public IPv6.
                          nil (default) or true assigns a public IPv6 (free on Hetzner). false disables it.
                        type: boolean
                      controlPlaneServerType:
                        description: |-
                          ControlPlaneServerType is the Hetzner server type for control-plane nodes.
                          Examples: "cx23" (x86), "cax11" (ARM), "cpx21" (AMD). Defaults to "cx23".
                        type: string
                      fallbackLocations:
                        description: |-
                          FallbackLocations specifies alternative datacenter locations to try when
                          server creation fails in the primary location due to resource unavailability.
                          Defaults to ["nbg1", "hel1"] (Nuremberg, Helsinki) as fallbacks for fsn1 (Falkenstein).
                          All locations should be in the same network zone (eu-central) for consistency.
                        items:
                          type: string
                        type: array
                      floatingIPEnabled:
                        description: |-
                          FloatingIPEnabled provisions a Hetzner floating IP named "<cluster-name>-floating-ip"
                          and renders it into the generated configs as the stable Kubernetes/Talos API endpoint
                          (cluster endpoint plus certificate SANs; the control-plane node IPs stay in the SAN set
                          so direct node access keeps working). The floating IP survives any individual
                          control-plane server being deleted and recreated, so kubeconfigs and external consumers
                          keep a stable API address across control-plane rolls. On create the IP is attached to
                          the first control-plane server as the initial claim; KSail also renders a Talos VIP
                          block (machine.network.interfaces vip with hcloud API management) into the
                          control-plane configs, so the elected leader claims the address on every leader
                          change — no user-provided machine-config patch is needed. The hcloud API token
                          (from the configured tokenEnvVar) is embedded in the rendered control-plane machine
                          config, the trust surface Talos' hcloud VIP support prescribes. Defaults to false
                          (no floating IP; rendered configs are unchanged).
                        type: boolean
                      floatingIPLocation:
                        description: |-
                          FloatingIPLocation is the Hetzner location the floating IP is homed in. Homing only
                          affects routing latency, not which servers the IP can be assigned to. Defaults to the
                          cluster's Location.
                        type: string
                      ingressFirewall:
                        description: |-
                          IngressFirewall controls the Talos OS-level ingress firewall configuration.
                          When Enabled (default), KSail generates NetworkDefaultActionConfig and NetworkRuleConfig
                          documents as Talos machine config patches, providing defense-in-depth at the node level
                          independent of the Hetzner Cloud Firewall.
                          See: https://www.talos.dev/latest/talos-guides/network/ingress-firewall/
                        type: string
                      location:
                        description: |-
                          Location is the Hetzner datacenter location.
                          Examples: "fsn1" (Falkenstein), "nbg1" (Nuremberg), "hel1" (Helsinki).
                          Defaults to "fsn1".
                        type: string
                      networkCidr:
                        description: |-
                          NetworkCIDR is the CIDR block for the private network.
                          Defaults to "10.0.0.0/16".
                        type: string
                      networkName:
                        description: |-
                          NetworkName is the name of the private network to create or use.
                          If empty, a network named "<cluster-name>-network" will be created.
                        type: string
                      placementGroup:
                        description: |-
                          PlacementGroup is the name of the placement group for server distribution.
                          If empty, a placement group named "<cluster-name>-placement" will be created.
                          Only used when PlacementGroupStrategy is "Spread".
                        type: string
                      placementGroupFallbackToNone:
                        description: |-
                          PlacementGroupFallbackToNone allows automatic fallback to no placement group
                          when spread placement constraints cannot be satisfied (e.g., due to datacenter capacity).
                          When true and placement fails, retries server creation without a placement group.
                          Defaults to false to preserve HA guarantees; set to true for best-effort provisioning.
                        type: boolean
                      placementGroupStrategy:
                        description: |-
                          PlacementGroupStrategy controls whether and how placement groups are used.
                          "Spread" (default) distributes servers across different physical hosts for HA.
                          "None" disables placement groups, useful when Hetzner resources are constrained.
                          Note: Spread groups are limited to 10 servers per datacenter.
                        type: string
                      serverLimit:
                        description: |-
                          ServerLimit is the maximum number of Hetzner servers (control-plane + worker + autoscaler
                          pool capacity) permitted in this cluster. Used by ValidateAutoscalerConfig to prevent
                          the configured autoscaler capacity from exceeding the account/project server quota.
                          When set to 0, KSail uses DefaultHetznerServerLimit instead of treating 0 as an explicit
                          limit. Defaults to DefaultHetznerServerLimit (10).
                        format: int32
                        type: integer
                      sshKeyName:
                        description: |-
                          SSHKeyName is the name of the SSH key to use for server access.
                          The key must already exist in the Hetzner Cloud project.
                          If empty, no SSH key is attached (only Talos API access).
                        type: string
                      tokenEnvVar:
                        description: |-
                          TokenEnvVar is the environment variable containing the Hetzner API token.
                          Defaults to "HCLOUD_TOKEN".
                        type: string
                      workerPublicIPv4:
                        description: |-
                          WorkerPublicIPv4 controls whether worker nodes are assigned a public IPv4 address.
                          nil (default) or true assigns a public IPv4 (billed by Hetzner). false provisions
                          IPv4-less workers; ksail then reaches their Talos API over the private network — which
                          requires ksail to have private-network reachability — and the nodes need egress via a
                          NAT gateway (or working IPv6) for image pulls, the Hetzner API, and cluster join.
                        type: boolean
                      workerPublicIPv6:
                        description: |-
                          WorkerPublicIPv6 controls whether worker nodes are assigned a public IPv6 address.
                          nil (default) or true assigns a public IPv6 (free on Hetzner). false disables it.
                        type: boolean
                      workerServerType:
                        description: |-
                          WorkerServerType is the Hetzner server type for worker nodes.
                          Examples: "cx23" (x86), "cax11" (ARM), "cpx21" (AMD). Defaults to "cx23".
                        type: string
                    type: object
                  kubernetes:
                    description: |-
                      Kubernetes holds options for the Kubernetes provider, which runs nested
                      clusters as pods inside an existing host cluster.
                    properties:
                      context:
                        description: |-
                          Context is the kubeconfig context for the host cluster.
                          When empty, uses the current context.
                        type: string
                      contextEnvVar:
                        description: |-
                          ContextEnvVar is the environment variable containing the host kubeconfig context.
                          Defaults to "KSAIL_HOST_CONTEXT".
                        type: string
                      gatewayClassName:
                        description: |-
                          GatewayClassName is the GatewayClass to use for exposing the nested API server.
                          Must reference a GatewayClass that exists on the host cluster.
                          When empty, the API is exposed via ClusterIP Service only (no external Gateway).
                        type: string
                      kubeconfig:
                        description: |-
                          Kubeconfig is the path to the kubeconfig for the host cluster.
                          Defaults to "~/.kube/config".
                        type: string
                      kubeconfigEnvVar:
                        description: |-
                          KubeconfigEnvVar is the environment variable containing the host kubeconfig path.
                          Defaults to "KSAIL_HOST_KUBECONFIG".
                        type: string
                      persistence:
                        description: Persistence defines storage persistence for the
                          nested cluster's data directory.
                        properties:
                          enabled:
                            description: |-
                              Enabled controls whether a PVC is used for the nested cluster's data directory.
                              When false (default), emptyDir is used and the cluster is ephemeral.
                            type: boolean
                          size:
                            description: |-
                              Size is the storage request size for the PVC.
                              Defaults to "20Gi".
                            type: string
                          storageClassName:
                            description: |-
                              StorageClassName is the StorageClass to use for the PVC.
                              When empty, the cluster's default StorageClass is used.
                            type: string
                        type: object
                      podCidr:
                        description: |-
                          PodCIDR is the pod CIDR for the nested cluster.
                          Must not overlap with the host cluster's pod or service CIDRs.
                          Defaults to "10.64.0.0/16".
                        type: string
                      serviceCidr:
                        description: |-
                          ServiceCIDR is the service CIDR for the nested cluster.
                          Must not overlap with the host cluster's pod or service CIDRs.
                          Defaults to "10.128.0.0/16".
                        type: string
                    type: object
                  omni:
                    description: Omni holds options for the Sidero Omni provider.
                    properties:
                      endpoint:
                        description: |-
                          Endpoint is the Omni API endpoint URL.
                          Example: "https://<account>.omni.siderolabs.io:443".
                        type: string
                      endpointEnvVar:
                        description: |-
                          EndpointEnvVar is the environment variable containing the Omni API endpoint URL.
                          When set, the value of this environment variable takes precedence over Endpoint.
                          Defaults to "OMNI_ENDPOINT".
                        type: string
                      kubernetesVersion:
                        description: |-
                          KubernetesVersion is the Kubernetes version to use for the cluster in Omni.
                          Accepts values with or without the "v" prefix (e.g., "v1.32.0" or "1.32.0").
                          Generated templates normalize the value to include the "v" prefix.
                          This determines the Kubernetes version that Omni will deploy.
                        type: string
                      machineClass:
                        description: |-
                          MachineClass is the Omni machine class name to use for dynamic node allocation.
                          Machine classes are user-defined in the Omni dashboard and match machines
                          by labels (e.g., CPU, region, role). The specified class must exist in
                          the Omni account before cluster creation. The number of machines allocated
                          is derived from the controlPlanes and workers count in the cluster spec.
                          Mutually exclusive with Machines — set one or the other.
                          When neither MachineClass nor Machines is set, KSail automatically discovers
                          available (unallocated) machines in Omni and uses them for node allocation.
                        type: string
                      machines:
                        description: |-
                          Machines is a list of Omni machine UUIDs to use for static node allocation.
                          The first N machines are assigned as control planes (where N = controlPlanes count),
                          and the remaining machines are assigned as workers.
                          Mutually exclusive with MachineClass — set one or the other.
                          When neither MachineClass nor Machines is set, KSail automatically discovers
                          available (unallocated) machines in Omni and uses them for node allocation.
                        items:
                          type: string
                        type: array
                      serviceAccountKeyEnvVar:
                        description: |-
                          ServiceAccountKeyEnvVar is the environment variable containing the
                          base64-encoded Omni service account key.
                          Defaults to "OMNI_SERVICE_ACCOUNT_KEY".
                        type: string
                      talosVersion:
                        description: |-
                          TalosVersion is the Talos version to use for the cluster in Omni.
                          Accepts values with or without the "v" prefix (e.g., "v1.11.2" or "1.11.2").
                          Generated templates normalize the value to include the "v" prefix.
                          This determines the Talos Linux version that Omni will deploy to machines.
                        type: string
                    type: object
                type: object
              workload:
                description: |-
                  Workload configures workload management: the manifest source directory,
                  OCI push and validation settings, and GitOps bootstrap options.
                properties:
                  flux:
                    description: |-
                      FluxConfig holds the Flux-specific bootstrap configuration KSail applies when
                      it seeds Flux during cluster bootstrap: the operator/distribution version pins
                      and signature verification for the OCIRepository KSail generates. The version
                      pins are optional (an empty value means KSail uses its built-in pinned
                      version) and configure only the bootstrap seed — once a GitOps repository owns
                      the flux-operator HelmRelease or the FluxInstance, that repository becomes the
                      steady-state owner and KSail defers.
                    properties:
                      distributionVersion:
                        description: |-
                          DistributionVersion pins the FluxInstance spec.distribution.version KSail
                          seeds. When empty, KSail uses its default ("2.x"). A repo-declared
                          FluxInstance's distribution.version takes precedence over this value.
                        type: string
                      operatorVersion:
                        description: |-
                          OperatorVersion pins the Flux operator Helm chart version KSail installs
                          when it seeds the operator. When empty, KSail uses its built-in pinned
                          version. Ignored once a GitOps repo owns the flux-operator release — KSail
                          never re-installs over a Helm release managed by Flux or ArgoCD.
                        type: string
                      verify:
                        description: |-
                          Verify configures cosign/notation signature verification rendered onto the
                          generated flux-system OCIRepository. Empty leaves verification off.
                        properties:
                          matchOIDCIdentity:
                            items:
                              description: |-
                                FluxVerifyOIDCIdentity is a cosign keyless identity matcher. Both fields
                                are Go regular expressions matched against the Fulcio signing certificate.
                              properties:
                                issuer:
                                  type: string
                                subject:
                                  type: string
                              type: object
                            type: array
                          provider:
                            type: string
                          secretRef:
                            description: |-
                              FluxVerifySecretRef references the Kubernetes Secret holding the trusted
                              public keys or certificates used for signature verification.
                            properties:
                              name:
                                type: string
                            type: object
                        type: object
                    type: object
                  kustomizationFile:
                    type: string
                  scan:
                    description: |-
                      ScanConfig defines configuration for the workload scan command, letting
                      'ksail workload scan' (no args) act as a turnkey CI gate the same way
                      spec.workload.validation configures 'ksail workload validate'.
                    properties:
                      complianceThreshold:
                        description: |-
                          ComplianceThreshold fails the scan when the compliance score is below this
                          whole-percentage value (0-100). Unset (nil) means no threshold gate. The
                          --compliance-threshold flag accepts fractional values; this config field is
                          an integer percentage (the common CI-gate case).
                        format: int32
                        type: integer
                      exceptions:
                        description: |-
                          Exceptions is the path to a Kubescape exceptions file forwarded to
                          Kubescape's --exceptions. It uses Kubescape's native exceptions format (a
                          JSON array of PostureExceptionPolicy objects) so a repo can suppress
                          justified, runtime-enforced findings (Kyverno admission mutation, Cilium
                          network policies, VPA-managed resources) that a static scan cannot see, and
                          thus gate at complianceThreshold 100. A relative path is resolved against
                          the ksail.yaml directory.
                        type: string
                      frameworks:
                        description: |-
                          Frameworks lists the security frameworks to scan against (e.g. nsa, mitre,
                          cis, pss). Defaults to nsa when unset.
                        items:
                          type: string
                        type: array
                    type: object
                  sourceDirectory:
                    type: string
                  tag:
                    type: string
                  validateOnPush:
                    type: boolean
                  validation:
                    description: ValidationConfig defines configuration for the workload
                      validate command.
                    properties:
                      helmRender:
                        description: HelmRender controls whether HelmReleases are
                          rendered before validation.
                        type: boolean
                      rules:
                        description: |-
                          Rules is the path to a YAML CEL rules file evaluated during validation, so
                          rule validation can be a turnkey CI gate declared once in ksail.yaml rather
                          than requiring --rules on every invocation. The --rules flag overrides it.
                        type: string
                      schemaLocations:
                        description: |-
                          SchemaLocations lists additional kubeconform schema locations (local
                          directories or URL templates) for CRDs absent from the CRDs-catalog, so
                          they can be validated against a supplied schema rather than skipped.
                        items:
                          type: string
                        type: array
                      skipKinds:
                        description: |-
                          SkipKinds lists additional Kubernetes kinds to skip during validation.
                          Kubernetes Secrets are skipped by default via --skip-secrets; this is for
                          skipping CRDs whose schema in the CRDs-catalog is stale or missing, which
                          kubeconform would otherwise reject (e.g. valid newer fields flagged as
                          "additional properties not allowed").
                        items:
                          type: string
                        type: array
                    type: object
                  watch:
                    description: WatchConfig defines configuration for the workload
                      watch command.
                    properties:
                      hooks:
                        description: |-
                          Hooks are shell commands to run before each apply cycle.
                          Hooks execute sequentially via "sh -c"; if any hook fails, the apply is skipped for that cycle.
                          CLI-only (local shell commands run by `ksail workload watch`); ignored by the operator.
                        items:
                          type: string
                        type: array
                    type: object
                type: object
            type: object
          status:
            description: |-
              ClusterStatus describes the observed state of a Cluster as reconciled by the KSail operator.
              It is the operator's source of truth for observed state; the imperative CLI continues to
              persist its own state under ~/.ksail/clusters/<name>/spec.json independently.
            properties:
              components:
                description: |-
                  Components reports the install outcome of each component declared in the spec (CNI, CSI,
                  metrics-server, cert-manager, load-balancer, policy-engine, GitOps), so a UI can surface
                  per-component health instead of only the aggregate ComponentsReady condition. It is empty when
                  component installation is not supported for the cluster (e.g. the provisioner exposes no
                  operator-reachable kubeconfig).
                items:
                  description: |-
                    ComponentStatus reports the install outcome of a single cluster component. The ComponentState enum
                    it carries lives in its own file (componentstate.go), per the one-enum-per-file convention.
                  properties:
                    message:
                      description: Message is a human-readable detail, set to the
                        failure reason when State is Failed.
                      type: string
                    name:
                      description: |-
                        Name is the component's installer key (e.g. cilium, cert-manager, flux). It is the list-map key,
                        so it is required (the package default is Optional).
                      type: string
                    state:
                      description: State is the component's install outcome in the
                        last reconcile. Always set by the operator.
                      enum:
                      - Ready
                      - Failed
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              conditions:
                description: Conditions represent the latest observations of the cluster's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoint:
                description: Endpoint is the stable API server URL of the provisioned
                  cluster, when known.
                type: string
              expiresAt:
                description: ExpiresAt is when a TTL-bound cluster is scheduled for
                  automatic deletion, when a TTL is set.
                format: date-time
                type: string
              gitOps:
                description: |-
                  GitOps reports observed GitOps reconciliation state for monitoring only.
                  It does NOT control the UI read-only lock, which is a deployment-level configuration.
                properties:
                  engine:
                    description: Engine is the GitOps engine detected/configured for
                      the cluster.
                    type: string
                  lastSyncTime:
                    description: LastSyncTime is the most recent successful sync time
                      observed, when known.
                    format: date-time
                    type: string
                  message:
                    description: Message is a human-readable summary of the current
                      GitOps sync state.
                    type: string
                  synced:
                    description: Synced is true when all tracked GitOps resources
                      report a healthy/synced state.
                    type: boolean
                type: object
              kubeconfigSecretRef:
                description: KubeconfigSecretRef points to the Secret holding the
                  child cluster's kubeconfig.
                properties:
                  name:
                    description: Name is the Secret name.
                    type: string
                  namespace:
                    description: Namespace is the Secret namespace. Empty means the
                      Cluster's namespace.
                    type: string
                type: object
              lastReconcileTime:
                description: LastReconcileTime is when the operator last reconciled
                  this cluster.
                format: date-time
                type: string
              nodesReady:
                description: NodesReady is the number of cluster nodes reporting Ready.
                format: int32
                type: integer
              nodesTotal:
                description: NodesTotal is the total number of cluster nodes.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the metadata.generation last processed
                  by the operator.
                format: int64
                type: integer
              phase:
                description: Phase is a high-level summary of the cluster lifecycle.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Stopped
                - Updating
                - Deleting
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

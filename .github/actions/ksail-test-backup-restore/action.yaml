name: KSail Backup & Restore Test
description: |
  Tests the cluster backup and restore lifecycle on a running cluster.
  Deploys a test workload, backs up the cluster, validates archive
  structure and metadata (including distribution, provider, resourceTypes,
  and resourceCount cross-validation), tests namespace-filtered,
  compression-level, and exclude-types backups, tests dry-run restore,
  deletes the workload, restores from backup, verifies the workload is
  restored, tests skip-existing policy, and validates security guards
  (invalid archive, path traversal, symlink rejection).

  Does NOT create or delete the cluster — the orchestrator handles that.

inputs:
  workload-timeout:
    description: Timeout for workload wait operations
    required: false
    default: "600s"

runs:
  using: composite
  steps:
    - name: 🧪 Deploy backup test workload
      id: deploy
      shell: bash
      env:
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        create_succeeded=false
        for attempt in 1 2 3; do
          if ksail workload create deployment backup-test --image=nginx:alpine; then
            create_succeeded=true
            break
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "⚠️ workload create attempt $attempt failed, retrying in 10s…"
            sleep 10
          fi
        done
        if [ "$create_succeeded" != "true" ]; then
          echo "❌ ksail workload create failed after 3 attempts"
          exit 1
        fi
        ksail workload wait --for=condition=Available deployment/backup-test --timeout="$TIMEOUT"

    - name: 🧪 Backup cluster
      id: backup
      shell: bash
      run: |
        ksail cluster backup --output /tmp/cluster-backup.tar.gz
        ls -lh /tmp/cluster-backup.tar.gz
        echo "✅ Backup created successfully"

    - name: 🧪 Validate archive structure
      id: validate-archive
      shell: bash
      run: |
        LISTING=$(tar tzf /tmp/cluster-backup.tar.gz)
        if ! echo "$LISTING" | grep -Fq 'backup-metadata.json'; then
          echo "❌ Archive missing backup-metadata.json"
          exit 1
        fi
        if ! echo "$LISTING" | grep -q '[.]yaml$'; then
          echo "❌ Archive contains no .yaml files"
          exit 1
        fi
        echo "✅ Archive structure is valid"

    - name: 🧪 Validate backup metadata
      id: validate-metadata
      shell: bash
      run: |
        METADATA=$(tar xzf /tmp/cluster-backup.tar.gz -O backup-metadata.json)
        for field in clusterName version ksailVersion; do
          VALUE=$(echo "$METADATA" | jq -r ".$field")
          if [ -z "$VALUE" ] || [ "$VALUE" = "null" ]; then
            echo "❌ Metadata field '$field' is missing or empty"
            exit 1
          fi
        done
        # distribution and provider are best-effort (detection may fail for
        # some kubeconfig context patterns, e.g. Omni); log but don't fail.
        for field in distribution provider; do
          VALUE=$(echo "$METADATA" | jq -r ".$field")
          if [ -z "$VALUE" ] || [ "$VALUE" = "null" ]; then
            echo "ℹ️  Metadata field '$field' is empty (detection may not be supported for this distribution)"
          fi
        done
        if ! COUNT=$(echo "$METADATA" | jq -re '.resourceCount | tonumber | select(. > 0)'); then
          echo "❌ resourceCount should be an integer > 0"
          exit 1
        fi
        if ! RESOURCE_TYPE_COUNT=$(echo "$METADATA" | jq -re '.resourceTypes | arrays | length | select(. > 0)'); then
          echo "❌ resourceTypes should be a non-empty array"
          exit 1
        fi
        # Cross-validate resourceCount against archive contents using a safe invariant:
        # resourceCount counts exported resources, which may exceed the number of YAML files.
        LISTING=$(tar tzf /tmp/cluster-backup.tar.gz)
        YAML_COUNT=$(echo "$LISTING" | grep -c '[.]yaml$' || true)
        if [ "$YAML_COUNT" -lt 1 ]; then
          echo "❌ Archive contains no .yaml files"
          exit 1
        fi
        if [ "$COUNT" -lt "$YAML_COUNT" ]; then
          echo "❌ resourceCount ($COUNT) should be greater than or equal to YAML file count ($YAML_COUNT)"
          exit 1
        fi
        echo "✅ Backup metadata is valid (resourceCount=$COUNT, resourceTypeCount=$RESOURCE_TYPE_COUNT, yamlFiles=$YAML_COUNT)"

    - name: 🧪 Namespace-filtered backup
      id: backup-ns
      shell: bash
      run: |
        ksail cluster backup --output /tmp/backup-ns.tar.gz --namespaces default
        LISTING=$(tar tzf /tmp/backup-ns.tar.gz)
        if ! grep -Fq 'backup-metadata.json' <<< "$LISTING"; then
          echo "❌ Namespace-filtered archive missing backup-metadata.json"
          exit 1
        fi
        echo "✅ Namespace-filtered backup is valid"

    - name: 🧪 Compression level backup
      id: backup-compression
      shell: bash
      run: |
        ksail cluster backup --output /tmp/backup-fast.tar.gz --compression 1
        tar tzf /tmp/backup-fast.tar.gz > /dev/null
        echo "✅ Compression-level backup is valid"

    - name: 🧪 Exclude-types backup
      id: backup-exclude-types
      shell: bash
      run: |
        ksail cluster backup --output /tmp/backup-exclude.tar.gz --exclude-types deployments
        METADATA=$(tar xzf /tmp/backup-exclude.tar.gz -O backup-metadata.json)
        # Verify resourceTypes is a valid array before checking exclusion
        if ! echo "$METADATA" | jq -e '.resourceTypes | type == "array"' > /dev/null 2>&1; then
          echo "❌ backup-metadata.json has invalid or missing resourceTypes"
          exit 1
        fi
        if ! echo "$METADATA" | jq -e --arg t "deployments" '.resourceTypes | index($t) == null' > /dev/null 2>&1; then
          echo "❌ Excluded type 'deployments' still present in resourceTypes"
          exit 1
        fi
        LISTING=$(tar tzf /tmp/backup-exclude.tar.gz)
        if grep -q 'resources/deployments/' <<< "$LISTING"; then
          echo "❌ Archive contains deployment resources despite --exclude-types deployments"
          exit 1
        fi
        echo "✅ Exclude-types backup is valid"

    - name: 🧪 Dry-run restore (no changes applied)
      id: dry-run-restore
      shell: bash
      env:
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        ksail cluster restore --input /tmp/cluster-backup.tar.gz --dry-run
        # Verify no side effects — workload must still be available
        ksail workload wait --for=condition=Available deployment/backup-test --timeout="$TIMEOUT"
        echo "✅ Dry-run restore completed without side effects"

    - name: 🧪 Delete test workload
      id: delete
      shell: bash
      run: |
        ksail workload delete deployment/backup-test --ignore-not-found
        # Verify it's gone
        if ksail workload get deployment/backup-test 2>/dev/null; then
          echo "❌ Workload still exists after delete"
          exit 1
        fi
        echo "✅ Workload deleted"

    - name: 🧪 Restore from backup
      id: restore
      shell: bash
      run: |
        ksail cluster restore --input /tmp/cluster-backup.tar.gz --existing-resource-policy=update
        echo "✅ Restore completed"

    - name: 🧪 Verify restored workload
      id: verify
      shell: bash
      env:
        TIMEOUT: ${{ inputs.workload-timeout }}
      run: |
        ksail workload wait --for=condition=Available deployment/backup-test --timeout="$TIMEOUT"
        ksail workload get deployment/backup-test
        echo "✅ Workload restored and available"

    - name: 🧪 Restore with policy=none (skip existing)
      id: restore-policy-none
      shell: bash
      run: |
        # policy=none uses kubectl create — resources that already exist
        # are expected to produce "already exists" or "already allocated"
        # errors. Capture output and validate the failure is expected.
        set +e
        ksail cluster restore --input /tmp/cluster-backup.tar.gz --existing-resource-policy=none 2>/tmp/restore-none-stderr.txt
        RC=$?
        set -e
        if [ "$RC" -eq 0 ]; then
          echo "✅ Restore with policy=none succeeded (no conflicts)"
        elif grep -qE "already exists|already allocated" /tmp/restore-none-stderr.txt; then
          echo "✅ Restore with policy=none failed with expected conflicts (exit $RC)"
        else
          echo "❌ Restore with policy=none failed with unexpected error (exit $RC):"
          cat /tmp/restore-none-stderr.txt
          rm -f /tmp/restore-none-stderr.txt
          exit 1
        fi
        rm -f /tmp/restore-none-stderr.txt

    - name: 🧪 Invalid archive rejected
      id: invalid-archive
      shell: bash
      run: |
        echo "not-a-valid-archive" > /tmp/invalid-backup.tar.gz
        if ksail cluster restore --input /tmp/invalid-backup.tar.gz 2>/tmp/invalid-archive-stderr.txt; then
          echo "❌ Expected restore to fail on invalid archive"
          rm -f /tmp/invalid-backup.tar.gz /tmp/invalid-archive-stderr.txt
          exit 1
        fi
        echo "✅ Invalid archive correctly rejected"
        rm -f /tmp/invalid-backup.tar.gz /tmp/invalid-archive-stderr.txt

    - name: 🧪 Path traversal rejected
      id: path-traversal
      shell: bash
      run: |
        python3 << 'PYEOF'
        import tarfile, io, json
        buf = io.BytesIO()
        with tarfile.open(fileobj=buf, mode='w:gz') as tar:
            meta = json.dumps({'version':'1','timestamp':'2024-01-01T00:00:00Z','namespaces':['default']}).encode()
            info = tarfile.TarInfo(name='backup-metadata.json')
            info.size = len(meta)
            tar.addfile(info, io.BytesIO(meta))
            content = b'apiVersion: v1'
            info = tarfile.TarInfo(name='../../../etc/passwd')
            info.size = len(content)
            tar.addfile(info, io.BytesIO(content))
        with open('/tmp/traversal-backup.tar.gz', 'wb') as f:
            f.write(buf.getvalue())
        PYEOF
        if ksail cluster restore --input /tmp/traversal-backup.tar.gz 2>/tmp/traversal-stderr.txt; then
          echo "❌ Expected restore to reject path traversal archive"
          rm -f /tmp/traversal-backup.tar.gz /tmp/traversal-stderr.txt
          exit 1
        fi
        if ! grep -q "invalid tar entry path" /tmp/traversal-stderr.txt; then
          echo "❌ Expected 'invalid tar entry path' error, got:"
          cat /tmp/traversal-stderr.txt
          rm -f /tmp/traversal-backup.tar.gz /tmp/traversal-stderr.txt
          exit 1
        fi
        echo "✅ Path traversal archive correctly rejected"
        rm -f /tmp/traversal-backup.tar.gz /tmp/traversal-stderr.txt

    - name: 🧪 Symlink in archive rejected
      id: symlink-rejection
      shell: bash
      run: |
        python3 << 'PYEOF'
        import tarfile, io, json
        buf = io.BytesIO()
        with tarfile.open(fileobj=buf, mode='w:gz') as tar:
            meta = json.dumps({'version':'1','timestamp':'2024-01-01T00:00:00Z','namespaces':['default']}).encode()
            info = tarfile.TarInfo(name='backup-metadata.json')
            info.size = len(meta)
            tar.addfile(info, io.BytesIO(meta))
            info = tarfile.TarInfo(name='resources/namespaces/evil.yaml')
            info.type = tarfile.SYMTYPE
            info.linkname = '/etc/passwd'
            tar.addfile(info)
        with open('/tmp/symlink-backup.tar.gz', 'wb') as f:
            f.write(buf.getvalue())
        PYEOF
        if ksail cluster restore --input /tmp/symlink-backup.tar.gz 2>/tmp/symlink-stderr.txt; then
          echo "❌ Expected restore to reject archive containing symlink"
          rm -f /tmp/symlink-backup.tar.gz /tmp/symlink-stderr.txt
          exit 1
        fi
        if ! grep -q "symbolic and hard links are not supported" /tmp/symlink-stderr.txt; then
          echo "❌ Expected symlink rejection error, got:"
          cat /tmp/symlink-stderr.txt
          rm -f /tmp/symlink-backup.tar.gz /tmp/symlink-stderr.txt
          exit 1
        fi
        echo "✅ Symlink archive correctly rejected"
        rm -f /tmp/symlink-backup.tar.gz /tmp/symlink-stderr.txt

    - name: 🧪 Cleanup backup test workload
      if: always()
      shell: bash
      run: |
        ksail workload delete deployment/backup-test --ignore-not-found 2>/dev/null || true

    - name: 🐞 Debug failure
      if: failure() && (steps.deploy.outcome == 'failure' || steps.backup.outcome == 'failure' || steps.validate-archive.outcome == 'failure' || steps.validate-metadata.outcome == 'failure' || steps.backup-ns.outcome == 'failure' || steps.backup-compression.outcome == 'failure' || steps.backup-exclude-types.outcome == 'failure' || steps.dry-run-restore.outcome == 'failure' || steps.restore.outcome == 'failure' || steps.verify.outcome == 'failure' || steps.restore-policy-none.outcome == 'failure' || steps.invalid-archive.outcome == 'failure' || steps.path-traversal.outcome == 'failure' || steps.symlink-rejection.outcome == 'failure')
      uses: ./.github/actions/debug-kubernetes-failure
      with:
        kubectl-command: "ksail workload"

    - name: 🧹 Cleanup temp files
      if: always()
      shell: bash
      run: |
        rm -f /tmp/cluster-backup.tar.gz /tmp/invalid-backup.tar.gz \
              /tmp/traversal-backup.tar.gz /tmp/symlink-backup.tar.gz \
              /tmp/backup-ns.tar.gz /tmp/backup-fast.tar.gz \
              /tmp/backup-exclude.tar.gz \
              /tmp/invalid-archive-stderr.txt /tmp/traversal-stderr.txt \
              /tmp/symlink-stderr.txt /tmp/restore-none-stderr.txt

{{- if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ksail-operator.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksail-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "ksail-operator.uiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ksail-operator.uiSelectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: ui
          image: {{ include "ksail-operator.uiImage" . | quote }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            # API_BASE_URL is consumed by the UI container's nginx to proxy /api to the operator
            # Service. The read-only state is read by the SPA at runtime from GET /api/v1/config
            # (driven by the operator's --read-only flag, wired from ui.readOnly), so the SPA needs
            # no build-time or runtime UI_READ_ONLY env var.
            - name: API_BASE_URL
              value: "http://{{ include "ksail-operator.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.api.bindPort }}"
          ports:
            - name: http
              containerPort: 80
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

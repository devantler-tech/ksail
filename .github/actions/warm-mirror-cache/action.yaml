name: Warm Mirror Cache
description: |
  Pre-warms the mirror registry cache by extracting all images needed for
  system tests and pulling them through mirror registries. Run this before
  the system test matrix to ensure all tests have a warm cache.

  This action:
  1. Extracts images for all distribution × component combinations
  2. Deduplicates the image list
  3. Creates mirror registries for docker.io, ghcr.io, quay.io, and registry.k8s.io
  4. Pulls all images through the mirrors (populating their volumes)
  5. Saves the mirror volumes to GitHub Actions cache

  The cache key is based on the hash of the extracted image list, ensuring
  cache invalidation when any image reference changes (including code changes
  that affect image extraction, not just go.mod changes).

inputs:
  cache-version:
    description: |
      Version salt for cache key. Bump this to invalidate all caches.
    required: false
    default: "v1"

outputs:
  cache-hit:
    description: Whether the cache was restored (warm start)
    value: ${{ steps.restore-cache.outputs.cache-hit || 'false' }}
  cache-key:
    description: The cache key used for this operation
    value: ${{ steps.generate-key.outputs.cache-key }}
  image-count:
    description: Number of unique images extracted
    value: ${{ steps.extract-images.outputs.count }}

runs:
  using: composite
  steps:
    - name: 📋 Extract images for all configurations
      id: extract-images
      shell: bash
      run: |
        echo "📋 Extracting images for all system test configurations..."

        # All unique distribution × component combinations from CI matrix
        CONFIGS=(
          # Default (Cilium CNI)
          "--distribution Vanilla --cni Cilium"

          # Full featured (Cilium + Flux + all extras)
          "--distribution Vanilla --cni Cilium --csi Enabled --load-balancer Enabled --metrics-server Enabled --policy-engine Kyverno --cert-manager Enabled --gitops-engine Flux"

          # Calico + ArgoCD + Gatekeeper
          "--distribution Vanilla --cni Calico --policy-engine Gatekeeper --gitops-engine ArgoCD"

          # K3s specific (no cloud-provider-kind)
          "--distribution K3s --cni Cilium --gitops-engine Flux"
          "--distribution K3s --cni Cilium --gitops-engine ArgoCD"

          # Talos specific
          "--distribution Talos --cni Cilium --gitops-engine Flux"
          "--distribution Talos --cni Cilium --gitops-engine ArgoCD"

          # Talos + MetalLB (only installed for Talos×Docker×LB=Enabled)
          "--distribution Talos --cni Cilium --load-balancer Enabled --gitops-engine Flux"

          # VCluster specific
          "--distribution VCluster --cni Cilium --gitops-engine Flux"
          "--distribution VCluster --cni Cilium --gitops-engine ArgoCD"
        )

        # Create temp file for all images
        IMAGES_FILE="/tmp/all-images.txt"
        > "$IMAGES_FILE"
        ERRORS_FILE="/tmp/extraction-errors.txt"
        > "$ERRORS_FILE"

        for config in "${CONFIGS[@]}"; do
          echo "  Extracting: $config"
          # shellcheck disable=SC2086
          if ! ksail workload images $config >> "$IMAGES_FILE" 2>> "$ERRORS_FILE"; then
            echo "  ⚠️ Warning: Failed to extract images for: $config"
          fi
        done

        # Show any errors that occurred
        if [ -s "$ERRORS_FILE" ]; then
          echo "⚠️ Extraction errors (may be expected for some configs):"
          cat "$ERRORS_FILE"
        fi

        # Append VCluster provisioner-level images that ksail workload images
        # cannot enumerate (pulled by the vCluster SDK, not the installer factory).
        # Source of truth: pkg/fsutil/configmanager/vcluster/Dockerfile
        grep '^FROM ' pkg/fsutil/configmanager/vcluster/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append Flux distribution controller images that the Flux operator deploys
        # when creating a FluxInstance. These are not part of the operator Helm chart
        # but are critical for avoiding image pull timeouts (see issue #3012).
        # Source of truth: pkg/svc/installer/flux/Dockerfile.distribution
        grep '^FROM ' pkg/svc/installer/flux/Dockerfile.distribution | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append KWOK control plane images pulled by kwokctl on the host Docker daemon.
        # kwokctl calls "docker inspect <image>" first and skips the pull if the image
        # already exists locally. Pre-pulling via mirror and saving with docker save/load
        # ensures KWOK clusters are created without hitting registry.k8s.io rate limits
        # when many KWOK system tests run in parallel. See issue #4058.
        # Source of truth: pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane
        grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append distribution node images pulled by the host Docker daemon during
        # cluster creation. These are NOT discovered by `ksail workload images`
        # (which only lists component/installer images). Without pre-warming,
        # Docker Hub / GHCR pulls can hit rate limits under high CI concurrency,
        # causing extended cluster creation times or timeouts. See issue #4301.
        # Source of truth: pkg/fsutil/configmanager/*/Dockerfile
        grep '^FROM ' pkg/fsutil/configmanager/k3d/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"
        grep '^FROM ' pkg/fsutil/configmanager/kind/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"
        grep '^FROM ' pkg/fsutil/configmanager/talos/Dockerfile | sed 's/^FROM //' >> "$IMAGES_FILE"

        # Append CI test workload images that are not part of any cluster component
        # but are used by ksail-test-workload, ksail-test-backup-restore,
        # ksail-test-workload-watch, ksail-test-workload-mirror, and the in-cluster
        # API connectivity pre-flight pod. Without pre-warming, transient Docker Hub
        # or proxy registry errors can cause ImagePullBackOff timeouts in system tests
        # (see issue #3822).
        echo "docker.io/traefik/whoami:v1.10" >> "$IMAGES_FILE"
        echo "docker.io/library/busybox:1.36.1" >> "$IMAGES_FILE"
        echo "docker.io/nicolaka/netshoot:v0.16" >> "$IMAGES_FILE"

        # Deduplicate and sort
        sort -u "$IMAGES_FILE" > /tmp/unique-images.txt
        mv /tmp/unique-images.txt "$IMAGES_FILE"

        COUNT=$(wc -l < "$IMAGES_FILE" | tr -d ' ')
        echo "count=$COUNT" >> "$GITHUB_OUTPUT"

        # Fail if no images were extracted (indicates a problem with ksail or config)
        if [ "$COUNT" -eq 0 ]; then
          echo "❌ Error: No images extracted. Check errors above."
          exit 1
        fi

        echo "✅ Extracted $COUNT unique images"

        # Compute hash of the image list for cache key
        # This ensures cache invalidation when any image reference changes
        IMAGES_HASH=$(sha256sum "$IMAGES_FILE" | cut -c1-12)
        echo "images-hash=$IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 Images hash: $IMAGES_HASH"

        # Compute a separate hash of just the KWOK control plane image refs so the
        # KWOK pre-load tar can be cached under its own key, independent of the four
        # mirror volumes. A GitHub Actions cache entry is immutable once saved, so a
        # KWOK tar that failed to save (e.g. a transient registry.k8s.io error) could
        # never be repaired in place under the shared mirror-cache key — every later
        # KWOK leg then pulled live and stalled. With its own key the tar self-heals:
        # it is only ever saved when produced successfully, so an absent entry is
        # retried on the next warm run. See issues #4058 / #4069 / #4495.
        KWOK_IMAGES_HASH=$(grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //' | sort -u | sha256sum | cut -c1-12)
        echo "kwok-images-hash=$KWOK_IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 KWOK images hash: $KWOK_IMAGES_HASH"

        # Compute a separate hash of just the distribution node image refs (k3s,
        # kind, talos) so the dist-node pre-load tars can be cached under their own
        # key, independent of the four mirror volumes. A GitHub Actions cache entry
        # is immutable once saved, so a dist-node tar that failed to save (e.g. a
        # transient Docker Hub / GHCR error) could never be repaired in place under
        # the shared mirror-cache key — every later cluster create then pulled the
        # node image live and risked rate limits under high CI concurrency. With its
        # own key the tars self-heal: they are only ever saved when all three were
        # produced successfully, so an absent entry is retried on the next warm run.
        # See issue #4301.
        DIST_NODE_IMAGES_HASH=$(grep -h '^FROM ' \
          pkg/fsutil/configmanager/k3d/Dockerfile \
          pkg/fsutil/configmanager/kind/Dockerfile \
          pkg/fsutil/configmanager/talos/Dockerfile \
          | sed 's/^FROM //' | sort -u | sha256sum | cut -c1-12)
        echo "dist-node-images-hash=$DIST_NODE_IMAGES_HASH" >> "$GITHUB_OUTPUT"
        echo "🔑 Distribution node images hash: $DIST_NODE_IMAGES_HASH"

        # Show images for debugging
        echo "📦 Images to cache:"
        cat "$IMAGES_FILE" | head -30
        if [ "$COUNT" -gt 30 ]; then
          echo "  ... and $((COUNT - 30)) more"
        fi

    - name: 🔑 Generate cache key
      id: generate-key
      shell: bash
      env:
        CACHE_VERSION: ${{ inputs.cache-version }}
        RUNNER_OS: ${{ runner.os }}
        RUNNER_ARCH: ${{ runner.arch }}
        IMAGES_HASH: ${{ steps.extract-images.outputs.images-hash }}
        KWOK_IMAGES_HASH: ${{ steps.extract-images.outputs.kwok-images-hash }}
        DIST_NODE_IMAGES_HASH: ${{ steps.extract-images.outputs.dist-node-images-hash }}
      run: |
        # Use hash of extracted image list to invalidate when images change
        # This covers both go.mod changes AND code changes affecting image extraction
        CACHE_KEY="mirror-cache-${CACHE_VERSION}-${IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "cache-key=$CACHE_KEY" >> "$GITHUB_OUTPUT"
        echo "📦 Cache key: $CACHE_KEY"

        # The KWOK control plane pre-load tar is cached under its own key (keyed on
        # just the KWOK image refs) so it is (re)generated independently of the four
        # mirror volumes.
        KWOK_CACHE_KEY="kwok-controlplane-${CACHE_VERSION}-${KWOK_IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "kwok-cache-key=$KWOK_CACHE_KEY" >> "$GITHUB_OUTPUT"
        echo "📦 KWOK cache key: $KWOK_CACHE_KEY"

        # The distribution node pre-load tars are cached under their own key (keyed
        # on just the k3s/kind/talos image refs) so they are (re)generated
        # independently of the four mirror volumes.
        DIST_NODE_CACHE_KEY="dist-node-${CACHE_VERSION}-${DIST_NODE_IMAGES_HASH}-${RUNNER_OS}-${RUNNER_ARCH}"
        echo "dist-node-cache-key=$DIST_NODE_CACHE_KEY" >> "$GITHUB_OUTPUT"
        echo "📦 Distribution node cache key: $DIST_NODE_CACHE_KEY"

    - name: 📥 Restore mirror cache
      id: restore-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/mirror-cache
        key: ${{ steps.generate-key.outputs.cache-key }}
        restore-keys: |
          mirror-cache-${{ inputs.cache-version }}-

    - name: 📥 Restore KWOK control plane cache
      id: restore-kwok-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/kwok-cache
        # Exact match only (no restore-keys): a KWOK tar from a different tag set is
        # useless — kwokctl's "docker inspect" would miss the new tags and pull live
        # anyway — so a miss must trigger a fresh, correctly-tagged save below.
        key: ${{ steps.generate-key.outputs.kwok-cache-key }}

    - name: 📥 Restore distribution node cache
      id: restore-dist-node-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/dist-node-cache
        # Exact match only (no restore-keys): a dist-node tar from a different tag
        # set is useless — the provisioner pins exact digests, so a stale tar would
        # miss and the node image would be pulled live anyway — so a miss must
        # trigger a fresh, correctly-pinned save below.
        key: ${{ steps.generate-key.outputs.dist-node-cache-key }}

    - name: 🔍 Check if cache is complete
      id: check-cache
      if: steps.restore-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        if [ -d "/tmp/mirror-cache" ] && [ -n "$(ls -A /tmp/mirror-cache 2>/dev/null)" ]; then
          echo "✅ Cache restored, checking completeness..."
          # Check for all 4 mirror volumes (using KSail's naming convention).
          # The KWOK control plane tar is cached under its own key (see the KWOK
          # cache steps), so it is intentionally not part of this completeness check.
          if [ -f "/tmp/mirror-cache/docker.io.tar" ] && \
             [ -f "/tmp/mirror-cache/ghcr.io.tar" ] && \
             [ -f "/tmp/mirror-cache/quay.io.tar" ] && \
             [ -f "/tmp/mirror-cache/registry.k8s.io.tar" ]; then
            echo "complete=true" >> "$GITHUB_OUTPUT"
            echo "✅ Cache complete: 4 mirror volumes present"
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Cache incomplete, will re-warm"
          fi
        else
          echo "complete=false" >> "$GITHUB_OUTPUT"
        fi

    - name: 📥 Pre-pull registry image
      if: steps.check-cache.outputs.complete != 'true'
      uses: ./.github/actions/pull-registry-image

    - name: 🐳 Create mirror registries
      id: create-mirrors
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "🐳 Creating mirror registries for docker.io, ghcr.io, quay.io, and registry.k8s.io..."

        # Create Docker network for mirrors
        docker network create ksail-mirrors 2>/dev/null || true

        # Create docker.io mirror (port 5000)
        docker run -d \
          --name docker.io-mirror \
          --network ksail-mirrors \
          -p 5000:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://registry-1.docker.io \
          -v docker.io:/var/lib/registry \
          registry:3 || echo "docker.io mirror already exists"

        # Create ghcr.io mirror (port 5001)
        docker run -d \
          --name ghcr.io-mirror \
          --network ksail-mirrors \
          -p 5001:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://ghcr.io \
          -v ghcr.io:/var/lib/registry \
          registry:3 || echo "ghcr.io mirror already exists"

        # Create quay.io mirror (port 5002)
        docker run -d \
          --name quay.io-mirror \
          --network ksail-mirrors \
          -p 5002:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://quay.io \
          -v quay.io:/var/lib/registry \
          registry:3 || echo "quay.io mirror already exists"

        # Create registry.k8s.io mirror (port 5003)
        docker run -d \
          --name registry.k8s.io-mirror \
          --network ksail-mirrors \
          -p 5003:5000 \
          -e REGISTRY_PROXY_REMOTEURL=https://registry.k8s.io \
          -v registry.k8s.io:/var/lib/registry \
          registry:3 || echo "registry.k8s.io mirror already exists"

        # Wait for registries to be ready
        sleep 5
        echo "✅ Mirror registries created"

    - name: 📥 Pull images through mirrors
      id: pull-images
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "📥 Pulling images through mirrors..."

        IMAGES_FILE="/tmp/all-images.txt"
        TOTAL=$(wc -l < "$IMAGES_FILE" | tr -d ' ')
        CURRENT=0
        FAILED=0

        while IFS= read -r image; do
          CURRENT=$((CURRENT + 1))

          # Determine which mirror to use based on registry.
          # Images whose first path component contains a dot (.) or colon (:)
          # or equals "localhost" are treated as having an explicit registry
          # host (Docker's own resolution heuristic). Known registries are
          # routed through their respective mirrors; unknown registries are
          # pulled directly. Everything else is Docker Hub. See issue #4301.
          FIRST_COMPONENT="${image%%/*}"
          if [[ "$image" == ghcr.io/* ]]; then
            PULL_REF="${image/ghcr.io\//localhost:5001/}"
          elif [[ "$image" == quay.io/* ]]; then
            PULL_REF="${image/quay.io\//localhost:5002/}"
          elif [[ "$image" == registry.k8s.io/* ]]; then
            PULL_REF="${image/registry.k8s.io\//localhost:5003/}"
          elif [[ "$image" == docker.io/* ]]; then
            PULL_REF="${image/docker.io\//localhost:5000/}"
          elif [[ "$image" == */* ]] && { [[ "$FIRST_COMPONENT" == *"."* ]] || [[ "$FIRST_COMPONENT" == *":"* ]] || [[ "$FIRST_COMPONENT" == "localhost" ]]; }; then
            # Unknown registry (e.g., mcr.microsoft.com, gcr.io) — pull directly
            # Guard: only apply when image contains "/" (host/path split).
            # Single-segment refs like "nginx:latest" have no "/" so the ":"
            # is a tag separator, not a port — those are Docker Hub images.
            echo "[$CURRENT/$TOTAL] Pulling directly: $image"
            docker pull "$image" --quiet 2>/dev/null || {
              echo "  ⚠️ Failed: $image"
              FAILED=$((FAILED + 1))
            }
            continue
          elif [[ "$image" == library/* ]]; then
            PULL_REF="localhost:5000/$image"
          elif [[ "$image" != */* ]]; then
            PULL_REF="localhost:5000/library/$image"
          else
            # Docker Hub org/image without prefix (e.g., rancher/k3s, kindest/node)
            PULL_REF="localhost:5000/$image"
          fi

          echo "[$CURRENT/$TOTAL] Pulling via mirror: $image"

          # Pull through the mirror to populate cache
          # The mirror acts as a pull-through cache
          docker pull "$PULL_REF" --quiet 2>/dev/null || {
            # Fallback to direct pull if mirror fails
            echo "  ⚠️ Mirror failed, trying direct: $image"
            docker pull "$image" --quiet 2>/dev/null || {
              echo "  ⚠️ Failed: $image"
              FAILED=$((FAILED + 1))
            }
          }

        done < "$IMAGES_FILE"

        echo ""
        echo "✅ Pulled $((TOTAL - FAILED))/$TOTAL images successfully"
        if [ "$FAILED" -gt 0 ]; then
          echo "⚠️ $FAILED images failed (may be platform-specific)"
        fi

    - name: 💾 Export mirror volumes
      id: export-volumes
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        echo "💾 Exporting mirror registry volumes..."
        # Pull the tar-utility busybox via mirror.gcr.io (Google's anonymous
        # pull-through cache), not Docker Hub: the runner is logged in to Docker
        # Hub, so a direct pull counts against the authenticated rate limit and
        # leaks the session's dckr_jti token into error logs when throttled.
        # mirror.gcr.io is anonymous and not rate-limited. It re-serializes
        # manifests, so the upstream digest can't be pinned through it — we pin
        # by tag, exactly like registry:3 in pull-registry-image.sh.
        mkdir -p /tmp/mirror-cache

        # Export docker.io mirror volume
        docker run --rm \
          -v docker.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          mirror.gcr.io/library/busybox:1.37 \
          tar -cf /backup/docker.io.tar -C /volume . || echo "⚠️ Failed to export docker.io mirror"

        # Export ghcr.io mirror volume
        docker run --rm \
          -v ghcr.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          mirror.gcr.io/library/busybox:1.37 \
          tar -cf /backup/ghcr.io.tar -C /volume . || echo "⚠️ Failed to export ghcr.io mirror"

        # Export quay.io mirror volume
        docker run --rm \
          -v quay.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          mirror.gcr.io/library/busybox:1.37 \
          tar -cf /backup/quay.io.tar -C /volume . || echo "⚠️ Failed to export quay.io mirror"

        # Export registry.k8s.io mirror volume
        docker run --rm \
          -v registry.k8s.io:/volume:ro \
          -v /tmp/mirror-cache:/backup \
          mirror.gcr.io/library/busybox:1.37 \
          tar -cf /backup/registry.k8s.io.tar -C /volume . || echo "⚠️ Failed to export registry.k8s.io mirror"

        # Show cache size
        if command -v du &> /dev/null; then
          TOTAL_SIZE=$(du -sh /tmp/mirror-cache | cut -f1)
          echo "✅ Mirror cache size: $TOTAL_SIZE"
          ls -lh /tmp/mirror-cache/
        fi

    - name: 🐳 Save KWOK control plane images
      id: save-kwok-images
      # Gated on the KWOK cache (not the mirror-volume cache): regenerate the tar
      # whenever its own cache is missing, regardless of mirror-volume state. This
      # is the targeted re-save path — it never re-pulls or re-exports the four
      # mirror volumes just because the KWOK tar is missing.
      if: steps.restore-kwok-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "🐳 Preparing KWOK control plane images for Docker pre-loading on test runners..."
        mkdir -p /tmp/kwok-cache

        # Ensure each control plane image is present locally under its canonical
        # registry.k8s.io reference so kwokctl's EnsureImage() ("docker inspect
        # <image>" first; skip the pull if found) hits. During a full mirror warm the
        # images were already pulled as localhost:5003/... and only need retagging;
        # on a targeted refresh (mirror cache complete but KWOK cache missing) the
        # mirror is not running, so fall back to a direct pull of just these few
        # images. Either path avoids the parallel KWOK matrix hammering
        # registry.k8s.io. See issue #4058.
        while IFS= read -r image; do
          [ -z "$image" ] && continue
          if docker image inspect "$image" >/dev/null 2>&1; then
            continue
          fi
          mirror_ref="localhost:5003/${image#registry.k8s.io/}"
          if docker image inspect "$mirror_ref" >/dev/null 2>&1; then
            docker tag "$mirror_ref" "$image" && echo "  ✅ Tagged from mirror: $image" && continue
          fi
          echo "  ⬇️ Pulling directly: $image"
          docker pull "$image" --quiet || echo "  ⚠️ Failed to obtain: $image"
        done < <(grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | sed 's/^FROM //')

        # Save all KWOK control plane images as a single tar for docker load on test
        # runners. Non-fatal: if any image is missing, skip the save (and the cache
        # save below) rather than persisting a partial tar — kwokctl pulls the missing
        # images directly at test time, and the next warm run retries the save.
        KWOK_IMAGES=$(grep '^FROM ' pkg/svc/provisioner/cluster/kwok/Dockerfile.controlplane | awk '{print $2}' | tr '\n' ' ')
        # shellcheck disable=SC2086
        if docker save $KWOK_IMAGES -o /tmp/kwok-cache/kwok-control-plane.tar 2>/dev/null; then
          SIZE=$(du -h /tmp/kwok-cache/kwok-control-plane.tar | cut -f1)
          echo "saved=true" >> "$GITHUB_OUTPUT"
          echo "✅ KWOK control plane images saved: $SIZE"
        else
          echo "saved=false" >> "$GITHUB_OUTPUT"
          echo "⚠️ Failed to save KWOK control plane images — they will be pulled by kwokctl at test time"
          rm -f /tmp/kwok-cache/kwok-control-plane.tar
        fi

    - name: 🐳 Save distribution node images
      id: save-distribution-images
      # Gated on the dist-node cache (not the mirror-volume cache): regenerate the
      # tars whenever their own cache is missing, regardless of mirror-volume state.
      # This is the targeted re-save path — it never re-pulls or re-exports the four
      # mirror volumes just because a dist-node tar is missing.
      if: steps.restore-dist-node-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "🐳 Saving distribution node images for Docker pre-loading on test runners..."
        mkdir -p /tmp/dist-node-cache

        # Distribution node images are pulled by the host Docker daemon during
        # cluster creation (K3d, Kind, Talos). They are NOT pulled through
        # containerd mirrors, so the mirror volumes alone do not prevent upstream
        # registry pulls. By docker-saving them here and docker-loading them on
        # test runners, Docker finds them locally and skips the pull entirely.
        # See issue #4301 for context.
        #
        # Two source paths feed the save: during a full mirror warm the images were
        # already pulled as localhost:500x/... and only need retagging; on a targeted
        # refresh (mirror cache complete but dist-node cache missing) the mirror is
        # not running, so fall back to a direct pull of just these few images. Either
        # path avoids the parallel test matrix hammering Docker Hub / GHCR.

        # True when the local image referenced by $1 is recorded under the manifest
        # digest $2 (checked against its RepoDigests). docker save exports by tag, so
        # without this a stale tag-only image pointing at a different digest could be
        # saved under our digest-derived cache key. See issue #4301.
        image_has_digest() {
          local digests
          digests=$(docker image inspect "$1" --format '{{range .RepoDigests}}{{println .}}{{end}}' 2>/dev/null) || return 1
          [[ "$digests" == *"@${2}"* ]]
        }

        save_image() {
          local dockerfile="$1"
          local tar_name="$2"
          local description="$3"
          local IMAGE NORMALIZED TAG_TARGET MIRROR_TAG SIZE from_line PINNED_DIGEST

          # Robust FROM parsing: skip optional --platform=... flags and
          # ignore trailing AS <stage>. Handles both simple and multi-stage
          # Dockerfiles (we only care about the first FROM).
          from_line=$(grep '^FROM ' "$dockerfile" | head -1)
          # shellcheck disable=SC2086
          set -- $from_line
          shift # remove FROM
          while [ $# -gt 0 ] && [[ "$1" == --* ]]; do
            shift
          done
          IMAGE="$1"

          if [ -z "$IMAGE" ]; then
            echo "  ⚠️ No image found in $dockerfile"
            return 1
          fi

          # Normalize the image reference for Docker Hub (add docker.io/ prefix).
          # Detect real registry hosts using Docker's heuristic: first path
          # component contains "." or ":" or equals "localhost".
          local FIRST_COMPONENT="${IMAGE%%/*}"
          if [[ "$IMAGE" == docker.io/* ]]; then
            NORMALIZED="$IMAGE"
          elif [[ "$IMAGE" == */* ]] && { [[ "$FIRST_COMPONENT" == *"."* ]] || [[ "$FIRST_COMPONENT" == *":"* ]] || [[ "$FIRST_COMPONENT" == "localhost" ]]; }; then
            # Image with an explicit registry host (ghcr.io, quay.io, etc.)
            # Guard: only when "/" is present (host/path split); single-segment
            # refs like "nginx:latest" are Docker Hub, not a registry with port.
            NORMALIZED="$IMAGE"
          elif [[ "$IMAGE" == library/* ]]; then
            NORMALIZED="docker.io/$IMAGE"
          elif [[ "$IMAGE" != */* ]]; then
            NORMALIZED="docker.io/library/$IMAGE"
          else
            NORMALIZED="docker.io/$IMAGE"
          fi

          # Strip digest generically (handles any algorithm, not just sha256)
          TAG_TARGET="${NORMALIZED%%@*}"
          # The pinned manifest digest, if any (empty for tag-only refs)
          case "$NORMALIZED" in *@*) PINNED_DIGEST="${NORMALIZED##*@}" ;; *) PINNED_DIGEST="" ;; esac

          # The image was pulled in the "Pull images through mirrors" step.
          # Try to find it either under the mirror ref or the canonical name.
          if ! docker image inspect "$TAG_TARGET" >/dev/null 2>&1; then
            # Retag from mirror ref
            if [[ "$NORMALIZED" == docker.io/* ]]; then
              MIRROR_TAG="${NORMALIZED/docker.io\//localhost:5000/}"
            elif [[ "$NORMALIZED" == ghcr.io/* ]]; then
              MIRROR_TAG="${NORMALIZED/ghcr.io\//localhost:5001/}"
            elif [[ "$NORMALIZED" == quay.io/* ]]; then
              MIRROR_TAG="${NORMALIZED/quay.io\//localhost:5002/}"
            elif [[ "$NORMALIZED" == registry.k8s.io/* ]]; then
              MIRROR_TAG="${NORMALIZED/registry.k8s.io\//localhost:5003/}"
            else
              MIRROR_TAG=""
            fi
            MIRROR_TAG="${MIRROR_TAG%%@*}"
            if [ -n "$MIRROR_TAG" ]; then
              docker tag "$MIRROR_TAG" "$TAG_TARGET" 2>/dev/null || true
            fi
          fi

          # Direct-pull fallback for the self-heal / targeted-refresh path: when the
          # four mirror volumes are already cached the mirror registries were never
          # created this run, so neither the canonical tag nor the localhost mirror
          # ref exists locally. Pull the exact digest-pinned reference from upstream.
          #
          # For a digest-pinned ref, base the presence check on whether a LOCAL image
          # actually carries the pinned digest — not merely whether the tag-only
          # $TAG_TARGET exists. A stale tag-only image could point at a different
          # digest, and saving that would persist the wrong image under a cache key
          # derived from the pinned digest. After pulling, (re)tag the exact digest
          # ref to $TAG_TARGET: docker pull of a tag+digest ref fetches by digest
          # without creating the tag-only ref, and this also overwrites a stale tag.
          if [ -n "$PINNED_DIGEST" ]; then
            if ! image_has_digest "$TAG_TARGET" "$PINNED_DIGEST"; then
              echo "  ⬇️ Pulling directly: $NORMALIZED"
              docker pull "$NORMALIZED" --quiet 2>/dev/null || true
              docker tag "$NORMALIZED" "$TAG_TARGET" 2>/dev/null || true
            fi
          elif ! docker image inspect "$TAG_TARGET" >/dev/null 2>&1; then
            echo "  ⬇️ Pulling directly: $NORMALIZED"
            docker pull "$NORMALIZED" --quiet 2>/dev/null || true
          fi

          # Final correctness gate: for a digest-pinned ref, only proceed if
          # $TAG_TARGET now resolves to the pinned digest (a failed pull may leave a
          # stale image behind — never save that). Returning 1 leaves the dist-node
          # cache unsaved so the next warm run retries.
          if [ -n "$PINNED_DIGEST" ]; then
            if ! image_has_digest "$TAG_TARGET" "$PINNED_DIGEST"; then
              echo "  ⚠️ $description image not available at pinned digest: $NORMALIZED"
              return 1
            fi
          elif ! docker image inspect "$TAG_TARGET" >/dev/null 2>&1; then
            echo "  ⚠️ $description image not available locally: $TAG_TARGET"
            return 1
          fi

          if docker save "$TAG_TARGET" -o "/tmp/dist-node-cache/${tar_name}.tar" 2>/dev/null; then
            SIZE=$(du -h "/tmp/dist-node-cache/${tar_name}.tar" | cut -f1)
            echo "  ✅ $description image saved: $TAG_TARGET ($SIZE)"
          else
            echo "  ⚠️ Failed to save $description image — provisioner will pull at test time"
            rm -f "/tmp/dist-node-cache/${tar_name}.tar"
            return 1
          fi

          # Verify the full digest-pinned reference resolves locally.
          # docker save only exports by tag; on the restore side, docker load
          # restores tags but NOT repo digest mappings. The restore step will
          # need to re-pull exact digest refs to register them with Docker.
          if [[ "$NORMALIZED" == *"@"* ]]; then
            if docker image inspect "$NORMALIZED" >/dev/null 2>&1; then
              echo "  ✅ Full digest reference verified: $NORMALIZED"
            else
              echo "  ℹ️ Digest ref not resolvable by tag-only tar (expected)."
              echo "     Restore step will re-pull to register the digest mapping."
            fi
          fi

          return 0
        }

        # Save all three tars, counting successes. The dist-node cache is only saved
        # (below) when ALL three were produced — a cache entry is immutable once
        # written, so persisting a partial set would defeat the self-heal: the
        # missing tar could never be repaired under this key. A count short of three
        # leaves the key absent so the next warm run retries from scratch.
        SAVED_COUNT=0
        save_image "pkg/fsutil/configmanager/k3d/Dockerfile"   "k3s-node"   "K3s"   && SAVED_COUNT=$((SAVED_COUNT + 1))
        save_image "pkg/fsutil/configmanager/kind/Dockerfile"  "kind-node"  "Kind"  && SAVED_COUNT=$((SAVED_COUNT + 1))
        save_image "pkg/fsutil/configmanager/talos/Dockerfile" "talos-node" "Talos" && SAVED_COUNT=$((SAVED_COUNT + 1))

        if [ "$SAVED_COUNT" -eq 3 ]; then
          echo "saved=true" >> "$GITHUB_OUTPUT"
          echo "✅ All 3 distribution node tars produced; dist-node cache will be saved"
        else
          echo "saved=false" >> "$GITHUB_OUTPUT"
          echo "⚠️ Only ${SAVED_COUNT}/3 distribution node tars produced; skipping dist-node cache save so the next warm run retries"
        fi

    - name: 🔍 Verify all mirror volumes exported
      id: verify-exports
      if: steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        # Verify all 4 required mirror volumes were exported (see issue #2075)
        echo "🔍 Verifying exported mirror volumes..."
        REQUIRED_VOLUMES=("docker.io" "ghcr.io" "quay.io" "registry.k8s.io")
        MISSING_VOLUMES=()

        for vol in "${REQUIRED_VOLUMES[@]}"; do
          TAR_FILE="/tmp/mirror-cache/${vol}.tar"
          if [ -f "$TAR_FILE" ]; then
            SIZE=$(du -h "$TAR_FILE" | cut -f1)
            echo "  ✅ ${vol}.tar ($SIZE)"
          else
            echo "  ❌ ${vol}.tar - MISSING"
            MISSING_VOLUMES+=("$vol")
          fi
        done

        if [ ${#MISSING_VOLUMES[@]} -gt 0 ]; then
          echo "⚠️ Warning: ${#MISSING_VOLUMES[@]} mirror volumes failed to export: ${MISSING_VOLUMES[*]}"
          echo "   System tests will fall back to direct registry pulls for these registries."
          echo "   This may cause slower tests and potential rate limiting."
          echo "   See issue #2075 for context."
        else
          echo "✅ All 4 required mirror cache volumes exported successfully"
        fi

    - name: 🧹 Cleanup containers
      if: always() && steps.check-cache.outputs.complete != 'true'
      shell: bash
      run: |
        docker rm -f docker.io-mirror ghcr.io-mirror quay.io-mirror registry.k8s.io-mirror 2>/dev/null || true
        docker network rm ksail-mirrors 2>/dev/null || true

    - name: 💾 Save mirror cache
      if: steps.check-cache.outputs.complete != 'true'
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/mirror-cache
        key: ${{ steps.generate-key.outputs.cache-key }}

    - name: 💾 Save KWOK control plane cache
      # Only save when the tar was actually produced (saved == 'true'). A cache
      # entry is immutable once written, so persisting a partial/empty tar here
      # would defeat the self-heal: skipping the save leaves the key absent and the
      # next warm run retries it.
      if: steps.restore-kwok-cache.outputs.cache-hit != 'true' && steps.save-kwok-images.outputs.saved == 'true'
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/kwok-cache
        key: ${{ steps.generate-key.outputs.kwok-cache-key }}

    - name: 💾 Save distribution node cache
      # Only save when all three tars were produced (saved == 'true'). A cache entry
      # is immutable once written, so persisting a partial set here would defeat the
      # self-heal — the missing tar could never be repaired under this key. Skipping
      # leaves the key absent so the next warm run retries the save.
      if: steps.restore-dist-node-cache.outputs.cache-hit != 'true' && steps.save-distribution-images.outputs.saved == 'true'
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/dist-node-cache
        key: ${{ steps.generate-key.outputs.dist-node-cache-key }}

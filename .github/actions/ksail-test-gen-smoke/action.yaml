name: KSail Gen & Smoke Test
description: |
  Runs workload gen subcommands, validates generated manifests, and
  smoke-tests chat/mcp --help.  Does not require a running cluster
  (clusterrole/role gen are tested separately in the system-test
  orchestrator where a cluster is available).

runs:
  using: composite
  steps:
    - name: 🧪 workload gen — generate and validate manifests
      shell: bash
      run: |
        FAILED=0
        GEN_DIR=$(mktemp -d)

        echo "=== Testing workload gen subcommands ==="

        run_gen_test() {
          local name="$1"
          shift
          local OUTPUT_FILE="$GEN_DIR/${name}.yaml"
          local VALIDATE_FLAGS=""
          # Secrets are skipped by default in validate; override for secret tests
          if [ "$name" = "secret" ]; then
            VALIDATE_FLAGS="--skip-secrets=false"
          fi
          echo "--- gen $name ---"
          if "$@" > "$OUTPUT_FILE"; then
            echo "  ✅ gen $name succeeded"
            if ksail workload validate $VALIDATE_FLAGS "$OUTPUT_FILE"; then
              echo "  ✅ validate $name succeeded"
            else
              echo "  ❌ validate $name FAILED"
              cat "$OUTPUT_FILE"
              FAILED=$((FAILED + 1))
            fi
          else
            echo "  ❌ gen $name FAILED"
            cat "$OUTPUT_FILE" 2>/dev/null || true
            FAILED=$((FAILED + 1))
          fi
        }

        run_gen_test deployment ksail workload gen deployment test-deploy --image nginx:1.27
        run_gen_test service ksail workload gen service clusterip test-svc --tcp=80:80
        run_gen_test configmap ksail workload gen configmap test-cm --from-literal=key=value
        run_gen_test secret ksail workload gen secret generic test-secret --from-literal=password=test123
        run_gen_test namespace ksail workload gen namespace test-ns
        run_gen_test job ksail workload gen job test-job --image=busybox:1.37
        run_gen_test cronjob ksail workload gen cronjob test-cron --image=busybox:1.37 --schedule="*/5 * * * *"
        run_gen_test serviceaccount ksail workload gen serviceaccount test-sa
        # clusterrole and role require API server for resource group discovery (--resource flag),
        # even with --dry-run=client. Tested in system tests where a cluster is available.
        run_gen_test clusterrolebinding ksail workload gen clusterrolebinding test-crb --clusterrole=test-cr --serviceaccount=default:test-sa
        run_gen_test rolebinding ksail workload gen rolebinding test-rb --role=test-role --serviceaccount=default:test-sa
        run_gen_test ingress ksail workload gen ingress test-ing --rule="host/path=svc:80"
        run_gen_test quota ksail workload gen quota test-quota --hard=cpu=1,memory=1Gi
        run_gen_test priorityclass ksail workload gen priorityclass test-pc --value=1000
        run_gen_test poddisruptionbudget ksail workload gen poddisruptionbudget test-pdb --min-available=1 --selector=app=test
        run_gen_test helmrelease ksail workload gen helmrelease test-hr --source=HelmRepository/test --chart=test --export

        rm -rf "$GEN_DIR"

        if [ "$FAILED" -gt 0 ]; then
          echo "❌ $FAILED gen/validate tests failed"
          exit 1
        fi
        echo "✅ All workload gen tests passed"

    # NOTE: cipher encrypt/decrypt E2E test is not feasible here because
    # ksail cipher encrypt uses hardcoded empty KeyGroups (no .sops.yaml
    # config loading). A code change to support key configuration is needed
    # before cipher can be E2E tested. Cipher commands are covered by unit
    # tests and benchmarks in pkg/cli/cmd/cipher/.

    - name: 🧪 smoke test — chat and mcp commands
      shell: bash
      run: |
        echo "=== Testing chat --help ==="
        ksail chat --help
        echo "✅ chat --help passed"

        echo "=== Testing mcp --help ==="
        ksail mcp --help
        echo "✅ mcp --help passed"

---
name: CD
on:
  push:
    tags:
      - "v*"

env:
  # Use pipe (|) instead of comma (,) so Go falls through to direct on ANY proxy
  # error (including 403), not just 404/410. Hardens CI against transient
  # proxy.golang.org outages. go.sum still verifies module integrity.
  GOPROXY: "https://proxy.golang.org|direct"
  # Soft memory limit for Go build toolchain. GoReleaser links multiple
  # platform binaries and the linker can exceed runner memory.
  GOMEMLIMIT: "6GiB"

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # A reused evergreen cask PR can still be ready-for-review (auto-merge armed by the tap) from a
  # previous release that never merged. Demote it to draft BEFORE GoReleaser rewrites its branch —
  # otherwise the tap could auto-merge freshly rewritten, not-yet-validated cask content while this
  # release's assets are still a draft. Fail-closed: nothing is published yet, so aborting here is
  # safe and the release run is simply re-run after the wedge is cleared.
  cask-checkpoint:
    name: 🍺 Re-arm cask PR draft checkpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🍺 Re-draft reused evergreen cask PRs
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: .github/scripts/redraft-evergreen-cask-prs.sh --tap devantler-tech/homebrew-tap ksail ksail-desktop

  goreleaser:
    name: 🧩 Release CLI
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [cask-checkpoint]
    permissions:
      contents: write
      packages: write
      id-token: write # OIDC token for keyless cosign image signing (docker_signs)
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # GoReleaser cross-compiles every OS/arch and builds+signs the images in one job. That outgrew the
      # runner's root filesystem: v7.169.3 died 32 minutes in with `mkdir /tmp/go-build…: no space left
      # on device`, which surfaces as a compiler error and silently dropped the release (#6137).
      # So: reclaim more of the preinstalled toolchains, keep Go's scratch off the root filesystem, and
      # PRINT the headroom — a disk failure must never again look like a build failure.
      - name: 🧹 Cleanup node
        run: |
          set -euo pipefail
          echo "::group::Disk before cleanup"
          df -h / /mnt 2>/dev/null || df -h /
          echo "::endgroup::"

          # Do NOT add /usr/local/lib/node_modules here: that directory *is* npm, and GoReleaser's
          # `before` hook runs scripts/stage-webui.sh, which builds the web UI with `npm ci`. This job
          # has no setup-node step, so removing it would break the release at the hook — the very
          # failure this change exists to prevent.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/swift \
            /usr/local/share/boost \
            /usr/local/share/powershell
          sudo docker image prune --all --force
          sudo docker builder prune -a

          echo "::group::Disk after cleanup"
          df -h / /mnt 2>/dev/null || df -h /
          echo "::endgroup::"

      # Go's build scratch and cache are the bulk of the release build's disk usage and default to the
      # root filesystem. Move them to whichever volume actually has the most room — verified at runtime
      # rather than assumed, so this stays correct if the runner image changes.
      - name: 💽 Put Go build scratch on the roomiest volume
        run: |
          set -euo pipefail
          root_free=$(df -Pk / | awk 'NR==2 {print $4}')
          scratch_root=""
          if mountpoint -q /mnt; then
            mnt_free=$(df -Pk /mnt | awk 'NR==2 {print $4}')
            if [ "$mnt_free" -gt "$root_free" ]; then
              scratch_root=/mnt
            fi
          fi

          if [ -z "$scratch_root" ]; then
            echo "Root filesystem has the most free space; leaving Go scratch at its default."
            exit 0
          fi

          sudo mkdir -p "$scratch_root/go-tmp" "$scratch_root/go-cache"
          sudo chown -R "$(id -u):$(id -g)" "$scratch_root/go-tmp" "$scratch_root/go-cache"
          {
            echo "GOTMPDIR=$scratch_root/go-tmp"
            echo "GOCACHE=$scratch_root/go-cache"
          } >>"$GITHUB_ENV"
          echo "Go build scratch and cache moved to $scratch_root ($(df -h "$scratch_root" | awk 'NR==2 {print $4}') free)."

      - name: ⚙️ Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Disable module cache restoration in release workflows to avoid
          # cache-poisoning risk for runtime artifacts (see https://docs.zizmor.sh/audits/#cache-poisoning)
          cache: false

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 🔐 Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔏 Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: 🏗️ Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  # The web UI is embedded into the binary (go:embed via pkg/webui, staged by the GoReleaser
  # before-hook) and served by the operator and `ksail open web`/`ksail open desktop` themselves — no separate UI image.

  vscode-extension:
    name: 🧩 Release VSCode Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: vsce
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Compile
        run: npm run compile

      - name: 📦 Package extension
        run: npm run package

      - name: 📤 Publish to VS Code Marketplace
        run: npx @vscode/vsce publish "$VERSION"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VERSION: ${{ steps.get_version.outputs.version }}
        continue-on-error: true

      # - name: 📤 Publish to Open VSX Registry
      #   run: npx ovsx publish --pat ${{ secrets.OVSX_PAT }}
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   continue-on-error: true

      - name: 📦 Create VSIX package
        run: npx @vscode/vsce package "$VERSION" --out ksail_"$VERSION".vsix
        env:
          VERSION: ${{ steps.get_version.outputs.version }}

      - name: 📤 Upload VSIX artifact
        # Action inputs are workspace-relative — the job's `working-directory: vsce` default applies
        # only to `run` steps — so the vsix lives under vsce/. publish-release attaches it to the draft.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-vscode
          path: vsce/ksail_*.vsix
          if-no-files-found: error

  # The macOS desktop app ships as a Homebrew cask. The desktop app is a separate Go module that
  # links a system webview via CGO and cannot be cross-compiled in the main release, so this job runs
  # a second GoReleaser config on a macOS runner: it builds the darwin binary, packages it as a
  # KSail.app bundle and opens a *draft* cask PR on the homebrew tap (the `homebrew` job style-cleans,
  # validates, and marks it ready for the tap's check-gated auto-merge — a trusted programmed release
  # path, no review/promotion step per maintainer direction ksail#6095). GoReleaser's release pipe is disabled (see .goreleaser.desktop.yaml); the built
  # archive is emitted as a workflow artifact and attached to the draft by `publish-release`. No
  # `needs: [goreleaser]` — this builds in parallel with the CLI release (both gate only on the
  # seconds-long cask-checkpoint job so neither can rewrite a still-promoted evergreen cask PR).
  desktop-macos:
    name: 🧩 Release Desktop App (macOS cask)
    runs-on: macos-latest
    timeout-minutes: 40
    needs: [cask-checkpoint]
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      - name: 🏗️ Run GoReleaser (desktop cask)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.desktop.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

      # GoReleaser's release pipe is disabled (.goreleaser.desktop.yaml). Emit the macOS archive as a
      # workflow artifact; `publish-release` attaches it to the draft before publishing, so every asset
      # is present before the release is locked by immutable releases (see #4874).
      - name: 📤 Upload desktop archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-desktop-macos
          path: dist-desktop/KSail_*_darwin_*.zip
          if-no-files-found: error

  # Linux and Windows desktop binaries are convenience downloads (no cask). They build on native
  # runners (CGO + the system webview) in parallel with the CLI release and emit their archives as
  # workflow artifacts; `publish-release` attaches them to the draft before publishing, so every asset
  # is present before the release is locked by immutable releases (see #4874).
  desktop:
    name: 🧩 Release Desktop App
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Wails v3's default Linux build targets GTK4 + WebKitGTK 6.0 (libgtk-4-dev +
          # libwebkitgtk-6.0-dev), available on ubuntu-24.04 (22.04 only ships legacy webkit2gtk).
          - { os: ubuntu-24.04, goos: linux, arch: amd64, ext: "" }
          - { os: windows-latest, goos: windows, arch: amd64, ext: ".exe" }
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🛠️ Setup desktop build (Go, Node.js, webview deps, staged web UI)
        uses: ./.github/actions/setup-desktop-build

      - name: 🏷️ Extract version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 🏗️ Build desktop app
        shell: bash
        run: cd desktop && go build -ldflags "-s -w" -o "ksail-desktop${{ matrix.ext }}" .

      # Package so the artifact extracts to the name the `ksail open desktop` launcher looks for: a
      # ksail-desktop binary the user puts on their PATH. Naming mirrors the main GoReleaser archives.
      - name: 📦 Package desktop app
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          ARCH: ${{ matrix.arch }}
        run: |
          case "$GOOS" in
            linux)
              artifact="ksail-desktop_${VERSION}_linux_${ARCH}.tar.gz"
              tar -C desktop -czf "$artifact" ksail-desktop
              ;;
            windows)
              artifact="ksail-desktop_${VERSION}_windows_${ARCH}.zip"
              7z a "$artifact" "./desktop/ksail-desktop.exe"
              ;;
          esac
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload desktop archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-desktop-${{ matrix.goos }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

  copilot-plugin:
    name: 🧩 Release Copilot CLI Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs in parallel with the other releases — it only opens an auto-merging version-bump
    # PR and consumes no GoReleaser artifact, so it does not wait on `goreleaser`. The gated
    # `publish-release` and `pages-deploy` jobs both list it in `needs`, so a failure here
    # still blocks the GitHub release publish and the docs deploy.
    environment: ci
    permissions:
      contents: write
    steps:
      - name: 🔑 Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📑 Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: true

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Instead of pushing directly to main (which is blocked by the required
      # "✅ Validate Go Project" workflow rule), open a PR so CI can run on the
      # version bump commit and auto-merge once checks pass.
      - name: 📤 Create version bump PR
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail

          bump() {
            local file="$1" filter="$2"
            jq --arg v "$VERSION" "$filter" "$file" > "$file.tmp"
            mv "$file.tmp" "$file"
          }

          git config user.name "devantler-tech-bot[bot]"
          git config user.email "devantler-tech-bot[bot]@users.noreply.github.com"

          # Skip if the repo already carries an equal-or-newer version to
          # prevent a slow-merging older-tag PR from downgrading the plugin.
          CURRENT_VERSION="$(jq -r '.version' copilot-plugin/plugin.json)"
          HIGHEST="$(printf '%s\n%s\n' "$CURRENT_VERSION" "$VERSION" | sort -V | tail -1)"
          if [ "$HIGHEST" != "$VERSION" ]; then
            echo "Skipping: repo is already at v${CURRENT_VERSION}, which is newer than target v${VERSION}"
            exit 0
          fi

          bump copilot-plugin/plugin.json ".version = \$v"
          bump copilot-plugin/.claude-plugin/plugin.json ".version = \$v"
          bump .github/plugin/marketplace.json ".metadata.version = \$v | .plugins[0].version = \$v"
          bump .claude-plugin/marketplace.json ".metadata.version = \$v | .plugins[0].version = \$v"

          if git diff --quiet; then
            echo "No version change to commit"
            exit 0
          fi

          BRANCH="chore/copilot-plugin-v${VERSION}"

          git checkout -b "${BRANCH}"
          git add copilot-plugin/plugin.json copilot-plugin/.claude-plugin/plugin.json \
            .github/plugin/marketplace.json .claude-plugin/marketplace.json
          git commit -m "chore(copilot-plugin): release v${VERSION}"
          # Fetch the remote branch only when it exists (i.e. a prior job
          # attempt already pushed it) so --force-with-lease has up-to-date
          # tracking info on re-runs.  git ls-remote exits 2 when no matching
          # ref is found, so auth/network failures still surface immediately
          # via stderr instead of being silently swallowed.
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null; then
            git fetch origin "${BRANCH}"
          fi
          git push --force-with-lease origin "${BRANCH}"

          # Create PR if one doesn't already exist for this branch.
          EXISTING_PR="$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING_PR}" ]; then
            echo "PR #${EXISTING_PR} already exists for ${BRANCH}"
          else
            gh pr create \
              --base "${DEFAULT_BRANCH}" \
              --head "${BRANCH}" \
              --title "chore(copilot-plugin): release v${VERSION}" \
              --body "Automated version bump for copilot plugin manifests to v${VERSION}."
          fi

          # Ensure auto-merge is enabled at the repository level (idempotent).
          if ! gh api "repos/{owner}/{repo}" --method PATCH -f allow_auto_merge=true --silent; then
            echo "::warning::Could not enable auto-merge at the repository level (token may lack administration permissions)."
          fi

          if ! gh pr merge "${BRANCH}" --auto --squash; then
            echo "::warning::Auto-merge could not be enabled; the PR must be merged manually or auto-merge must be enabled in repository settings."
          fi

  operator-chart:
    name: ⛵ Release Operator Chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate on `goreleaser` (image build + cosign sign + push). The chart's appVersion is the
    # release version and operator.image.tag defaults to it, so the chart references
    # ghcr.io/devantler-tech/ksail:v<version>. Publishing the chart before that image exists
    # produces an orphan chart pointing at a missing image: on the failed v7.74.1 run the
    # `goreleaser` job failed (no image built/signed) but this job had already pushed
    # ksail-operator:7.74.1, which downstream cosign image-verification then rejects with
    # MANIFEST_UNKNOWN. `needs: goreleaser` keeps the chart and image release atomic — a failed
    # or incomplete image build skips the chart publish instead of orphaning it. The gated
    # `publish-release` and `pages-deploy` jobs both list this job in `needs`, so a chart
    # publish failure still blocks the GitHub release publish and the docs deploy.
    needs: [goreleaser]
    permissions:
      contents: read # checkout
      packages: write # push the chart to GHCR as an OCI artifact
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 🔐 Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # helm is pre-installed on ubuntu-latest runners (CI's operator-chart-lint relies on this too).
      # Pin the chart version AND appVersion to the release version so the published chart pulls the
      # matching operator image (operator.image.tag defaults to .Chart.AppVersion); helm bundles crds/
      # automatically. The chart lands at ghcr.io/devantler-tech/charts/ksail-operator:<version>.
      - name: 📦 Package and push operator chart
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          helm package charts/ksail-operator --version "$VERSION" --app-version "$VERSION"
          helm push "ksail-operator-${VERSION}.tgz" oci://ghcr.io/devantler-tech/charts

  mcp-publish:
    name: 📤 Publish to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Needs `goreleaser` for the published GHCR image that server.json points at, but runs in
    # parallel with `publish-release` and `pages-deploy` — neither lists it in `needs`. The MCP
    # registry publish references the container image (pushed by `goreleaser`), not the GitHub
    # release, so it is independent of the draft→published flip and need not gate it.
    needs: [goreleaser]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: 📝 Update server.json version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          IMAGE_TAG: ${{ steps.get_version.outputs.image_tag }}
        run: |
          jq --arg v "$VERSION" \
             --arg tag "$IMAGE_TAG" \
             '.version = $v | .packages[0].identifier = "ghcr.io/devantler-tech/ksail:" + $tag' \
             server.json > server.json.tmp && mv server.json.tmp server.json

      - name: 📥 Install mcp-publisher
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.8/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.8/registry_1.7.8_checksums.txt"
          grep "mcp-publisher_linux_amd64.tar.gz$" registry_1.7.8_checksums.txt | sha256sum --check
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          rm mcp-publisher_linux_amd64.tar.gz registry_1.7.8_checksums.txt

      - name: 🔐 Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: 📤 Publish to MCP Registry
        run: |
          set -euo pipefail
          max_attempts=3
          delay=15
          last_output=""
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Publish attempt ${attempt}/${max_attempts}..."
            if last_output="$(./mcp-publisher publish 2>&1)"; then
              echo "$last_output"
              exit 0
            fi
            echo "$last_output"
            # Only retry on 5xx (server) errors — bail immediately on anything else
            if echo "$last_output" | grep -Eq 'status 5[0-9]{2}'; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Server error; retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
                continue
              fi
            else
              break
            fi
          done
          echo "::error::mcp-publisher publish failed after ${attempt} attempt(s)"
          exit 1

  pages-build:
    name: 📄 Build Pages
    runs-on: ubuntu-latest
    # Runs in parallel with the other releases (no GoReleaser artifact dependency). The
    # gated `pages-deploy` and `publish-release` jobs both list it in `needs`, so a docs
    # build failure blocks both the Pages deploy and the GitHub release publish.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: ⚙️ Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: 📦 Install dependencies
        working-directory: docs
        run: npm ci

      - name: 🏗️ Build with Astro
        working-directory: docs
        run: npm run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  pages-deploy:
    name: 🚀 Deploy Pages
    runs-on: ubuntu-latest
    # Gate the docs deploy on the artifact-producing releases (not just `pages-build`) so a
    # partial release failure never pushes a fresh docs site. Runs in parallel with
    # `publish-release` and `mcp-publish` — none depends on the others. `mcp-publish` is
    # excluded from `needs` because the MCP registry publish is independent of the docs site.
    needs:
      [
        goreleaser,
        vscode-extension,
        desktop-macos,
        desktop,
        copilot-plugin,
        operator-chart,
        pages-build,
      ]
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish-release:
    name: 📢 Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gate on EVERY artifact-producing asset job so the draft is flipped to published only when the
    # release is COMPLETE (CLI tarballs + checksums + CRD, VSIX, and every desktop archive present).
    # Immutable releases (see #4874) forbid adding assets after the flip, so completeness must be
    # guaranteed before it. This is the maintainer's required invariant: a published release is always
    # complete (#5061). The inverse failure — an asset job failing and leaving an unpublished draft —
    # is prevented up front by the `Release` workflow, which validates every artifact BEFORE the tag is
    # created, and backstopped by `cleanup-failed-release` below, which deletes the orphaned draft and
    # tag if a publish is ever blocked so no empty/incomplete tag flows downstream (#5060).
    # Runs in parallel with `pages-deploy` and `mcp-publish`.
    needs:
      [
        goreleaser,
        vscode-extension,
        copilot-plugin,
        desktop-macos,
        desktop,
        operator-chart,
        pages-build,
      ]
    permissions:
      contents: write
    steps:
      - name: 🏷️ Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 📥 Download release asset artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: dist-assets

      # Attach the desktop archives and the VSIX to the draft BEFORE publishing. Once published the
      # release is immutable and late uploads 422 (see #4874); all asset jobs gate this one, so every
      # artifact exists here and is attached immediately before the draft→published flip below.
      - name: 📤 Attach assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
        run: gh release upload "$RELEASE_TAG" dist-assets/* --clobber

      - name: 📢 Publish draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;

            // List releases and find the one(s) matching the tag
            // Note: getReleaseByTag does not return draft releases, so we use listReleases instead
            let matching;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              matching = releases.filter(r => r.tag_name === tag);
            } catch (error) {
              core.setFailed(`Failed to list releases: ${error.message}`);
              throw error;
            }

            if (matching.length === 0) {
              core.setFailed(`Release not found for tag ${tag}`);
              return;
            }

            // More than one release for a tag means an asset job created a duplicate (e.g. a second
            // GoReleaser run that couldn't see the draft) — see #4874. Bail before publishing rather
            // than racing an immutable release into existence; the duplicate needs manual cleanup.
            if (matching.length > 1) {
              const ids = matching.map(r => `${r.id} (draft=${r.draft})`).join(', ');
              core.setFailed(`Found ${matching.length} releases for tag ${tag}: ${ids}. Expected exactly one — manual cleanup required.`);
              return;
            }

            const release = matching[0];

            if (!release.draft) {
              console.log(`Release ${tag} is already published`);
              return;
            }

            // Publish the release
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });

            console.log(`Successfully published release ${tag}`);

  # GoReleaser opens the Homebrew cask PRs during the build (CLI in `goreleaser`, macOS in
  # `desktop-macos`) as DRAFTS, so the tap cannot merge them while the cask still points at a draft
  # (not-yet-public, 404) release. Now that `publish-release` has made the release public, this job
  # style-cleans and normalizes both PRs, then leaves them as drafts for the maintainer checkpoint.
  #
  # Promotion and merge are intentionally outside this privileged release job. Review threads,
  # reviewer verdicts, and editable pre-merge summaries cannot be atomically bound to a client-side
  # `gh pr merge` call, so even a final poll can race a new negative review without changing the head
  # SHA. The standard maintainer lane promotes and merges only after its live pentad is green. This job
  # validates the trusted same-repository draft and exact cask-only scope before and after its style
  # mutation, normalizes metadata, and records the pending handoff without failing an already-published
  # release. Branches mirror `.goreleaser*.yaml` (`goreleaser/<project>` — evergreen, version-less:
  # each release updates the ONE open cask PR in place instead of superseding it, tap#1172). See #6067.
  homebrew:
    name: 🍺 Prepare Homebrew cask PRs
    runs-on: ubuntu-latest
    # `brew style` can bootstrap rubocop on a cold Linuxbrew runner. Keep enough room for two clones
    # and style passes; every GitHub mutation below is fail-soft because the release is already public.
    timeout-minutes: 20
    needs: [publish-release]
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🍺 Style-clean and prepare cask PR handoffs
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          TAP: devantler-tech/homebrew-tap
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          collect_handoff_evidence() {
            .github/scripts/collect-cask-pr-handoff.sh \
              --tap "$TAP" \
              --pr "$1" \
              --source-repo "$GITHUB_REPOSITORY" \
              --tag "$TAG" \
              --output "$2"
          }

          validate_handoff() {
            local pr="$1" name="$2" evidence="$3" mode="${4:-draft}"
            local args=(
              --evidence "$evidence"
              --tap "$TAP"
              --cask-name "$name"
              --tag "$TAG"
            )
            if [ "$mode" = prepared ]; then
              args+=(--prepared)
            fi
            collect_handoff_evidence "$pr" "$evidence" \
              && .github/scripts/validate-cask-pr-handoff.sh "${args[@]}"
          }

          if ! evidence_dir="$(mktemp -d)"; then
            echo "::warning::Could not create cask handoff evidence directory; leaving generated PRs untouched"
            exit 0
          fi
          trap 'rm -rf "$evidence_dir"' EXIT

          for name in ksail ksail-desktop; do
            branch="goreleaser/${name}"
            # `|| true` keeps the job fail-soft: a transient API failure (5xx, rate limit,
            # network blip) must not abort the step under `set -e` after the release is already public —
            # invalid evidence below then warns and skips, same as the no-PR-found case.
            # REST `head=<owner>:<branch>` filters SERVER-side (a bare branch-name filter would let
            # same-name fork branches fill a client-side page before any jq filter runs); the owner
            # qualifier still admits a same-owner sibling repo's branch, so keep the full_name +
            # author checks.
            matches="$(gh api \
              "repos/$TAP/pulls?state=open&head=${TAP%%/*}:${branch}&per_page=100" 2>/dev/null \
              | jq -ec --arg full "$TAP" \
                  '[.[] | select(.head.repo.full_name == $full and .user.login == "devantler")]' \
              2>/dev/null || true)"
            if ! count="$(jq -er 'length' <<<"$matches" 2>/dev/null)"; then
              echo "::warning::Could not enumerate cask PRs on $TAP for branch ${branch}; leaving it pending"
              continue
            fi
            if [ "$count" -ne 1 ]; then
              echo "::warning::Expected exactly one open tap-owned cask PR on $TAP for branch ${branch}, found ${count}; leaving it pending"
              continue
            fi
            pr="$(jq -r '.[0].number' <<<"$matches")"

            # The cask-checkpoint job re-drafted any reused promoted PR before GoReleaser rewrote
            # the branch, so a non-draft here means someone raced this run — validation below
            # requires draft state and fails soft, leaving the PR untouched.
            evidence="${evidence_dir}/${pr}.json"
            if ! validation="$(validate_handoff "$pr" "$name" "$evidence" 2>&1)"; then
              validation="${validation//$'\n'/; }"
              echo "::warning::Refusing to mutate ${TAP}#${pr}: ${validation}"
              printf -- '- %s#%s left untouched: %s\n' "$TAP" "$pr" "$validation" >>"$GITHUB_STEP_SUMMARY"
              continue
            fi
            echo "Preparing ${TAP}#${pr} (${branch})"

            # GoReleaser's cask template emits a few `brew style` offenses no config knob can reach
            # (Layout/ArgumentAlignment on url/verified, Cask/StanzaOrder for the custom_block stanzas).
            # Autocorrect them on the draft PR branch before handoff so the eventual cask is
            # brew-style-clean — letting the tap enforce a `brew style` gate (devantler-tech/homebrew-tap#734).
            # Fail-soft throughout: a style/clone/push hiccup must never block the published release;
            # the draft remains open for the maintainer lane to correct.
            # `mktemp -d` under `set -e` would abort the job on a tempdir failure; guard it so a
            # hiccup just skips the (best-effort) autocorrect and continues to the draft handoff.
            if work="$(mktemp -d)"; then
              if git clone --depth 1 --branch "$branch" \
                  "https://x-access-token:${GH_TOKEN}@github.com/${TAP}.git" "$work" 2>/dev/null; then
                # `brew style --fix` can apply partial autocorrections yet still exit non-zero when
                # offenses remain. Run it fail-soft and commit whatever diff it produced regardless of
                # exit status, so partial cleanups are never discarded (and a failure never blocks the
                # release).
                brew style --fix "$work/Casks/${name}.rb" \
                  || echo "::warning::brew style --fix exited non-zero for ${name}; committing any partial autocorrections"
                if git -C "$work" diff --quiet; then
                  echo "${name} cask already brew-style-clean; nothing to autocorrect"
                else
                  git -C "$work" \
                      -c user.name='github-actions[bot]' \
                      -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                      commit -am 'style: brew style --fix generated cask' \
                    && git -C "$work" push \
                    && echo "Pushed brew style --fix autocorrections to ${branch}" \
                    || echo "::warning::Could not push brew style --fix autocorrections to ${branch}; leaving the draft as-is"
                fi
              else
                echo "::warning::Could not clone ${TAP} branch ${branch} for brew style --fix; leaving the draft as-is"
              fi
              rm -rf "$work"
            else
              echo "::warning::Could not create tempdir for brew style --fix; leaving ${name} draft as-is"
            fi

            # Recollect after the possible style push. A concurrent promotion, cross-repository head,
            # or extra changed file stops all further mutation and leaves the PR to the maintainer.
            if ! validation="$(validate_handoff "$pr" "$name" "$evidence" 2>&1)"; then
              validation="${validation//$'\n'/; }"
              echo "::warning::Post-style validation failed for ${TAP}#${pr}: ${validation}"
              printf -- '- %s#%s remains open after style validation failed: %s\n' \
                "$TAP" "$pr" "$validation" >>"$GITHUB_STEP_SUMMARY"
              continue
            fi

            title="chore(cask): update ${name} to ${TAG}"
            if ! gh pr edit "$pr" --repo "$TAP" --title "$title"; then
              echo "::warning::Could not normalize the title on ${TAP}#${pr}; leaving it draft/open"
              continue
            fi
            metadata_ok=true
            for label in automation dependencies; do
              if jq -e --arg label "$label" \
                  '.availableLabels | any(.name == $label)' "$evidence" >/dev/null; then
                if ! gh pr edit "$pr" --repo "$TAP" --add-label "$label"; then
                  echo "::warning::Could not add available label ${label} to ${TAP}#${pr}"
                  metadata_ok=false
                fi
              fi
            done
            if [ "$metadata_ok" != true ]; then
              echo "::warning::${TAP}#${pr} metadata is incomplete; leaving it draft/open"
              continue
            fi

            if ! validation="$(validate_handoff "$pr" "$name" "$evidence" prepared 2>&1)"; then
              validation="${validation//$'\n'/; }"
              echo "::warning::Prepared handoff validation failed for ${TAP}#${pr}: ${validation}"
              printf -- '- %s#%s remains open with incomplete handoff metadata: %s\n' \
                "$TAP" "$pr" "$validation" >>"$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Cask PRs are a trusted programmed release path: no review and no maintainer
            # promotion step (maintainer direction, ksail#6095, 2026-07-13). With identity, scope,
            # current-version content, title, and labels all validated above — and the release
            # assets now public — mark it ready so the tap's own automation arms auto-merge and its
            # checks gate the merge. Fail-soft: a draft left behind is handed to the maintainer.
            if gh pr ready "$pr" --repo "$TAP"; then
              echo "::notice::${TAP}#${pr} validated and marked ready — the tap's checks gate its auto-merge"
              printf -- '- %s#%s validated and marked ready for check-gated auto-merge\n' \
                "$TAP" "$pr" >>"$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::Could not mark ${TAP}#${pr} ready; it remains draft/open for the maintainer"
              printf -- '- %s#%s remains draft/open: could not mark it ready after validation\n' \
                "$TAP" "$pr" >>"$GITHUB_STEP_SUMMARY"
            fi
          done

  # Backstop for the immutable-release model: if the release did NOT publish — any asset job failed,
  # or the publish step bailed (so `publish-release` is skipped or failed) — delete the orphaned draft
  # AND the tag so an incomplete/empty release never lingers or flows downstream to tag-tracking
  # consumers (see #5060, #5061). The `Release` workflow validates every artifact BEFORE the tag is
  # cut, so this should rarely fire — only on a post-tag transient (a GitHub/registry blip during the
  # real build). On the happy path `publish-release` succeeds and this is skipped. Recovery is to
  # re-run the `Release` workflow: it recomputes the same version and re-tags after validation.
  cleanup-failed-release:
    name: 🧹 Clean up incomplete release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish-release]
    if: always() && needs.publish-release.result != 'success'
    permissions:
      contents: write
    steps:
      - name: 🧹 Delete orphaned draft release and tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;

            // listReleases returns drafts (getReleaseByTag does not), so use it to find everything
            // attached to this tag.
            const { data: releases } = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            const forTag = releases.filter(r => r.tag_name === tag);
            const drafts = forTag.filter(r => r.draft);
            const published = forTag.filter(r => !r.draft);

            // If a published release coexists with a draft for this tag, we're in the ambiguous
            // duplicate-release case (#4874) — the draft may hold the ONLY complete artifact set, so
            // auto-deleting it could strand an incomplete published release as the only survivor.
            // Leave both the draft(s) and the tag for manual investigation (mirrors publish-release's
            // matching>1 bail), and never delete a tag that backs a published release.
            if (published.length > 0) {
              core.warning(`A published release exists for ${tag} alongside ${drafts.length} draft(s); leaving the draft(s) and the tag for manual cleanup (see #4874).`);
              return;
            }

            // No published release for this tag — the draft(s), if any, are orphans from a blocked
            // publish. Remove them and the tag so no empty/incomplete release flows downstream.
            for (const d of drafts) {
              await github.rest.repos.deleteRelease({ owner, repo, release_id: d.id });
              console.log(`Deleted orphaned draft release ${tag} (id=${d.id}).`);
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              console.log(`Deleted orphaned tag ${tag}; downstream tag-tracking consumers will not see an empty release.`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                console.log(`Tag ${tag} already absent; nothing to delete.`);
              } else {
                throw error;
              }
            }

name: CI - KSail

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      run_system_tests:
        description: "Run system tests (normally only runs in merge queue)"
        required: false
        type: boolean
        default: true

env:
  # Use pipe (|) instead of comma (,) so Go falls through to direct on ANY proxy
  # error (including 403), not just 404/410. Hardens CI against transient
  # proxy.golang.org outages. go.sum still verifies module integrity.
  GOPROXY: "https://proxy.golang.org|direct"
  # Soft memory limit for Go build toolchain (compiler, linker). The KSail
  # binary links a large dependency tree and the Go linker can exceed the
  # default runner memory on cache-miss builds. Setting GOMEMLIMIT makes the
  # GC work harder to stay within budget, reducing peak RSS.
  GOMEMLIMIT: "6GiB"

concurrency:
  group: "ci-ksail-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Detect which file categories changed to conditionally run jobs
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      system-test: ${{ steps.filter.outputs.system-test }}
      schema: ${{ steps.filter.outputs.schema }}
      cli: ${{ steps.filter.outputs.cli }}
      vsce: ${{ steps.filter.outputs.vsce }}
      docs-deps: ${{ steps.filter.outputs.docs-deps }}
      vsce-deps: ${{ steps.filter.outputs.vsce-deps }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/actions/**'
            system-test:
              - '**/*.go'
              - '!**/*_test.go'
              - '!pkg/cli/cmd/chat/**'
              - '!pkg/cli/ui/chat/**'
              - '!pkg/svc/chat/**'
              - '!pkg/svc/mcp/**'
              - '!pkg/toolgen/**'
              - '!pkg/cli/cmd/cipher/**'
              - '!docs/*.go'
              - '!schemas/**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/actions/**'
              - '.github/fixtures/**'
              - '.github/workflows/ci.yaml'
            schema:
              - 'pkg/apis/**/*.go'
              - 'go.mod'
              - 'schemas/gen_schema.go'
            cli:
              - 'cmd/**/*.go'
              - 'pkg/**/*.go'
              - 'go.mod'
              - 'docs/gen_docs.go'
              - 'docs/gen_docs_prose.go'
            vsce:
              - 'vsce/**'
              - '.github/workflows/ci.yaml'
            docs-deps:
              - 'docs/package*.json'
              - '.github/workflows/ci.yaml'
            vsce-deps:
              - 'vsce/package*.json'
              - '.github/workflows/ci.yaml'

  build-artifact:
    name: 🏗️ Build KSail Binary
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'workflow_dispatch' || ((github.event_name == 'pull_request' || github.event_name == 'merge_group') && (needs.changes.outputs.code == 'true' || needs.changes.outputs.cli == 'true'))
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail

  deadcode:
    name: 🔍 Dead Code Analysis
    runs-on: ubuntu-latest
    needs: [changes]
    if: (github.event_name == 'pull_request' || github.event_name == 'merge_group') && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📥 Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@v0.43.0

      - name: 🔍 Check for dead code
        run: |
          output_file="$(mktemp)"
          trap 'rm -f "$output_file"' EXIT

          deadcode -test ./... >"$output_file"

          if [ -s "$output_file" ]; then
            echo "::error::Dead code detected. Remove unreachable functions before merging."
            cat "$output_file"
            exit 1
          fi
          echo "No dead code found ✅"

  sync-modules:
    name: 🔄 Sync Module Dependencies
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'merge_group' && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🔄 Sync all Go modules
        run: |
          echo "Syncing module dependencies..."
          go mod tidy
          echo "✅ Module dependencies synced"

      - name: 📤 Upload patch
        run: |
          git add -N .
          git diff > /tmp/sync-modules.patch
          if [ -s /tmp/sync-modules.patch ]; then
            echo "Changes detected"
          else
            echo "No changes"
          fi
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sync-modules-patch
          path: /tmp/sync-modules.patch
          if-no-files-found: ignore
          retention-days: 1

      - name: ❌ Fail if generated files are out of date (fork PR)
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          if [ -s /tmp/sync-modules.patch ]; then
            echo "::error::Generated files are out of date. Please run 'go mod tidy' locally and commit the results."
            echo ""
            cat /tmp/sync-modules.patch
            exit 1
          fi

  generate-schema:
    name: 📝 Generate JSON Schema
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'merge_group' && needs.changes.outputs.schema == 'true'
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📝 Generate JSON schema
        run: go generate ./schemas/...

      - name: 📤 Upload patch
        run: |
          git add -N .
          git diff > /tmp/generate-schema.patch
          if [ -s /tmp/generate-schema.patch ]; then
            echo "Changes detected"
          else
            echo "No changes"
          fi
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: generate-schema-patch
          path: /tmp/generate-schema.patch
          if-no-files-found: ignore
          retention-days: 1

      - name: ❌ Fail if generated files are out of date (fork PR)
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          if [ -s /tmp/generate-schema.patch ]; then
            echo "::error::Generated files are out of date. Please run 'go generate ./schemas/...' locally and commit the results."
            echo ""
            cat /tmp/generate-schema.patch
            exit 1
          fi

  generate-docs:
    name: 📚 Generate Reference Docs
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'merge_group' && needs.changes.outputs.cli == 'true'
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📚 Generate reference documentation
        run: go generate ./docs/...

      - name: 📤 Upload patch
        run: |
          git add -N .
          git diff > /tmp/generate-docs.patch
          if [ -s /tmp/generate-docs.patch ]; then
            echo "Changes detected"
          else
            echo "No changes"
          fi
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: generate-docs-patch
          path: /tmp/generate-docs.patch
          if-no-files-found: ignore
          retention-days: 1

      - name: ❌ Fail if generated files are out of date (fork PR)
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          if [ -s /tmp/generate-docs.patch ]; then
            echo "::error::Generated files are out of date. Please run 'go generate ./docs/...' locally and commit the results."
            echo ""
            cat /tmp/generate-docs.patch
            exit 1
          fi

  auto-commit:
    name: 📤 Auto-Commit Generated Changes
    runs-on: ubuntu-latest
    needs: [changes, sync-modules, generate-schema, generate-docs]
    if: >-
      always()
      && github.event_name != 'merge_group'
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && (needs.sync-modules.result == 'success'
        || needs.generate-schema.result == 'success'
        || needs.generate-docs.result == 'success')
    permissions:
      contents: write
    steps:
      - name: 🔑 Generate GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0-beta.2
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] - GitHub App token generation, no environment scoping available for app installations

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: 📥 Download patches
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-patch"
          merge-multiple: true
          path: /tmp/patches

      - name: 📋 Apply patches
        run: |
          set -euo pipefail
          shopt -s nullglob

          for patch in /tmp/patches/*.patch; do
            if [ -s "$patch" ]; then
              patch_name="$(basename "$patch")"
              echo "Applying ${patch_name}..."

              if git apply --3way "$patch"; then
                echo "Applied ${patch_name} with 3-way merge."
              else
                echo "3-way apply failed for ${patch_name}; falling back to direct apply with rejects..." >&2

                if git apply --reject "$patch"; then
                  echo "Applied ${patch_name} with rejects."
                  rej_files=$(find . -name '*.rej' 2>/dev/null || true)
                  if [ -n "$rej_files" ]; then
                    echo "::error::Reject files found after applying ${patch_name}:"
                    echo "${rej_files}"
                    git status --short || true
                    echo "Failing job to avoid committing partially-applied patches." >&2
                    exit 1
                  fi
                else
                  echo "::error::Failed to apply patch ${patch_name}. See diagnostics above." >&2
                  git status --short || true
                  exit 1
                fi
              fi
            else
              echo "Skipping empty patch $(basename "$patch")"
            fi
          done

      - name: 📤 Commit and push generated changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: sync modules and update generated files"
          commit_user_name: generator-bot
          commit_user_email: generator-bot@users.noreply.github.com
          branch: ${{ github.head_ref || github.ref_name }}

  coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    needs: [changes]
    # Only run on push to main, skip if no code files changed
    if: |
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.changes.outputs.code == 'true'
    permissions:
      contents: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 👨🏻‍🔧 Enable covdata (temp) see https://github.com/golang/go/issues/75031
        run: go env -w GOTOOLCHAIN=go1.26.0+auto

      - name: 📄 Generate coverage
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: 📄 Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env] - third-party action input, no environment scoping available

  audit-docs:
    name: 🔍 Audit Docs Dependencies
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'merge_group' && needs.changes.outputs.docs-deps == 'true'
    permissions:
      contents: write
    steps:
      - name: � Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: �🔍 NPM Audit and Fix
        uses: ./.github/actions/npm-audit-and-fix
        with:
          working-directory: docs
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] - GitHub App token generation, no environment scoping available for app installations
          commit-message: "chore(docs): fix npm audit vulnerabilities"

  audit-vsce:
    name: 🔍 Audit VSCode Extension Dependencies
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'merge_group' && needs.changes.outputs.vsce-deps == 'true'
    permissions:
      contents: write
    steps:
      - name: � Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: �🔍 NPM Audit and Fix
        uses: ./.github/actions/npm-audit-and-fix
        with:
          working-directory: vsce
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env] - GitHub App token generation, no environment scoping available for app installations
          commit-message: "chore(vsce): fix npm audit vulnerabilities"

  vscode-extension:
    name: 🧩 VSCode Extension
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'merge_group' && needs.changes.outputs.vsce == 'true'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: vsce
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "vsce/package-lock.json"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Compile
        run: npm run compile

      - name: 📦 Package extension
        run: npm run package

      - name: 📦 Create VSIX package
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: npx @vscode/vsce package --out ksail.vsix

      - name: 📤 Upload VSIX artifact
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ksail-vsix
          path: ksail.vsix
          retention-days: 7

  gen-smoke-test:
    name: 🧪 Gen & Smoke Test
    runs-on: ubuntu-latest
    needs: [changes, build-artifact]
    if: (github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🧪 workload gen — generate and validate manifests
        shell: bash
        run: |
          FAILED=0
          GEN_DIR=$(mktemp -d)

          echo "=== Testing workload gen subcommands ==="

          run_gen_test() {
            local name="$1"
            shift
            local OUTPUT_FILE="$GEN_DIR/${name}.yaml"
            local VALIDATE_FLAGS=""
            # Secrets are skipped by default in validate; override for secret tests
            if [ "$name" = "secret" ]; then
              VALIDATE_FLAGS="--skip-secrets=false"
            fi
            echo "--- gen $name ---"
            if "$@" > "$OUTPUT_FILE"; then
              echo "  ✅ gen $name succeeded"
              if ksail workload validate $VALIDATE_FLAGS "$OUTPUT_FILE"; then
                echo "  ✅ validate $name succeeded"
              else
                echo "  ❌ validate $name FAILED"
                cat "$OUTPUT_FILE"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "  ❌ gen $name FAILED"
              cat "$OUTPUT_FILE" 2>/dev/null || true
              FAILED=$((FAILED + 1))
            fi
          }

          run_gen_test deployment ksail workload gen deployment test-deploy --image nginx:1.27
          run_gen_test service ksail workload gen service clusterip test-svc --tcp=80:80
          run_gen_test configmap ksail workload gen configmap test-cm --from-literal=key=value
          run_gen_test secret ksail workload gen secret generic test-secret --from-literal=password=test123
          run_gen_test namespace ksail workload gen namespace test-ns
          run_gen_test job ksail workload gen job test-job --image=busybox:1.37
          run_gen_test cronjob ksail workload gen cronjob test-cron --image=busybox:1.37 --schedule="*/5 * * * *"
          run_gen_test serviceaccount ksail workload gen serviceaccount test-sa
          # clusterrole and role require API server for resource group discovery (--resource flag),
          # even with --dry-run=client. Tested in system tests where a cluster is available.
          run_gen_test clusterrolebinding ksail workload gen clusterrolebinding test-crb --clusterrole=test-cr --serviceaccount=default:test-sa
          run_gen_test rolebinding ksail workload gen rolebinding test-rb --role=test-role --serviceaccount=default:test-sa
          run_gen_test ingress ksail workload gen ingress test-ing --rule="host/path=svc:80"
          run_gen_test quota ksail workload gen quota test-quota --hard=cpu=1,memory=1Gi
          run_gen_test priorityclass ksail workload gen priorityclass test-pc --value=1000
          run_gen_test poddisruptionbudget ksail workload gen poddisruptionbudget test-pdb --min-available=1 --selector=app=test
          run_gen_test helmrelease ksail workload gen helmrelease test-hr --source=HelmRepository/test --chart=test --export

          rm -rf "$GEN_DIR"

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED gen/validate tests failed"
            exit 1
          fi
          echo "✅ All workload gen tests passed"

      # NOTE: cipher encrypt/decrypt E2E test is not feasible here because
      # ksail cipher encrypt uses hardcoded empty KeyGroups (no .sops.yaml
      # config loading). A code change to support key configuration is needed
      # before cipher can be E2E tested. Cipher commands are covered by unit
      # tests and benchmarks in pkg/cli/cmd/cipher/.

      - name: 🧪 smoke test — chat and mcp commands
        shell: bash
        run: |
          echo "=== Testing chat --help ==="
          ksail chat --help
          echo "✅ chat --help passed"

          echo "=== Testing mcp --help ==="
          ksail mcp --help
          echo "✅ mcp --help passed"

  warm-helm-cache:
    name: 🔥 Warm Helm Cache
    runs-on: ubuntu-latest
    needs: [changes, build-artifact]
    if: (github.event_name == 'merge_group' && needs.changes.outputs.system-test == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_system_tests == true)
    permissions:
      contents: read
    outputs:
      cache-key: ${{ steps.warm.outputs.cache-key }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🔥 Warm Helm chart cache
        id: warm
        uses: ./.github/actions/warm-helm-cache

  warm-mirror-cache:
    name: 🔥 Warm Mirror Cache
    runs-on: ubuntu-latest
    needs: [changes, build-artifact]
    if: (github.event_name == 'merge_group' && needs.changes.outputs.system-test == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_system_tests == true)
    permissions:
      contents: read
    outputs:
      cache-key: ${{ steps.warm.outputs.cache-key }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🔥 Warm mirror cache
        id: warm
        uses: ./.github/actions/warm-mirror-cache

  tenant-test:
    name: 🧪 Tenant Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, build-artifact]
    if: (github.event_name == 'pull_request' || github.event_name == 'merge_group') && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🧪 Run Tenant Tests
        uses: ./.github/actions/ksail-tenant-test

  system-test:
    name: 🧪 System Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, build-artifact, warm-helm-cache, warm-mirror-cache]
    if: (github.event_name == 'merge_group' && needs.changes.outputs.system-test == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_system_tests == true)
    environment: ci
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      max-parallel: 15
      matrix:
        distribution: [Vanilla, K3s, Talos, VCluster]
        provider: [Docker]
        init: [true, false]
        args:
          - ""
          - "--name system-test-cluster --cni Cilium --csi Enabled --load-balancer Enabled --metrics-server Enabled --policy-engine Kyverno --cert-manager Enabled --gitops-engine Flux"
          - "--cni Calico --csi Disabled --load-balancer Disabled --metrics-server Disabled --policy-engine Gatekeeper --gitops-engine ArgoCD"
          - "--gitops-engine Flux --local-registry ghcr.io/devantler-tech/ksail/system-test-manifests"
          - "--gitops-engine ArgoCD --local-registry ghcr.io/devantler-tech/ksail/system-test-manifests"
        include:
          - distribution: Talos
            provider: Docker
            init: true
            args: "--name system-test-cluster-with-image-verification --image-verification Enabled"
          - distribution: Talos
            provider: Hetzner
            init: true
            args: "--name system-test-cluster-with-scaffolding --image-verification Enabled"
          - distribution: Talos
            provider: Hetzner
            init: false
            args: "--name system-test-cluster-without-scaffolding"
          - distribution: Talos
            provider: Omni
            init: true
            args: "--name system-test-cluster-with-scaffolding --image-verification Enabled"
          - distribution: Talos
            provider: Omni
            init: false
            args: "--name system-test-cluster-without-scaffolding"
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧹 Free disk space
        uses: ./.github/actions/free-disk-space

      - name: 🔐 Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env] - third-party action input, no environment scoping available

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🧪 Run KSail System Test
        uses: ./.github/actions/ksail-system-test
        env:
          HCLOUD_TOKEN: ${{ matrix.provider == 'Hetzner' && secrets.HCLOUD_TOKEN || '' }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ matrix.provider == 'Omni' && secrets.OMNI_SERVICE_ACCOUNT_KEY || '' }}
          OMNI_ENDPOINT: ${{ matrix.provider == 'Omni' && vars.OMNI_ENDPOINT || '' }}
        with:
          distribution: ${{ matrix.distribution }}
          provider: ${{ matrix.provider }}
          init: ${{ matrix.init }}
          args: ${{ matrix.args }}
          apply-overlay-path: ".github/fixtures/podinfo-overlay"

          ghcr-user: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  backup-restore-test:
    name: 🧪 Backup & Restore Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, build-artifact, warm-helm-cache, warm-mirror-cache]
    if: (github.event_name == 'merge_group' && needs.changes.outputs.system-test == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_system_tests == true)
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧹 Free disk space
        uses: ./.github/actions/free-disk-space

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🧪 Create cluster
        uses: ./.github/actions/ksail-cluster
        with:
          distribution: Vanilla
          provider: Docker
          init: "true"
          install: "false"
          cache: "true"

      - name: 🧪 Deploy test workload
        shell: bash
        run: |
          ksail workload create deployment backup-test --image=traefik/whoami:v1.10
          ksail workload wait --for=condition=Available deployment/backup-test --timeout=300s

      - name: 🧪 Backup cluster
        shell: bash
        run: |
          ksail cluster backup --output /tmp/cluster-backup.tar.gz
          ls -lh /tmp/cluster-backup.tar.gz
          echo "✅ Backup created successfully"

      - name: 🧪 Delete test workload
        shell: bash
        run: |
          ksail workload delete deployment/backup-test --ignore-not-found
          # Verify it's gone
          if ksail workload get deployment/backup-test 2>/dev/null; then
            echo "❌ Workload still exists after delete"
            exit 1
          fi
          echo "✅ Workload deleted"

      - name: 🧪 Restore from backup
        shell: bash
        run: |
          ksail cluster restore --input /tmp/cluster-backup.tar.gz --existing-resource-policy=update
          echo "✅ Restore completed"

      - name: 🧪 Verify restored workload
        shell: bash
        run: |
          ksail workload wait --for=condition=Available deployment/backup-test --timeout=300s
          ksail workload get deployment/backup-test
          echo "✅ Workload restored and available"

      - name: 🐞 Debug failure
        if: failure()
        uses: ./.github/actions/debug-kubernetes-failure
        with:
          kubectl-command: "ksail workload"

      - name: 🧹 Cleanup
        if: always()
        shell: bash
        run: |
          ksail cluster delete || echo "⚠️ Cluster delete failed"
          rm -f /tmp/cluster-backup.tar.gz

  cleanup-hetzner:
    name: 🧹 Cleanup Hetzner Resources
    runs-on: ubuntu-latest
    needs: [system-test, backup-restore-test]
    if: ${{ always() && (github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch') && needs.system-test.result != 'skipped' }}
    environment: ci
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧹 Cleanup all KSail-owned Hetzner resources
        uses: ./.github/actions/cleanup-hetzner
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

  cleanup-omni:
    name: 🧹 Cleanup Omni Resources
    runs-on: ubuntu-latest
    needs: [system-test]
    if: ${{ always() && (github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch') && needs.system-test.result != 'skipped' }}
    environment: ci
    permissions:
      contents: read
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 📦 Cache KSail Binary
        uses: ./.github/actions/cache-ksail-binary
        with:
          go-version: ${{ steps.setup-go.outputs.go-version }}
          source-hash: ${{ hashFiles('go.mod', 'go.sum', '**/*.go') }}
          output-path: /usr/local/bin/ksail
          save: "false"

      - name: 🧹 Cleanup all KSail test clusters from Omni
        uses: ./.github/actions/cleanup-omni
        env:
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}

  rate-limit-check:
    name: 📊 Rate Limit Status
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group'
    permissions:
      contents: read
    steps:
      - name: 📊 GitHub API rate limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## GitHub API Rate Limit" >> "$GITHUB_STEP_SUMMARY"
          curl -sf -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/rate_limit | \
            jq -r '"| Resource | Remaining | Limit | Reset |", "|---|---|---|---|", (.resources | to_entries[] | "| \(.key) | \(.value.remaining) | \(.value.limit) | \(.value.reset | todate) |")' \
            >> "$GITHUB_STEP_SUMMARY"
      - name: 📊 Docker Hub rate limit
        run: |
          echo "## Docker Hub Rate Limit" >> "$GITHUB_STEP_SUMMARY"
          TOKEN=$(curl -sf "https://auth.docker.io/token?service=registry.docker.io&scope=repository:library/alpine:pull" | jq -r .token)
          HEADERS=$(curl -sf -I -H "Authorization: Bearer $TOKEN" \
            https://registry-1.docker.io/v2/library/alpine/manifests/latest 2>&1)
          REMAINING=$(echo "$HEADERS" | grep -i "ratelimit-remaining" | head -1 || true)
          LIMIT=$(echo "$HEADERS" | grep -i "ratelimit-limit" | head -1 || true)
          if [ -n "$REMAINING" ]; then
            echo "- $LIMIT" >> "$GITHUB_STEP_SUMMARY"
            echo "- $REMAINING" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No rate limit headers — runner may be exempt" >> "$GITHUB_STEP_SUMMARY"
          fi

  status:
    name: CI - KSail
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        build-artifact,
        sync-modules,
        generate-schema,
        generate-docs,
        auto-commit,
        coverage,
        gen-smoke-test,
        warm-helm-cache,
        system-test,
        tenant-test,
        backup-restore-test,
        cleanup-hetzner,
        cleanup-omni,
        rate-limit-check,
        audit-docs,
        audit-vsce,
        vscode-extension,
      ]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/summarize-workflow
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.build-artifact.result }}
            ${{ needs.sync-modules.result }}
            ${{ needs.generate-schema.result }}
            ${{ needs.generate-docs.result }}
            ${{ needs.auto-commit.result }}
            ${{ needs.coverage.result }}
            ${{ needs.gen-smoke-test.result }}
            ${{ needs.warm-helm-cache.result }}
            ${{ needs.system-test.result }}
            ${{ needs.tenant-test.result }}
            ${{ needs.backup-restore-test.result }}
            ${{ needs.cleanup-hetzner.result }}
            ${{ needs.cleanup-omni.result }}
            ${{ needs.rate-limit-check.result }}
            ${{ needs.audit-docs.result }}
            ${{ needs.audit-vsce.result }}
            ${{ needs.vscode-extension.result }}

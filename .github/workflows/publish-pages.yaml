# Sample workflow for building and deploying an Astro site to GitHub Pages
name: Publish - Pages

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install dependencies
        working-directory: docs
        run: npm ci
      - name: Download benchmark data
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/public
          if gh api "repos/{owner}/{repo}/contents/dev/bench/data.js?ref=benchmark-data" \
            -H "Accept: application/vnd.github.raw+json" > /tmp/data.js 2>/tmp/api_error.txt; then
            node -e "
              const s = require('fs').readFileSync('/tmp/data.js', 'utf8');
              const match = s.match(/^window\.BENCHMARK_DATA\s*=\s*([\s\S]+?);\s*\$/);
              if (!match) { process.stderr.write('Unexpected data.js format\n'); process.exit(1); }
              JSON.parse(match[1]);
              require('fs').writeFileSync('docs/public/benchmark-data.json', match[1]);
            "
            echo "Downloaded benchmark data from benchmark-data branch"
          else
            cat /tmp/api_error.txt >&2 || true
            echo "No benchmark data available yet"
          fi
      - name: Build with Astro
        working-directory: docs
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/dist

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

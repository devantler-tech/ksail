name: Update Copilot Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-copilot-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: 🔄 Update Copilot skills
        run: |
          if [ ! -f skills-lock.json ]; then
            echo "::error::skills-lock.json not found"
            exit 1
          fi
          jq -e . skills-lock.json >/dev/null
          while IFS= read -r skill; do
            echo "Updating $skill..."
            npx skills add "$skill" -y
          done < <(jq -e -r '.skills | to_entries[] | select(.value.source == "github/awesome-copilot") | "\(.value.source)@\(.key)"' skills-lock.json)

      - name: 📦 Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "chore(deps): update copilot skills"
          title: "chore(deps): update copilot skills"
          body: |
            Automated update of GitHub Copilot skills from `github/awesome-copilot` to their latest versions.

            Updated files:
            - `skills-lock.json`
            - `.agents/skills/`
          branch: deps/copilot-skills-update
          labels: dependencies,automation
          delete-branch: true

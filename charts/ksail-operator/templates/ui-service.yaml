{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ksail-operator.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksail-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "ksail-operator.uiSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
{{- end }}

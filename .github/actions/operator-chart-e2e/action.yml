name: Operator Chart E2E
description: |
  Smoke + API end-to-end test of the ksail-operator Helm chart on a throwaway
  kind cluster. Builds the operator image locally (no registry) with the web UI
  embedded (-tags ui), loads it into kind, installs the chart in read-only mode,
  and asserts the CRD registers, the operator rolls out, the REST API serves
  /readyz and /api/v1/config, mutations are rejected (403), and the operator
  serves the embedded SPA at / (same origin as the API — no separate UI
  container, no reverse proxy).

  Full Cluster-CR reconciliation is intentionally out of scope: the reconciler
  provisions real clusters, which is not feasible inside a plain kind hub
  without privileged Docker/cloud access.

  Assumes Go is already set up by the caller (actions/setup-go).

inputs:
  namespace:
    description: Namespace to install the chart into.
    required: false
    default: "ksail-operator"
  cluster-name:
    description: Name of the throwaway kind cluster.
    required: false
    default: "ksail-operator-e2e"
  operator-image:
    description: Local tag for the operator image (web UI embedded).
    required: false
    default: "ksail:e2e"

runs:
  using: composite
  steps:
    - name: 🧹 Free disk space
      shell: bash
      run: |
        set -euo pipefail
        before=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
        sudo rm -rf \
          /usr/local/lib/android \
          /usr/share/dotnet \
          /opt/ghc \
          /usr/local/share/boost \
          /usr/share/swift \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/share/powershell \
          /usr/local/julia* || true
        after=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
        echo "Free disk space on /: ${before}G -> ${after}G (gained $((after - before))G)"

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
        cache: "npm"
        cache-dependency-path: "web/ui/package-lock.json"

    - name: 🏗️ Build web UI bundle
      shell: bash
      # Emits the SPA into pkg/operator/ui/dist so the `-tags ui` operator build embeds it.
      run: |
        set -euo pipefail
        npm --prefix web/ui ci
        npm --prefix web/ui run build

    - name: 🏗️ Build operator image
      shell: bash
      env:
        # Match .goreleaser.yaml: a static (CGO_ENABLED=0) binary is required by
        # the distroless/static base in the root Dockerfile. The generate +
        # bundler hooks mirror the release build's pre-hooks so the embed
        # directives resolve. -tags ui embeds the web UI built above.
        GOPROXY: "https://proxy.golang.org|direct"
        GOMEMLIMIT: "6GiB"
        OPERATOR_IMAGE: ${{ inputs.operator-image }}
      run: |
        set -euo pipefail
        go generate ./pkg/svc/chat/...
        go tool bundler --platform linux/amd64 --cli-version 1.0.10
        ctx="$(mktemp -d)"
        mkdir -p "$ctx/linux/amd64"
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -tags ui -trimpath -ldflags="-s -w" -o "$ctx/linux/amd64/ksail" .
        cp Dockerfile "$ctx/Dockerfile"
        docker build --build-arg TARGETPLATFORM=linux/amd64 -t "$OPERATOR_IMAGE" "$ctx"
        rm -rf "$ctx"

    - name: ☸️ Create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      with:
        cluster_name: ${{ inputs.cluster-name }}

    - name: 📦 Load image into kind
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        OPERATOR_IMAGE: ${{ inputs.operator-image }}
      run: |
        set -euo pipefail
        kind load docker-image "$OPERATOR_IMAGE" --name "$CLUSTER_NAME"

    - name: 🚀 Install chart
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
        OPERATOR_IMAGE: ${{ inputs.operator-image }}
      run: |
        set -euo pipefail
        op_repo="${OPERATOR_IMAGE%:*}"; op_tag="${OPERATOR_IMAGE##*:}"
        # fullnameOverride keeps the resource name clean (ksail-operator) instead
        # of <release>-<chart>. pullPolicy=Never forces use of the kind-loaded
        # image and fails fast if the load broke. ui.readOnly wires --read-only
        # onto the operator, enabling the deterministic 403 mutation assertion.
        helm install ksail-operator charts/ksail-operator \
          --namespace "$NS" --create-namespace \
          --set fullnameOverride=ksail-operator \
          --set operator.image.repository="$op_repo" \
          --set operator.image.tag="$op_tag" \
          --set operator.image.pullPolicy=Never \
          --set ui.readOnly=true \
          --wait --timeout 5m

    - name: ✅ Verify deployment and API
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        set -euo pipefail

        wait_http() { # $1=url  $2=expected code
          local url="$1" want="$2" code=000
          for _ in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url" 2>/dev/null || true)
            [ "$code" = "$want" ] && return 0
            sleep 2
          done
          echo "❌ Timed out waiting for $url (wanted $want, last $code)"
          return 1
        }

        echo "=== CRD registration ==="
        kubectl wait --for=condition=Established crd/clusters.ksail.io --timeout=60s

        echo "=== Rollout ==="
        kubectl -n "$NS" rollout status deploy/ksail-operator --timeout=180s

        PF_OP=""
        trap 'kill "${PF_OP:-}" 2>/dev/null || true' EXIT

        echo "=== Operator REST API + embedded UI (same origin) ==="
        kubectl -n "$NS" port-forward svc/ksail-operator 18080:8080 >/tmp/pf-operator.log 2>&1 &
        PF_OP=$!
        wait_http "http://127.0.0.1:18080/readyz" 200
        echo "  ✅ /readyz"
        wait_http "http://127.0.0.1:18080/api/v1/config" 200
        echo "  ✅ /api/v1/config"
        wait_http "http://127.0.0.1:18080/" 200
        echo "  ✅ operator serves the embedded SPA at /"

        echo "=== Read-only enforcement ==="
        code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:18080/api/v1/clusters)
        if [ "$code" != "403" ]; then
          echo "❌ Expected 403 from POST /api/v1/clusters in read-only mode, got $code"
          exit 1
        fi
        echo "  ✅ POST /api/v1/clusters -> 403"

        echo "✅ Operator chart E2E passed"

    - name: 🐞 Operator logs on failure
      if: failure()
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        echo "==== describe deploy/ksail-operator ===="
        kubectl -n "$NS" describe deploy ksail-operator || true
        echo "==== logs deploy/ksail-operator ===="
        kubectl -n "$NS" logs deploy/ksail-operator --all-containers --tail=200 || true

    - name: 🐞 Debug Kubernetes failure
      if: failure()
      uses: ./.github/actions/debug-kubernetes-failure
      with:
        kubectl-command: kubectl
        namespace: ${{ inputs.namespace }}
        show-cni: "false"
        show-csi: "false"
        show-gitops: "false"
        show-policy-engine: "false"
        show-cert-manager: "false"
        show-metrics-server: "false"

name: KSail Test Kubernetes Provider
description: |
  Tests the Kubernetes provider by creating nested clusters (4 distributions:
  Vanilla, K3s, VCluster, Talos) on top of the currently active host cluster.
  Each nested cluster is created, verified via `ksail cluster info`, and then deleted.

  Prerequisites:
  - A healthy host cluster must already be active (reachable via current kubeconfig context)
  - `ksail` binary must be in PATH

inputs:
  distributions:
    description: |
      Comma-separated list of distributions to test on the Kubernetes provider.
      Each will be created, verified, and deleted sequentially.
    required: false
    default: "Vanilla,K3s,VCluster,Talos"
  timeout:
    description: Timeout per nested cluster create (seconds)
    required: false
    # 900s (15m): nested Talos on the Kubernetes provider (Talos-in-pod inside a
    # vCluster/Docker host) is the heaviest combination and intermittently exceeded
    # 600s under CI load (exit 124). Headroom over trimming coverage — see the matrix
    # in ci.yaml and docs note on not reducing nested-distro coverage for flakes.
    default: "900"
  cni:
    description: |
      Optional CNI to install in each nested cluster (e.g. "Calico"). When empty,
      the distribution default is used. Calico exercises the k3k serverArgs path
      that enables the MutatingAdmissionPolicy / v1beta1 admissionregistration API.
    required: false
    default: ""
  dockerhub-user:
    description: Docker Hub username for authenticated nested pull-through mirrors.
    required: false
    default: ""
  dockerhub-token:
    description: Docker Hub token/password for authenticated nested pull-through mirrors.
    required: false
    default: ""
  ghcr-user:
    description: GHCR username for authenticated nested pull-through mirrors.
    required: false
    default: ""
  ghcr-token:
    description: GHCR token for authenticated nested pull-through mirrors.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: 🧪 Test Kubernetes Provider (nested clusters)
      shell: bash
      env:
        DISTRIBUTIONS: ${{ inputs.distributions }}
        TIMEOUT: ${{ inputs.timeout }}
        CNI: ${{ inputs.cni }}
        # Mirror proxy credentials. Exported here so ksail expands the ${...}
        # placeholders in the --mirror-registry specs from its own process env,
        # keeping the secret values out of argv and the command log.
        DOCKERHUB_USERNAME: ${{ inputs.dockerhub-user }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub-token }}
        GHCR_USERNAME: ${{ inputs.ghcr-user }}
        GHCR_TOKEN: ${{ inputs.ghcr-token }}
      run: |
        set -euo pipefail
        LOG_DIR="/tmp/ksail-system-test-logs/kubernetes-provider"
        mkdir -p "$LOG_DIR"

        echo "=== Kubernetes Provider E2E Tests ==="
        HOST_CONTEXT="$(kubectl config current-context)"
        echo "Host cluster context: $HOST_CONTEXT"
        echo "Distributions to test: $DISTRIBUTIONS"
        echo ""

        # Build authenticated pull-through mirror specs for the nested clusters.
        # The host-level mirror cache is invisible to the DinD daemon, so nested
        # clusters set up their own mirrors inside DinD. Authentication (vs. the
        # anonymous defaults) is what lifts the upstream rate limits that stall
        # the nested kubelet under CI concurrency. Credentials are passed as
        # ${ENV} placeholders that ksail expands internally; we only attach them
        # when BOTH halves are present, so the partial-credentials guard never
        # trips (e.g. forks without secrets fall back to anonymous mirrors).
        MIRRORS=()
        if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
          MIRRORS+=('${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}@docker.io=https://registry-1.docker.io')
        else
          MIRRORS+=('docker.io=https://registry-1.docker.io')
        fi
        if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
          MIRRORS+=('${GHCR_USERNAME}:${GHCR_TOKEN}@ghcr.io=https://ghcr.io')
        else
          MIRRORS+=('ghcr.io=https://ghcr.io')
        fi
        MIRRORS+=('quay.io=https://quay.io' 'registry.k8s.io=https://registry.k8s.io')
        MIRROR_ARG="$(IFS=,; printf '%s' "${MIRRORS[*]}")"
        echo "Nested mirror registries: ${#MIRRORS[@]} (docker.io/ghcr.io authenticated when secrets present)"
        echo ""

        FAILED=0
        PASSED=0
        IFS=',' read -ra DIST_ARRAY <<< "$DISTRIBUTIONS"

        for DIST in "${DIST_ARRAY[@]}"; do
          DIST=$(echo "$DIST" | xargs) # trim whitespace
          NESTED_NAME="nested-${DIST,,}"  # lowercase
          echo "──────────────────────────────────────────────────────"
          echo "🧪 Testing: $DIST on Kubernetes provider (name: $NESTED_NAME)"
          echo "──────────────────────────────────────────────────────"

          CREATE_LOG="$LOG_DIR/${DIST,,}-create.log"
          INFO_LOG="$LOG_DIR/${DIST,,}-info.log"
          DELETE_LOG="$LOG_DIR/${DIST,,}-delete.log"

          # Create nested cluster
          echo "  ⏳ Creating $DIST cluster..."
          CREATE_ARGS=(--distribution "$DIST" --provider Kubernetes --name "$NESTED_NAME")
          if [ -n "$CNI" ]; then
            CREATE_ARGS+=(--cni "$CNI")
            echo "  ↳ using CNI: $CNI"
          fi
          create_ok=false
          if timeout "$TIMEOUT" ksail cluster create \
            "${CREATE_ARGS[@]}" \
            --mirror-registry "$MIRROR_ARG" \
            2>&1 | tee "$CREATE_LOG"; then
            create_ok=true
            echo "  ✅ $DIST create succeeded"
          else
            echo "  ❌ $DIST create FAILED (exit code: $?)"
            FAILED=$((FAILED + 1))
          fi

          # Verify with cluster info (only if create succeeded)
          if [ "$create_ok" = "true" ]; then
            echo "  ⏳ Verifying $DIST cluster info..."
            if ksail cluster info --name "$NESTED_NAME" --provider Kubernetes 2>&1 | tee "$INFO_LOG"; then
              echo "  ✅ $DIST info succeeded"
              PASSED=$((PASSED + 1))
            else
              echo "  ❌ $DIST info FAILED"
              FAILED=$((FAILED + 1))
            fi
          fi

          # Always attempt delete (cleanup)
          echo "  ⏳ Deleting $DIST cluster..."
          if ksail cluster delete \
            --provider Kubernetes \
            --name "$NESTED_NAME" \
            --force \
            2>&1 | tee "$DELETE_LOG"; then
            echo "  ✅ $DIST delete succeeded"
          else
            echo "  ⚠️ $DIST delete failed (best-effort cleanup)"
          fi

          # Restore host context in case nested cluster creation changed it.
          kubectl config use-context "$HOST_CONTEXT" 2>/dev/null || true

          echo ""
        done

        echo "=== Kubernetes Provider Test Summary ==="
        echo "  Passed: $PASSED / ${#DIST_ARRAY[@]}"
        echo "  Failed: $FAILED / ${#DIST_ARRAY[@]}"

        if [ "$FAILED" -gt 0 ]; then
          echo "❌ $FAILED Kubernetes provider test(s) failed"
          exit 1
        fi
        echo "✅ All Kubernetes provider tests passed"

name: Update Agent Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-agent-skills:
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/reusable-workflows/.github/workflows/update-agent-skills.yaml@1dc3c2267580c42cfb138a46c46d1856d1b91b7b # v5.5.4
    with:
      dir: .agents/skills

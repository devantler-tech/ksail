rules:
  impostor-commit:
    # Disabled because zizmor v1.23.1 fatally crashes (rather than producing
    # an ignorable finding) when the impostor-commit audit encounters a private
    # GitHub org repo (github/gh-aw-actions) referenced in agentics-maintenance.yml.
    # The ignore list above was already suppressing all findings for the agentic
    # workflow files; disabling the rule entirely is the only way to prevent the
    # crash until this is fixed upstream in zizmor.
    disable: true
  template-injection:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  ref-version-mismatch:
    ignore:
      - agentics-maintenance.yml
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  excessive-permissions:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  artipacked:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  dangerous-triggers:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  unpinned-uses:
    ignore:
      - agentics-maintenance.yml
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
  secrets-outside-env:
    ignore:
      - ci-doctor.lock.yml
      - daily-docs.lock.yml
      - daily-workflow-maintenance.lock.yml
      - repo-assist.lock.yml
      - weekly-strategy.lock.yml
